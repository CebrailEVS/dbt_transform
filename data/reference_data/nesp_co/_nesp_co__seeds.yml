version: 2

seeds:
  - name: ref_nesp_co__commerciaux
    description: "Table de référence des secteurs commerciaux et du commercial actuellement associé."
    config:
      column_types:
        co_secteur: STRING
        co_nom: STRING
        co_prenom: STRING
        co_id_c4c: STRING
        co_manager_secteur: STRING
        co_metier: STRING
        co_region: STRING
        co_equipe: STRING
        co_id_nunshen: STRING
        co_fonction: STRING
        co_statut: STRING
    columns:
      - name: co_secteur
        description: "Secteur géographique commercial (clé unique)."
        tests:
          - not_null
          - unique
      - name: co_nom
        description: "Nom du commercial affecté au secteur."
      - name: co_prenom
        description: "Prénom du commercial."
      - name: co_id_c4c
        description: "Identifiant C4C du commercial."
      - name: co_manager_secteur
        description: "Manager responsable du secteur."
      - name: co_metier
        description: "Métier ou division commerciale."
      - name: co_region
        description: "Région commerciale."
      - name: co_equipe
        description: "Equipe commerciale."
      - name: co_id_nunshen
        description: "Identifiant interne Nunshen."
      - name: co_fonction
        description: "Fonction du collaborateur."
        tests:
          - accepted_values:
              arguments:
                values: ['ALL','alternant rs','commercial','commercial','fidelisation','manager']
      - name: co_statut
        description: "Statut du commercial."
        tests:
          - accepted_values:
              arguments:
                values: ['Actif', 'Inactif']
