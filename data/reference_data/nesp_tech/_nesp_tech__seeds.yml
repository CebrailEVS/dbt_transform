version: 2

seeds:
  - name: ref_nesp_tech__key_type_inter
    description: "Table de référence des types d'intervention techniques"
    config:
      column_types:
        type_code: STRING
        repair_code_1: STRING
        failure_code: STRING
        mini_prev_bool: BOOLEAN
        type_machine: STRING
        type_inter_libelle: STRING
    columns:
      - name: type_code
        description: "Code du type d'intervention"
        tests:
          - not_null
      - name: repair_code_1
        description: "Code réparation (NULL = toutes valeurs)"
      - name: failure_code
        description: "Code panne (NULL = toutes valeurs)"
      - name: mini_prev_bool
        description: "Indique une mini préventive (TRUE/FALSE)"
      - name: type_machine
        description: "Categorie Machine"
      - name: type_inter_libelle
        description: "Libellé du type d'intervention"
        tests:
          - not_null

  - name: ref_nesp_tech__machines_clean
    description: "Table de normalisation des noms de machines"
    config:
      column_types:
        nom_machine: STRING
        categorie_machine: STRING
        machine_clean: STRING
    columns:
      - name: nom_machine
        description: "Nom machine brut"
        tests:
          - not_null
          - unique
      - name: categorie_machine
        description: "Catégorie de machine"
      - name: machine_clean
        description: "Nom machine standardisé"
        tests:
          - not_null

  - name: ref_nesp_tech__dpts_montagne_factu
    description: "Départements considérés comme zone montagne pour la facturation"
    config:
      column_types:
        dpt: INT64
        montagne: INT64
    columns:
      - name: dpt
        description: "Code département"
        tests:
          - not_null
          - unique
      - name: montagne
        description: "Indicateur zone montagne (1 = oui, 0 = non)"
        tests:
          - not_null

  - name: ref_nesp_tech__cps_montagne_primes
    description: "Codes postaux considérés comme zone montagne pour le calcul des primes"
    config:
      column_types:
        cp: INT64
        montagne: INT64
    columns:
      - name: cp
        description: "Code postal"
        tests:
          - not_null
          - unique
      - name: montagne
        description: "Indicateur zone montagne (1 = oui, 0 = non)"
        tests:
          - not_null

  - name: ref_nesp_tech__key_facturation
    description: "Clé de facturation des interventions techniques"
    config:
      column_types:
        type_code: STRING
        type_inter: STRING
        machine_clean: STRING
        type_montagne: STRING
        key_ref_inter: STRING
        key_factu: STRING
        prod_factu: INT64
        tarif_factu: FLOAT64
    columns:
      - name: type_code
        description: "Code intervention"
      - name: type_inter
        description: "Type d'intervention (Curative / Préventive)"
      - name: machine_clean
        description: "Machine normalisée"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('ref_nesp_tech__machines_clean')
                field: machine_clean
      - name: type_montagne
        description: "Suffixe potentiel selon montagne"
      - name: key_ref_inter
        description: "Clé de facturation lisible"
        tests:
          - not_null
          - unique
      - name: key_factu
        description: "Clé de facturation lisible"
        tests:
          - not_null
      - name: prod_factu
        description: "Code produit associé à l'intervention (entier)"
        tests:
          - not_null
      - name: tarif_factu
        description: "Tarif de l'intervention"
        tests:
          - not_null

  - name: ref_nesp_tech__articles_prix
    description: "Référentiel des articles techniques avec prix unitaires"
    config:
      column_types:
        article_ref_nomad: STRING
        article_desc: STRING
        article_ref_cordon: STRING
        article_prix_unitaire: FLOAT64
    columns:
      - name: article_ref_nomad
        description: "Référence interne NOMAD de l'article"
        tests:
          - not_null
          - unique
      - name: article_desc
        description: "Description de l'article"
      - name: article_ref_cordon
        description: "Référence CORDON associée à l'article"
      - name: article_prix_unitaire
        description: "Prix unitaire de l'article"
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: " >= 0"

  - name: ref_nesp_tech__objectifs_volumes
    description: "Reference data table for volume objectives by intervention type and machine type."
    config:
      column_types:
        obj_vol_annee: INT64
        obj_vol_anneemois: STRING
        obj_vol_mois: INT64
        obj_vol_objectif_valeur: INT64
    columns:
      - name: obj_vol_annee
        description: "Year of the objective (e.g. 2025)."
        data_tests:
          - not_null
      - name: obj_vol_anneemois
        description: "Year-month of the objective in YYYYMM format (e.g. 202501)."
        data_tests:
          - not_null
      - name: obj_vol_mois
        description: "Month number (1-12)."
        data_tests:
          - not_null
      - name: obj_vol_type_inter
        description: "Technical intervention type key (e.g. curative)."
        data_tests:
          - not_null
      - name: obj_vol_type_machine
        description: "Technical machine type key (e.g. momento)."
        data_tests:
          - not_null
      - name: obj_vol_key_item
        description: "Surrogate key combining intervention type and machine type (e.g. curative_momento)."
        data_tests:
          - not_null
      - name: obj_vol_alias_type_inter
        description: "Display label for the intervention type (e.g. CURATIVE)."
        data_tests:
          - not_null
      - name: obj_vol_alias_type_machine
        description: "Display label for the machine type (e.g. MOMENTO)."
        data_tests:
          - not_null
      - name: obj_vol_grp_machine
        description: "Machine group category (e.g. TRANSPORTABLES)."
        data_tests:
          - not_null
      - name: obj_vol_objectif_valeur
        description: "Target volume value for the given period and machine/intervention combination."
        data_tests:
          - not_null
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - obj_vol_anneemois
              - obj_vol_key_item
              
