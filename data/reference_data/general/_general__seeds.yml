version: 2

seeds:
  - name: ref_general__feries_metropole
    description: "Liste des jours fériés en métropole"
    config:
      column_types:
        annee: INT64
        mois: STRING
        date_ferie: DATE
        nom_jour_ferie: STRING
    columns:
      - name: annee
        description: "Année"
        tests:
          - not_null
      - name: mois
        description: "Mois en toutes lettres (janvier, février, etc.)"
        tests:
          - not_null
      - name: date_ferie
        description: "Date du jour férié"
        tests:
          - not_null
      - name: nom_jour_ferie
        description: "Nom du jour férié"
        tests:
          - not_null
