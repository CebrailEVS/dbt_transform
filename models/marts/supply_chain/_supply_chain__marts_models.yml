version: 2

models:
  - name: fct_supply_chain__stock_neshu
    description: |
      [QUOI MÉTIER] Stock théorique journalier des produits Neshu, par véhicule roadman et par dépôt.
      [COMMENT CONSTRUITE] Issu de stg_oracle_neshu_gcs__stock_theorique (export GCS quotidien Oracle Neshu), filtré sur les dépôts 01–05, 10, 13 (entity_type='company') et les véhicules actifs (resources_type='VEHICLE' et is_active via dim_neshu__resource). is_out_of_stock dérivé de stock_at_date=0. dpa fallback sur purchase_price si manquant.
      [GRAIN] 1 ligne par (id_entity, product_code, date_system).
      [NOTES] Source GCS = export Oracle vers Cloud Storage. plus/moins = écarts d'inventaire vs théorique.
    columns:
      - name: id_entity
        description: "Identifiant de l'entité (ressource ou dépôt)"
        tests:
          - not_null
      - name: entity_name
        description: "Nom de l'entité (en lowercase)"
      - name: entity_type
        description: "Type de l'entité (en lowercase)"
      - name: date_system
        description: "Date du système d'inventaire théorique (TIMESTAMP)"
        tests:
          - not_null
      - name: entity_code
        description: "Code de la ressource ou dépôt"
      - name: product_code
        description: "Code du produit"
        tests:
          - not_null
      - name: product_name
        description: "Nom du produit"
      - name: is_out_of_stock
        description: "Boolean qui vaut TRUE si le stock_at_date est 0 pour un produit, FALSE sinon"
      - name: date_inventaire
        description: "Date du dernier inventaire réalisé (TIMESTAMP)"
      - name: stock_inventaire
        description: "Stock inventaire réel ou théorique à la date donnée"
      - name: plus
        description: "Quantité en plus par rapport au stock théorique"
      - name: moins
        description: "Quantité en moins par rapport au stock théorique"
      - name: stock_at_date
        description: "Stock théorique à la date donnée"
      - name: dpa
        description: "Dernier prix d'achat"
      - name: purchase_price
        description: "Prix d'achat unitaire"
      - name: extraction_timestamp
        description: "Timestamp d'extraction des données (TIMESTAMP)"

  - name: fct_supply_chain__stock_lcdp
    description: |
      [QUOI MÉTIER] Stock théorique journalier des produits LCDP, par véhicule et par dépôt.
      [COMMENT CONSTRUITE] Issu de stg_oracle_lcdp_gcs__stock_theorique (export GCS quotidien Oracle LCDP, 23h15 Paris). Aucun filtre : les 11 dépôts (entity_type='company') et tous les véhicules (entity_type='resource') sont exposés. is_active aplati depuis dim_lcdp__resource pour les véhicules (FALSE si absent de la dim), NULL pour les dépôts. is_out_of_stock dérivé de stock_at_date=0. dpa fallback sur purchase_price si manquant.
      [GRAIN] 1 ligne par (id_entity, product_code, date_system).
      [NOTES] Source GCS = export Oracle vers Cloud Storage, démarré le 2026-06-04 (pas d'historique antérieur). plus/moins = écarts d'inventaire vs théorique. Stocks négatifs possibles (stock théorique). date_inventaire NULL ≈ 30 % (entités/produits jamais inventoriés).
    columns:
      - name: id_entity
        description: "Identifiant de l'entité (véhicule ou dépôt)"
        tests:
          - not_null
      - name: entity_type
        description: "Type de l'entité : company (dépôt) ou resource (véhicule)"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['company', 'resource']
      - name: entity_code
        description: "Code de la ressource (immatriculation véhicule), NULL pour les dépôts"
      - name: entity_name
        description: "Nom de l'entité (en lowercase)"
      - name: is_active
        description: "TRUE si le véhicule porte le label ISACTIVE=YES, FALSE sinon. NULL pour les dépôts"
      - name: product_code
        description: "Code du produit"
        tests:
          - not_null
      - name: product_name
        description: "Nom du produit"
      - name: stock_at_date
        description: "Stock théorique à la date donnée"
      - name: is_out_of_stock
        description: "Boolean qui vaut TRUE si le stock_at_date est 0 pour un produit, FALSE sinon"
      - name: date_inventaire
        description: "Date du dernier inventaire réalisé (TIMESTAMP), NULL si jamais inventorié"
      - name: stock_inventaire
        description: "Stock constaté au dernier inventaire"
      - name: plus
        description: "Quantité en plus par rapport au stock inventaire"
      - name: moins
        description: "Quantité en moins par rapport au stock inventaire"
      - name: dpa
        description: "Dernier prix d'achat (fallback purchase_price si manquant)"
      - name: purchase_price
        description: "Prix d'achat unitaire"
      - name: date_system
        description: "Date du système d'inventaire théorique (TIMESTAMP), colonne de partition"
        tests:
          - not_null
      - name: extracted_at
        description: "Timestamp d'extraction des données (TIMESTAMP)"
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - id_entity
              - product_code
              - date_system
      # cohérence : le stock théorique se déduit de l'inventaire et des écarts
      - dbt_utils.expression_is_true:
          arguments:
            expression: >
              stock_at_date = coalesce(stock_inventaire, 0) + coalesce(plus, 0) - coalesce(moins, 0)

  - name: fct_supply_chain__stock_yuman
    description: |
      [QUOI MÉTIER] Stock journalier des pièces détachées Yuman, par technicien et par dépôt.
      [COMMENT CONSTRUITE] Lecture directe de stg_yuman_gcs__stock_theorique (export GCS quotidien Yuman), avec conversion export_date → DATE et filtre sur reference et nom_du_stock non NULL. type_stock classe chaque emplacement en DEPOT/TECHNICIEN via la macro yuman_stock_type.
      [GRAIN] 1 ligne par (reference, stock, stock_date).
      [NOTES] stock = libellé du stock physique (technicien ou dépôt Yuman). Ne contient que des lignes en stock (quantite > 0) : les ruptures (sans emplacement) sont exclues et exposées au grain article dans fct_supply_chain__stock_article_yuman.
    columns:
      - name: reference
        description: "Référence de l'article"
        tests:
          - not_null
      - name: designation
        description: "Désignation de l'article"
      - name: stock
        description: "Nom du stock (dépôt ou technicien)"
      - name: type_stock
        description: "Type d'emplacement : DEPOT (4 sites) ou TECHNICIEN (van), dérivé du libellé du stock via la macro yuman_stock_type"
        tests:
          - accepted_values:
              arguments:
                values: [DEPOT, TECHNICIEN]
      - name: quantite
        description: "Quantité de l'article dans le stock"
      - name: stock_date
        description: "Date du stock (TIMESTAMP)"
        tests:
          - not_null

  - name: fct_supply_chain__stock_article_yuman
    description: |
      [QUOI MÉTIER] Stock journalier des articles Yuman au niveau **article** (tous magasins agrégés), avec le drapeau de rupture. Répond à « quels articles sont en rupture totale » et sert de base à un futur taux de disponibilité article.
      [COMMENT CONSTRUITE] Agrégation de stg_yuman_gcs__stock_theorique par (reference, date). Chaque emplacement (nom_du_stock) est classé DÉPÔT (libellé contenant 'DEPOT', 4 sites) ou TECHNICIEN (van, actif 'ST - …' ou inactif). total_quantity = somme tous emplacements ; depot_quantity / technicien_quantity = sommes ventilées ; is_out_of_stock = total nul (absent partout) ; is_out_of_stock_depot = total dépôt nul (indisponible au réappro). Contrairement au mart par magasin, AUCUN filtre sur nom_du_stock : les lignes de rupture (quantite = 0, sans emplacement en source) sont conservées.
      [GRAIN] 1 ligne par (reference, stock_date).
      [NOTES] ⚠️ Spécificité Yuman : la rupture n'existe qu'au niveau **article**, pas par emplacement (l'export ne localise pas une rupture — contrairement à Neshu où stock_neshu la porte par entité). Les emplacements mêlent **dépôts ET techniciens** : un article présent uniquement chez un technicien est en stock globalement (is_out_of_stock = false) mais en rupture dépôt (is_out_of_stock_depot = true) → pour le réappro, se fier à is_out_of_stock_depot ; is_out_of_stock_technicien donne la vue terrain (vans). Invariant : is_out_of_stock = is_out_of_stock_depot AND is_out_of_stock_technicien. La distinction dépôt/technicien n'est possible que sur les lignes en stock (quantite > 0, seules à porter un emplacement) ; une rupture totale (quantite = 0) arrive sans emplacement et compte comme vide des deux côtés. Classification dépôt/technicien = heuristique sur le libellé ('DEPOT'). Le détail par emplacement reste dans fct_supply_chain__stock_yuman. La désignation est résolue au grain référence en écartant les libellés-marqueur (voir macro yuman_is_marqueur_designation).
    columns:
      - name: stock_date
        description: "Date du stock (DATE), colonne de partition"
        tests:
          - not_null
      - name: reference
        description: "Référence de l'article"
        tests:
          - not_null
      - name: designation
        description: >
          Désignation de l'article, résolue au grain **référence** (même libellé sur toutes les dates).
          Quand une référence porte plusieurs libellés en source, les libellés « marqueur »
          (« NE PAS UTILISER », « OLD … », « Remplacé par … ») sont écartés via la macro
          yuman_is_marqueur_designation ; fallback min() si la référence n'a que des marqueurs.
      - name: is_out_of_stock
        description: "TRUE si l'article est en rupture totale ce jour-là (aucun emplacement, dépôt ni technicien, total_quantity = 0). Vaut is_out_of_stock_depot AND is_out_of_stock_technicien."
      - name: is_out_of_stock_depot
        description: "TRUE si l'article n'est en stock dans aucun dépôt ce jour-là (depot_quantity = 0), même s'il reste du stock chez des techniciens. Indicateur de rupture pour le réappro."
      - name: is_out_of_stock_technicien
        description: "TRUE si l'article n'est en stock chez aucun technicien ce jour-là (technicien_quantity = 0), même s'il reste du stock en dépôt. Indicateur de disponibilité terrain (vans)."
      - name: total_quantity
        description: "Quantité totale de l'article, agrégée sur tous les emplacements (dépôts + techniciens ; 0 si rupture)"
      - name: depot_quantity
        description: "Quantité de l'article dans les dépôts uniquement (0 si aucun dépôt approvisionné)"
      - name: technicien_quantity
        description: "Quantité de l'article dans les stocks techniciens uniquement (total_quantity − depot_quantity)"
      - name: nb_depots_en_stock
        description: "Nombre de dépôts où l'article a une quantité > 0 ce jour-là"
      - name: nb_techniciens_en_stock
        description: "Nombre de stocks techniciens où l'article a une quantité > 0 ce jour-là"
      - name: dbt_updated_at
        description: "Timestamp de reconstruction de la table"
      - name: dbt_invocation_id
        description: "Identifiant du run dbt ayant produit la ligne"
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - reference
              - stock_date
      # cohérence des drapeaux de rupture vs les mesures agrégées
      - dbt_utils.expression_is_true:
          arguments:
            expression: "is_out_of_stock = (total_quantity = 0)"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "is_out_of_stock_depot = (depot_quantity = 0)"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "is_out_of_stock_technicien = (technicien_quantity = 0)"
      # invariant : rupture globale = rupture dépôt ET rupture technicien
      - dbt_utils.expression_is_true:
          arguments:
            expression: "is_out_of_stock = (is_out_of_stock_depot and is_out_of_stock_technicien)"

  - name: fct_supply_chain__disponibilite_article_neshu_depot_mensuel
    description: |
      [QUOI MÉTIER] Taux de disponibilité mensuel des articles dans les dépôts Neshu : part des jours du mois où l'article était en stock (> 0).
      [COMMENT CONSTRUITE] Agrégation mensuelle de fct_supply_chain__stock_neshu filtré sur les dépôts (entity_type='company'). jours_observes = nb de jours où le couple dépôt/article est référencé dans les données ; jours_disponibles = nb de jours référencés où is_out_of_stock=false. taux = jours_disponibles / jours_observes. mois = date_trunc à month.
      [GRAIN] 1 ligne par (mois, dépôt, article).
      [NOTES] Le taux est calculé depuis le 1er référencement de l'article dans le dépôt (dénominateur = jours référencés), pas sur le mois calendaire : un article arrivé en cours de mois et jamais en rupture affiche 100 %, sans pénalité pour les jours antérieurs à son arrivée. Le mois en cours est partiel (taux à interpréter avec jours_observes). Clé métier = product_code ; entity_name/entity_code/product_name reflètent le libellé du snapshot le plus récent du mois (un article peut être renommé en cours de mois sans changer de code).
    columns:
      - name: mois
        description: "Premier jour du mois (DATE)"
        tests:
          - not_null
      - name: company_id
        description: "Identifiant du dépôt (FK vers dim_neshu__company)"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_neshu__company')
                field: company_id
              config:
                severity: warn
      - name: entity_code
        description: "Code du dépôt"
      - name: entity_name
        description: "Nom du dépôt (en lowercase)"
      - name: product_code
        description: "Code du produit"
        tests:
          - not_null
      - name: product_name
        description: "Nom du produit"
      - name: jours_observes
        description: "Nombre de jours du mois où le couple dépôt/article est référencé dans les données"
      - name: jours_disponibles
        description: "Nombre de jours référencés du mois où l'article était en stock (is_out_of_stock=false)"
      - name: taux_disponibilite_pct
        description: "Taux de disponibilité mensuel en % : jours_disponibles / jours_observes * 100"
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - mois
              - company_id
              - product_code
      # cohérence : on ne peut pas être disponible plus de jours que de jours observés
      - dbt_utils.expression_is_true:
          arguments:
            expression: "jours_disponibles <= jours_observes"
      # cohérence : un taux est un pourcentage
      - dbt_utils.expression_is_true:
          arguments:
            expression: "taux_disponibilite_pct between 0 and 100"

  - name: fct_supply_chain__disponibilite_article_neshu_vehicule_mensuel
    description: |
      [QUOI MÉTIER] Taux de disponibilité mensuel des articles dans les véhicules Neshu : part des jours du mois où l'article était en stock (> 0) à bord du véhicule.
      [COMMENT CONSTRUITE] Agrégation mensuelle de fct_supply_chain__stock_neshu filtré sur les véhicules (entity_type='resource' ; le filtre resources_type='VEHICLE' et is_active est appliqué en amont). jours_observes = nb de jours où le couple véhicule/article est référencé dans les données ; jours_disponibles = nb de jours référencés où is_out_of_stock=false. taux = jours_disponibles / jours_observes. mois = date_trunc à month.
      [GRAIN] 1 ligne par (mois, véhicule, article).
      [NOTES] Le taux est calculé depuis le 1er référencement de l'article dans le véhicule (dénominateur = jours référencés), pas sur le mois calendaire : un article arrivé en cours de mois et jamais en rupture affiche 100 %, sans pénalité pour les jours antérieurs à son arrivée. Le mois en cours est partiel (taux à interpréter avec jours_observes). Clé métier = product_code ; entity_name/entity_code/product_name reflètent le libellé du snapshot le plus récent du mois (un article peut être renommé en cours de mois sans changer de code).
    columns:
      - name: mois
        description: "Premier jour du mois (DATE)"
        tests:
          - not_null
      - name: resources_id
        description: "Identifiant du véhicule (FK vers dim_neshu__resource)"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_neshu__resource')
                field: resources_id
              config:
                severity: warn
      - name: entity_code
        description: "Code du véhicule"
      - name: entity_name
        description: "Nom du véhicule (en lowercase)"
      - name: product_code
        description: "Code du produit"
        tests:
          - not_null
      - name: product_name
        description: "Nom du produit"
      - name: jours_observes
        description: "Nombre de jours du mois où le couple véhicule/article est référencé dans les données"
      - name: jours_disponibles
        description: "Nombre de jours référencés du mois où l'article était en stock (is_out_of_stock=false)"
      - name: taux_disponibilite_pct
        description: "Taux de disponibilité mensuel en % : jours_disponibles / jours_observes * 100"
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - mois
              - resources_id
              - product_code
      # cohérence : on ne peut pas être disponible plus de jours que de jours observés
      - dbt_utils.expression_is_true:
          arguments:
            expression: "jours_disponibles <= jours_observes"
      # cohérence : un taux est un pourcentage
      - dbt_utils.expression_is_true:
          arguments:
            expression: "taux_disponibilite_pct between 0 and 100"

  - name: fct_supply_chain__flux_neshu
    description: |
      [QUOI MÉTIER] Flux supply Neshu mensuels (stocks dépôts/véhicules + réceptions/livraisons/chargements).
      [COMMENT CONSTRUITE] Consolidation de 7 sources Oracle Neshu : inventaires (int_oracle_neshu__inventaire_tasks, prioritaires si VALIDE), stocks théoriques (stg_oracle_neshu_gcs__stock_theorique, fallback si pas d'inventaire), réceptions fournisseurs, livraisons clients, livraisons internes (véhicule/anim/prépa/périmé), chargements machines. Pour chaque source/mois, la date de référence inventaire est le dernier inventaire du mois sinon le premier des 5 jours du mois suivant. Agrégation mensuelle (date_trunc à month).
      [GRAIN] 1 ligne par mois_date (premier jour du mois).
      [NOTES] Démarrage des flux : 2025-01-01. Démarrage inventaires : 2024-12-01. stock_total = stock_depot + stock_vehicule (cohérence testée).

    columns:

      # =========================
      # DIMENSIONS TEMPORELLES
      # =========================
      - name: mois_date
        description: >
          Date du mois (premier jour du mois) utilisée pour la partition BigQuery
          et la granularité principale du modèle.
        tests:
          - not_null
          - unique

      - name: annee
        description: Année extraite de mois_date
        tests:
          - not_null

      - name: mois
        description: Numéro du mois (1 à 12)
        tests:
          - not_null

      # =========================
      # STOCKS REELS
      # =========================
      - name: stock_depot_rungis
        description: Stock réel valorisé du dépôt de Rungis issu des inventaires

      - name: stock_depot_lyon
        description: Stock réel valorisé du dépôt de Lyon issu des inventaires

      - name: stock_depot_marseille
        description: Stock réel valorisé du dépôt de Marseille issu des inventaires

      - name: stock_depot
        description: Somme des stocks réels des dépôts (Rungis + Lyon + Marseille)

      - name: stock_vehicule
        description: Stock réel valorisé embarqué dans les véhicules

      - name: stock_total
        description: Stock total réel (dépôts + véhicules)

      # =========================
      # STOCKS THEORIQUES
      # =========================
      - name: stocks_theoriques_anim
        description: >
          Stock théorique des centres ANIM (utilisé uniquement en absence d'inventaire réel)

      - name: stocks_theoriques_prepa
        description: >
          Stock théorique des centres de préparation (PREPA)

      - name: stocks_theoriques_autre
        description: >
          Stock théorique des autres sources (principalement véhicules)

      # =========================
      # FLUX ENTRANTS
      # =========================
      - name: reception_fournisseur
        description: >
          Valeur des réceptions fournisseurs (entrées de stock externes)

      # =========================
      # FLUX SORTANTS
      # =========================
      - name: livraison_client
        description: >
          Valeur des livraisons vers les clients finaux

      - name: livraison_vehicule
        description: >
          Flux de livraison interne vers véhicules ou sites assimilés

      - name: livraison_anim
        description: >
          Flux de livraison interne vers centres ANIM

      - name: livraison_prepa
        description: >
          Flux de livraison interne vers centres de préparation

      - name: livraison_perime
        description: >
          Flux sortant vers destruction / rebut / périmé

      - name: livraison_interne_autre
        description: >
          Autres flux internes non catégorisés

      # =========================
      # AUTRES FLUX
      # =========================
      - name: chargement_machine
        description: >
          Valeur des chargements de machines (approvisionnement terrain)

    # =========================
    # TESTS AU NIVEAU MODELE
    # =========================
    tests:

      # cohérence simple : stock total = depot + véhicule
      - dbt_utils.expression_is_true:
          arguments:
            expression: "stock_total = stock_depot + stock_vehicule"

      # cohérence : pas de valeurs négatives sur les stocks
      - dbt_utils.expression_is_true:
          arguments:
            expression: "stock_depot >= 0 and stock_vehicule >= 0"

      # cohérence : flux principaux non négatifs
      - dbt_utils.expression_is_true:
          arguments:
            expression: "reception_fournisseur >= 0 and livraison_client >= 0"

  - name: fct_supply_chain__couverture_stock_neshu
    description: |
      [QUOI MÉTIER] Couverture de stock et suggestion de réapprovisionnement par dépôt et article Neshu : nombre de jours de stock restants au rythme de consommation de l'an dernier à la même saison, statut feu tricolore (RUPTURE TOTALE / RUPTURE / VIGILANCE / OK / NON CONSOMME), et quantité suggérée à commander.
      [COMMENT CONSTRUITE] Stock actuel = dernier snapshot de fct_supply_chain__stock_neshu (dépôts entity_type='company', hors DEPOTREBUS / DEPOTPERIMES). Consommation = somme des sorties clients (int_oracle_neshu__livraison_tasks) et des chargements véhicules (int_oracle_neshu__livraison_interne_tasks, product_source_type='COMPANY' ET product_destination_type!='COMPANY' pour neutraliser les transferts inter-dépôts), statuts FAIT+VALIDE, sur une fenêtre centrée mois N-1 ± 1 (3 mois, pour lisser les faibles rotations), en quantité déconditionnée à l'unité (quantity = real_quantity * unit_coeff_multi / unit_coeff_div ; base_unit_quantity = nb de colis, à ne PAS utiliser). conso_journaliere_n1 = conso de la fenêtre / nb de jours réel de la fenêtre. jours_couverture = stock_actuel / conso_journaliere_n1. FULL OUTER stock⋈conso : un article consommé sur la fenêtre mais absent du stock du jour remonte en RUPTURE TOTALE (stock_actuel=0). product_id/product_name aplatis depuis dim_neshu__product. Produits explicitement arrêtés exclus (product_exploit='NON') ; les NULL (champ non renseigné) sont conservés pour ne pas masquer de ruptures réelles — à basculer en product_exploit='OUI' quand le champ sera complété à la source. Cible de réappro = délai fournisseur (7j) + couverture (21j) = 28j. Seuils/cible paramétrables via vars dbt couverture_seuil_min_jours / couverture_seuil_max_jours / couverture_cible_jours (défauts 14 / 28 / 28).
      [GRAIN] 1 ligne par (date_calcul, company_id, product_code).
      [NOTES] V2. Ne tient PAS encore compte des commandes fournisseurs en cours (pas de source dispo aujourd'hui — logique Distrilog notée pour plus tard : type=Bon de commande fournisseur, statut FAIT/VALIDE, statut livraison=En attente). statut='RUPTURE TOTALE' si demande sur la fenêtre mais stock_actuel<=0 (absent du snapshot ou stock théorique négatif), affiché en tête. statut='NON CONSOMME' si aucune conso sur la fenêtre → jours_couverture NULL et qte_a_commander forcée à 0 (même si stock négatif). date_calcul = date d'exécution (photo du jour, non historisée).
    columns:
      - name: date_calcul
        description: "Date d'exécution du calcul (DATE), colonne de partition"
        tests:
          - not_null
      - name: company_id
        description: "Identifiant du dépôt (FK vers dim_neshu__company)"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_neshu__company')
                field: company_id
              config:
                severity: warn
      - name: entity_code
        description: "Code du dépôt"
      - name: entity_name
        description: "Nom du dépôt (en lowercase)"
      - name: product_code
        description: "Code du produit"
        tests:
          - not_null
      - name: product_id
        description: "Identifiant du produit (FK vers dim_neshu__product). NULL si le code n'existe pas dans la dim"
        tests:
          - relationships:
              arguments:
                to: ref('dim_neshu__product')
                field: product_id
              config:
                severity: warn
      - name: product_name
        description: "Nom du produit (aplati depuis dim_neshu__product). NULL si le code n'existe pas dans la dim"
      - name: stock_actuel
        description: "Stock théorique de l'article dans le dépôt au dernier snapshot (déconditionné). 0 si l'article est absent du snapshot mais consommé sur la fenêtre"
      - name: conso_journaliere_n1
        description: "Consommation journalière estimée = conso de la fenêtre N-1 ± 1 / nb de jours de la fenêtre"
      - name: conso_mensuelle_moy_n1
        description: "Consommation mensuelle moyenne équivalente sur la fenêtre = conso_journaliere_n1 * 30,4 (indicatif)"
      - name: jours_couverture
        description: "Nombre de jours de stock restants = stock_actuel / conso_journaliere_n1. NULL si aucune conso sur la fenêtre"
      - name: statut
        description: "Feu tricolore : RUPTURE TOTALE (demande mais stock<=0), RUPTURE (< seuil min), VIGILANCE (entre seuils), OK (> seuil max), NON CONSOMME (aucune conso sur la fenêtre)"
        tests:
          - accepted_values:
              arguments:
                values: ['RUPTURE TOTALE', 'RUPTURE', 'VIGILANCE', 'OK', 'NON CONSOMME']
      - name: qte_a_commander
        description: "Quantité suggérée pour atteindre la cible de couverture = max(0, conso_journaliere_n1 * cible - stock_actuel). 0 si aucune conso sur la fenêtre"
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - date_calcul
              - company_id
              - product_code
      # cohérence : la consommation est une somme de sorties, jamais négative
      - dbt_utils.expression_is_true:
          arguments:
            expression: "conso_journaliere_n1 >= 0"
      # cohérence : une quantité à commander ne peut pas être négative
      - dbt_utils.expression_is_true:
          arguments:
            expression: "qte_a_commander >= 0"
      # cohérence : RUPTURE TOTALE <=> demande réelle mais aucun stock vendable
      - dbt_utils.expression_is_true:
          arguments:
            expression: "statut != 'RUPTURE TOTALE' or (conso_journaliere_n1 > 0 and stock_actuel <= 0)"
