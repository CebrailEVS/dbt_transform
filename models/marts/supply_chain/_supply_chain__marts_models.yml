version: 2

models:
  - name: fct_supply_chain__stock_neshu
    description: |
      [QUOI MÉTIER] Stock théorique journalier des produits Neshu, par véhicule roadman et par dépôt.
      [COMMENT CONSTRUITE] Issu de stg_oracle_neshu_gcs__stock_theorique (export GCS quotidien Oracle Neshu), filtré sur les dépôts 01–05, 10, 13 (entity_type='company') et les véhicules actifs (resources_type='VEHICLE' et is_active via dim_neshu__resource). is_out_of_stock dérivé de stock_at_date=0. dpa fallback sur purchase_price si manquant.
      [GRAIN] 1 ligne par (id_entity, product_code, date_system).
      [NOTES] Source GCS = export Oracle vers Cloud Storage. plus/moins = écarts d'inventaire vs théorique.
    columns:
      - name: id_entity
        description: "Identifiant de l'entité (ressource ou dépôt)"
        tests:
          - not_null
      - name: entity_name
        description: "Nom de l'entité (en lowercase)"
      - name: entity_type
        description: "Type de l'entité (en lowercase)"
      - name: date_system
        description: "Date du système d'inventaire théorique (TIMESTAMP)"
        tests:
          - not_null
      - name: entity_code
        description: "Code de la ressource ou dépôt"
      - name: product_code
        description: "Code du produit"
        tests:
          - not_null
      - name: product_name
        description: "Nom du produit"
      - name: is_out_of_stock
        description: "Boolean qui vaut TRUE si le stock_at_date est 0 pour un produit, FALSE sinon"
      - name: date_inventaire
        description: "Date du dernier inventaire réalisé (TIMESTAMP)"
      - name: stock_inventaire
        description: "Stock inventaire réel ou théorique à la date donnée"
      - name: plus
        description: "Quantité en plus par rapport au stock théorique"
      - name: moins
        description: "Quantité en moins par rapport au stock théorique"
      - name: stock_at_date
        description: "Stock théorique à la date donnée"
      - name: dpa
        description: "Dernier prix d'achat"
      - name: purchase_price
        description: "Prix d'achat unitaire"
      - name: extraction_timestamp
        description: "Timestamp d'extraction des données (TIMESTAMP)"

  - name: fct_supply_chain__stock_lcdp
    description: |
      [QUOI MÉTIER] Stock théorique journalier des produits LCDP, par véhicule et par dépôt.
      [COMMENT CONSTRUITE] Issu de stg_oracle_lcdp_gcs__stock_theorique (export GCS quotidien Oracle LCDP, 23h15 Paris). Aucun filtre : les 11 dépôts (entity_type='company') et tous les véhicules (entity_type='resource') sont exposés. is_active aplati depuis dim_lcdp__resource pour les véhicules (FALSE si absent de la dim), NULL pour les dépôts. is_out_of_stock dérivé de stock_at_date=0. dpa fallback sur purchase_price si manquant.
      [GRAIN] 1 ligne par (id_entity, product_code, date_system).
      [NOTES] Source GCS = export Oracle vers Cloud Storage, démarré le 2026-06-04 (pas d'historique antérieur). plus/moins = écarts d'inventaire vs théorique. Stocks négatifs possibles (stock théorique). date_inventaire NULL ≈ 30 % (entités/produits jamais inventoriés).
    columns:
      - name: id_entity
        description: "Identifiant de l'entité (véhicule ou dépôt)"
        tests:
          - not_null
      - name: entity_type
        description: "Type de l'entité : company (dépôt) ou resource (véhicule)"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['company', 'resource']
      - name: entity_code
        description: "Code de la ressource (immatriculation véhicule), NULL pour les dépôts"
      - name: entity_name
        description: "Nom de l'entité (en lowercase)"
      - name: is_active
        description: "TRUE si le véhicule porte le label ISACTIVE=YES, FALSE sinon. NULL pour les dépôts"
      - name: product_code
        description: "Code du produit"
        tests:
          - not_null
      - name: product_name
        description: "Nom du produit"
      - name: stock_at_date
        description: "Stock théorique à la date donnée"
      - name: is_out_of_stock
        description: "Boolean qui vaut TRUE si le stock_at_date est 0 pour un produit, FALSE sinon"
      - name: date_inventaire
        description: "Date du dernier inventaire réalisé (TIMESTAMP), NULL si jamais inventorié"
      - name: stock_inventaire
        description: "Stock constaté au dernier inventaire"
      - name: plus
        description: "Quantité en plus par rapport au stock inventaire"
      - name: moins
        description: "Quantité en moins par rapport au stock inventaire"
      - name: dpa
        description: "Dernier prix d'achat (fallback purchase_price si manquant)"
      - name: purchase_price
        description: "Prix d'achat unitaire"
      - name: date_system
        description: "Date du système d'inventaire théorique (TIMESTAMP), colonne de partition"
        tests:
          - not_null
      - name: extracted_at
        description: "Timestamp d'extraction des données (TIMESTAMP)"
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - id_entity
              - product_code
              - date_system
      # cohérence : le stock théorique se déduit de l'inventaire et des écarts
      - dbt_utils.expression_is_true:
          arguments:
            expression: >
              stock_at_date = coalesce(stock_inventaire, 0) + coalesce(plus, 0) - coalesce(moins, 0)

  - name: fct_supply_chain__stock_yuman
    description: |
      [QUOI MÉTIER] Stock journalier des pièces détachées Yuman, par technicien et par dépôt.
      [COMMENT CONSTRUITE] Lecture directe de stg_yuman_gcs__stock_theorique (export GCS quotidien Yuman), avec conversion export_date → DATE et filtre sur reference et nom_du_stock non NULL. type_stock classe chaque emplacement en DEPOT/TECHNICIEN via la macro yuman_stock_type.
      [GRAIN] 1 ligne par (reference, stock, stock_date).
      [NOTES] stock = libellé du stock physique (technicien ou dépôt Yuman). Ne contient que des lignes en stock (quantite > 0) : les ruptures (sans emplacement) sont exclues — le suivi des ruptures se fait par dépôt sur l'assortiment attendu dans fct_supply_chain__rupture_depot_yuman.
    columns:
      - name: reference
        description: "Référence de l'article"
        tests:
          - not_null
      - name: designation
        description: "Désignation de l'article"
      - name: stock
        description: "Nom du stock (dépôt ou technicien)"
      - name: type_stock
        description: "Type d'emplacement : DEPOT (4 sites) ou TECHNICIEN (van), dérivé du libellé du stock via la macro yuman_stock_type"
        tests:
          - accepted_values:
              arguments:
                values: [DEPOT, TECHNICIEN]
      - name: quantite
        description: "Quantité de l'article dans le stock"
      - name: stock_date
        description: "Date du stock (TIMESTAMP)"
        tests:
          - not_null

  - name: fct_supply_chain__rupture_depot_yuman
    description: |
      [QUOI MÉTIER] Suivi quotidien des ruptures de stock par dépôt Yuman, sur l'assortiment attendu de chaque dépôt. Répond à « quel dépôt doit réapprovisionner quelles références » et permet un taux de disponibilité par dépôt dans le temps. Règle métier validée avec la logistique (V. — juillet 2026).

      [COMMENT CONSTRUITE] La rupture par dépôt n'existe pas en source (une rupture Yuman arrive sans emplacement) : elle est reconstruite. Assortiment attendu d'un dépôt = références consommées ≥ 2 fois sur les 180 jours glissants précédant chaque date d'export, par les techniciens rattachés au dépôt (dim_technique__technician.entrepot_rattachement). La consommation unit deux flux disjoints : les bons Yuman (fct_technique__consommation_article_yuman, filtré intervention_state REALISEE/EN_COURS — une conso saisie sur un workorder non réalisé ou en pause n'est pas une sortie sûre) et les interventions Nespresso (fct_technique__consommation_article_nespresso, sans filtre d'état — une ligne article = une pose réelle ; date de conso = date_heure_fin ; agences EVS). Pour chaque (date, dépôt, référence) de l'assortiment, le stock du jour (stg_yuman_gcs__stock_theorique) est ventilé : dépôt lui-même, autres dépôts, vans des techniciens du dépôt (mapping van→technicien via storehouses_name), tous vans. Absence de ligne de stock = quantité 0. Pseudo-références de saisie d'intervention exclues via le seed ref_yuman__pseudo_article.

      [GRAIN] 1 ligne par (stock_date, depot, reference) — tout l'assortiment, en stock ou non.

      [NOTES] Pas de transfert inter-dépôt en pratique : toute rupture renvoie vers une commande fournisseur, rupture_statut sert à prioriser (RUPTURE_TOTALE = plus rien nulle part ; STOCK_RESTANT_VANS = les vans du dépôt portent l'autonomie terrain restante ; STOCK_AILLEURS = informatif). Le rattachement technicien→dépôt est l'état courant (dim Type 1), appliqué à tout l'historique ; ~4 % des consommations (techniciens désactivés, comptes ASTREINTE, sans rattachement) sont hors périmètre. Le dépôt de Strasbourg n'a pas de technicien rattaché (secteur Est rattaché à Lyon/Dardilly) : il est structurellement absent. Les exports stock sont quotidiens sauf dimanche : les taux de disponibilité se calculent en jours observés. Le flux de conso Nespresso est extrait chaque lundi (fenêtre 7 jours glissants) : la fenêtre d'assortiment de 180 j absorbe ce décalage hebdomadaire sans biais.
    columns:
      - name: stock_date
        description: "Date de l'export stock Yuman (DATE), colonne de partition"
        tests:
          - not_null
      - name: depot
        description: "Libellé du dépôt Yuman (nom_du_stock), clé du grain"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - "06 - ATELIER RUNGIS DEPOT"
                  - "07 - ATELIER LYON DEPOT"
                  - "08 - ATELIER BORDEAUX DEPOT"
                  - "09 - ATELIER STRASBOURG DEPOT"
              config:
                severity: warn
      - name: reference
        description: "Référence de l'article, clé du grain"
        tests:
          - not_null
      - name: designation
        description: "Désignation de l'article, résolue au grain référence (libellés-marqueur écartés via yuman_is_marqueur_designation)"
      - name: rupture_statut
        description: "Qualification de la rupture pour la priorisation, NULL si en stock. RUPTURE_TOTALE = 0 partout (commande urgente) ; STOCK_RESTANT_VANS = les vans des techniciens du dépôt ont du stock (l'autonomie terrain, qty_vans_depot, priorise la commande) ; STOCK_AILLEURS = du stock existe ailleurs (autre dépôt ou vans d'autres dépôts) mais pas chez nous — informatif, pas de transfert inter-dépôt en pratique"
        tests:
          - accepted_values:
              arguments:
                values: [RUPTURE_TOTALE, STOCK_RESTANT_VANS, STOCK_AILLEURS]
      - name: derniere_conso_date
        description: "Date de la dernière consommation de la référence par un technicien du dépôt dans la fenêtre de 180 jours"
      - name: is_out_of_stock_depot
        description: "TRUE si le dépôt n'a aucun stock de la référence ce jour-là (qty_depot = 0). C'est l'alerte de réapprovisionnement"
      - name: is_out_of_stock_global
        description: "TRUE si la référence est en rupture totale ce jour-là (aucun dépôt, aucun van)"
      - name: qty_depot
        description: "Quantité en stock dans le dépôt ce jour-là (0 si absent de l'export). Additive"
      - name: qty_vans_depot
        description: "Quantité dans les vans des techniciens rattachés au dépôt — l'autonomie terrain restante. Additive. Vans non mappés à un technicien exclus (comptés dans qty_vans_total)"
      - name: qty_vans_total
        description: "Quantité dans l'ensemble des vans techniciens, tous dépôts confondus. Additive"
      - name: qty_autres_depots
        description: "Quantité en stock dans les autres dépôts. Additive, informatif (pas de transfert inter-dépôt)"
      - name: nb_conso_180j
        description: "Nombre de consommations de la référence par les techniciens du dépôt sur les 180 jours glissants (≥ 2 par construction). Additive sur le grain, non sommable entre dates (fenêtres qui se recouvrent)"
      - name: dbt_updated_at
        description: "Timestamp de reconstruction de la table"
      - name: dbt_invocation_id
        description: "Identifiant du run dbt ayant produit la ligne"
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - stock_date
              - depot
              - reference
      # cohérence flags / mesures
      - dbt_utils.expression_is_true:
          arguments:
            expression: "is_out_of_stock_depot = (qty_depot = 0)"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "is_out_of_stock_global = (qty_depot + qty_autres_depots + qty_vans_total = 0)"
      # le statut n'est renseigné que sur les ruptures, et toujours sur les ruptures
      - dbt_utils.expression_is_true:
          arguments:
            expression: "(rupture_statut is not null) = is_out_of_stock_depot"
      # seuil d'assortiment validé métier
      - dbt_utils.expression_is_true:
          arguments:
            expression: "nb_conso_180j >= 2"
      - dbt_expectations.expect_table_row_count_to_be_between:
          arguments:
            min_value: 10000
            max_value: 2000000
          config:
            severity: warn

  - name: fct_supply_chain__disponibilite_article_neshu_depot_mensuel
    description: |
      [QUOI MÉTIER] Taux de disponibilité mensuel des articles dans les dépôts Neshu : part des jours du mois où l'article était en stock (> 0).
      [COMMENT CONSTRUITE] Agrégation mensuelle de fct_supply_chain__stock_neshu filtré sur les dépôts (entity_type='company'). jours_observes = nb de jours où le couple dépôt/article est référencé dans les données ; jours_disponibles = nb de jours référencés où is_out_of_stock=false. taux = jours_disponibles / jours_observes. mois = date_trunc à month.
      [GRAIN] 1 ligne par (mois, dépôt, article).
      [NOTES] Le taux est calculé depuis le 1er référencement de l'article dans le dépôt (dénominateur = jours référencés), pas sur le mois calendaire : un article arrivé en cours de mois et jamais en rupture affiche 100 %, sans pénalité pour les jours antérieurs à son arrivée. Le mois en cours est partiel (taux à interpréter avec jours_observes). Clé métier = product_code ; entity_name/entity_code/product_name reflètent le libellé du snapshot le plus récent du mois (un article peut être renommé en cours de mois sans changer de code).
    columns:
      - name: mois
        description: "Premier jour du mois (DATE)"
        tests:
          - not_null
      - name: company_id
        description: "Identifiant du dépôt (FK vers dim_neshu__company)"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_neshu__company')
                field: company_id
              config:
                severity: warn
      - name: entity_code
        description: "Code du dépôt"
      - name: entity_name
        description: "Nom du dépôt (en lowercase)"
      - name: product_code
        description: "Code du produit"
        tests:
          - not_null
      - name: product_name
        description: "Nom du produit"
      - name: jours_observes
        description: "Nombre de jours du mois où le couple dépôt/article est référencé dans les données"
      - name: jours_disponibles
        description: "Nombre de jours référencés du mois où l'article était en stock (is_out_of_stock=false)"
      - name: taux_disponibilite_pct
        description: "Taux de disponibilité mensuel en % : jours_disponibles / jours_observes * 100"
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - mois
              - company_id
              - product_code
      # cohérence : on ne peut pas être disponible plus de jours que de jours observés
      - dbt_utils.expression_is_true:
          arguments:
            expression: "jours_disponibles <= jours_observes"
      # cohérence : un taux est un pourcentage
      - dbt_utils.expression_is_true:
          arguments:
            expression: "taux_disponibilite_pct between 0 and 100"

  - name: fct_supply_chain__disponibilite_article_neshu_vehicule_mensuel
    description: |
      [QUOI MÉTIER] Taux de disponibilité mensuel des articles dans les véhicules Neshu : part des jours du mois où l'article était en stock (> 0) à bord du véhicule.
      [COMMENT CONSTRUITE] Agrégation mensuelle de fct_supply_chain__stock_neshu filtré sur les véhicules (entity_type='resource' ; le filtre resources_type='VEHICLE' et is_active est appliqué en amont). jours_observes = nb de jours où le couple véhicule/article est référencé dans les données ; jours_disponibles = nb de jours référencés où is_out_of_stock=false. taux = jours_disponibles / jours_observes. mois = date_trunc à month.
      [GRAIN] 1 ligne par (mois, véhicule, article).
      [NOTES] Le taux est calculé depuis le 1er référencement de l'article dans le véhicule (dénominateur = jours référencés), pas sur le mois calendaire : un article arrivé en cours de mois et jamais en rupture affiche 100 %, sans pénalité pour les jours antérieurs à son arrivée. Le mois en cours est partiel (taux à interpréter avec jours_observes). Clé métier = product_code ; entity_name/entity_code/product_name reflètent le libellé du snapshot le plus récent du mois (un article peut être renommé en cours de mois sans changer de code).
    columns:
      - name: mois
        description: "Premier jour du mois (DATE)"
        tests:
          - not_null
      - name: resources_id
        description: "Identifiant du véhicule (FK vers dim_neshu__resource)"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_neshu__resource')
                field: resources_id
              config:
                severity: warn
      - name: entity_code
        description: "Code du véhicule"
      - name: entity_name
        description: "Nom du véhicule (en lowercase)"
      - name: product_code
        description: "Code du produit"
        tests:
          - not_null
      - name: product_name
        description: "Nom du produit"
      - name: jours_observes
        description: "Nombre de jours du mois où le couple véhicule/article est référencé dans les données"
      - name: jours_disponibles
        description: "Nombre de jours référencés du mois où l'article était en stock (is_out_of_stock=false)"
      - name: taux_disponibilite_pct
        description: "Taux de disponibilité mensuel en % : jours_disponibles / jours_observes * 100"
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - mois
              - resources_id
              - product_code
      # cohérence : on ne peut pas être disponible plus de jours que de jours observés
      - dbt_utils.expression_is_true:
          arguments:
            expression: "jours_disponibles <= jours_observes"
      # cohérence : un taux est un pourcentage
      - dbt_utils.expression_is_true:
          arguments:
            expression: "taux_disponibilite_pct between 0 and 100"

  - name: fct_supply_chain__flux_neshu
    description: |
      [QUOI MÉTIER] Flux supply Neshu mensuels (stocks dépôts/véhicules + réceptions/livraisons/chargements).
      [COMMENT CONSTRUITE] Consolidation de 7 sources Oracle Neshu : inventaires (int_oracle_neshu__inventaire_tasks, prioritaires si VALIDE), stocks théoriques (stg_oracle_neshu_gcs__stock_theorique, fallback si pas d'inventaire), réceptions fournisseurs, livraisons clients, livraisons internes (véhicule/anim/prépa/périmé), chargements machines. Pour chaque source/mois, la date de référence inventaire est le dernier inventaire du mois sinon le premier des 5 jours du mois suivant. Agrégation mensuelle (date_trunc à month).
      [GRAIN] 1 ligne par mois_date (premier jour du mois).
      [NOTES] Démarrage des flux : 2025-01-01. Démarrage inventaires : 2024-12-01. stock_total = stock_depot + stock_vehicule (cohérence testée).

    columns:

      # =========================
      # DIMENSIONS TEMPORELLES
      # =========================
      - name: mois_date
        description: >
          Date du mois (premier jour du mois) utilisée pour la partition BigQuery
          et la granularité principale du modèle.
        tests:
          - not_null
          - unique

      - name: annee
        description: Année extraite de mois_date
        tests:
          - not_null

      - name: mois
        description: Numéro du mois (1 à 12)
        tests:
          - not_null

      # =========================
      # STOCKS REELS
      # =========================
      - name: stock_depot_rungis
        description: Stock réel valorisé du dépôt de Rungis issu des inventaires

      - name: stock_depot_lyon
        description: Stock réel valorisé du dépôt de Lyon issu des inventaires

      - name: stock_depot_marseille
        description: Stock réel valorisé du dépôt de Marseille issu des inventaires

      - name: stock_depot
        description: Somme des stocks réels des dépôts (Rungis + Lyon + Marseille)

      - name: stock_vehicule
        description: Stock réel valorisé embarqué dans les véhicules

      - name: stock_total
        description: Stock total réel (dépôts + véhicules)

      # =========================
      # STOCKS THEORIQUES
      # =========================
      - name: stocks_theoriques_anim
        description: >
          Stock théorique des centres ANIM (utilisé uniquement en absence d'inventaire réel)

      - name: stocks_theoriques_prepa
        description: >
          Stock théorique des centres de préparation (PREPA)

      - name: stocks_theoriques_autre
        description: >
          Stock théorique des autres sources (principalement véhicules)

      # =========================
      # FLUX ENTRANTS
      # =========================
      - name: reception_fournisseur
        description: >
          Valeur des réceptions fournisseurs (entrées de stock externes)

      # =========================
      # FLUX SORTANTS
      # =========================
      - name: livraison_client
        description: >
          Valeur des livraisons vers les clients finaux

      - name: livraison_vehicule
        description: >
          Flux de livraison interne vers véhicules ou sites assimilés

      - name: livraison_anim
        description: >
          Flux de livraison interne vers centres ANIM

      - name: livraison_prepa
        description: >
          Flux de livraison interne vers centres de préparation

      - name: livraison_perime
        description: >
          Flux sortant vers destruction / rebut / périmé

      - name: livraison_interne_autre
        description: >
          Autres flux internes non catégorisés

      # =========================
      # AUTRES FLUX
      # =========================
      - name: chargement_machine
        description: >
          Valeur des chargements de machines (approvisionnement terrain)

    # =========================
    # TESTS AU NIVEAU MODELE
    # =========================
    tests:

      # cohérence simple : stock total = depot + véhicule
      - dbt_utils.expression_is_true:
          arguments:
            expression: "stock_total = stock_depot + stock_vehicule"

      # cohérence : pas de valeurs négatives sur les stocks
      - dbt_utils.expression_is_true:
          arguments:
            expression: "stock_depot >= 0 and stock_vehicule >= 0"

      # cohérence : flux principaux non négatifs
      - dbt_utils.expression_is_true:
          arguments:
            expression: "reception_fournisseur >= 0 and livraison_client >= 0"

  - name: fct_supply_chain__couverture_stock_neshu
    description: |
      [QUOI MÉTIER] Couverture de stock et suggestion de réapprovisionnement par dépôt et article Neshu : nombre de jours de stock restants au rythme de consommation de l'an dernier à la même saison, statut feu tricolore (RUPTURE TOTALE / RUPTURE / VIGILANCE / OK / NON CONSOMME), et quantité suggérée à commander.
      [COMMENT CONSTRUITE] Stock actuel = dernier snapshot de fct_supply_chain__stock_neshu (dépôts entity_type='company', hors DEPOTREBUS / DEPOTPERIMES). Consommation = somme des sorties clients (int_oracle_neshu__livraison_tasks) et des chargements véhicules (int_oracle_neshu__livraison_interne_tasks, product_source_type='COMPANY' ET product_destination_type!='COMPANY' pour neutraliser les transferts inter-dépôts), statuts FAIT+VALIDE, sur une fenêtre centrée mois N-1 ± 1 (3 mois, pour lisser les faibles rotations), en quantité déconditionnée à l'unité (quantity = real_quantity * unit_coeff_multi / unit_coeff_div ; base_unit_quantity = nb de colis, à ne PAS utiliser). conso_journaliere_n1 = conso de la fenêtre / nb de jours réel de la fenêtre. jours_couverture = stock_actuel / conso_journaliere_n1. FULL OUTER stock⋈conso : un article consommé sur la fenêtre mais absent du stock du jour remonte en RUPTURE TOTALE (stock_actuel=0). product_id/product_name aplatis depuis dim_neshu__product. Produits explicitement arrêtés exclus (product_exploit='NON') ; les NULL (champ non renseigné) sont conservés pour ne pas masquer de ruptures réelles — à basculer en product_exploit='OUI' quand le champ sera complété à la source. Cible de réappro = délai fournisseur (7j) + couverture (21j) = 28j. Seuils/cible paramétrables via vars dbt couverture_seuil_min_jours / couverture_seuil_max_jours / couverture_cible_jours (défauts 14 / 28 / 28).
      [GRAIN] 1 ligne par (date_calcul, company_id, product_code).
      [NOTES] V2. Ne tient PAS encore compte des commandes fournisseurs en cours (pas de source dispo aujourd'hui — logique Distrilog notée pour plus tard : type=Bon de commande fournisseur, statut FAIT/VALIDE, statut livraison=En attente). statut='RUPTURE TOTALE' si demande sur la fenêtre mais stock_actuel<=0 (absent du snapshot ou stock théorique négatif), affiché en tête. statut='NON CONSOMME' si aucune conso sur la fenêtre → jours_couverture NULL et qte_a_commander forcée à 0 (même si stock négatif). date_calcul = date d'exécution (photo du jour, non historisée).
    columns:
      - name: date_calcul
        description: "Date d'exécution du calcul (DATE), colonne de partition"
        tests:
          - not_null
      - name: company_id
        description: "Identifiant du dépôt (FK vers dim_neshu__company)"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_neshu__company')
                field: company_id
              config:
                severity: warn
      - name: entity_code
        description: "Code du dépôt"
      - name: entity_name
        description: "Nom du dépôt (en lowercase)"
      - name: product_code
        description: "Code du produit"
        tests:
          - not_null
      - name: product_id
        description: "Identifiant du produit (FK vers dim_neshu__product). NULL si le code n'existe pas dans la dim"
        tests:
          - relationships:
              arguments:
                to: ref('dim_neshu__product')
                field: product_id
              config:
                severity: warn
      - name: product_name
        description: "Nom du produit (aplati depuis dim_neshu__product). NULL si le code n'existe pas dans la dim"
      - name: stock_actuel
        description: "Stock théorique de l'article dans le dépôt au dernier snapshot (déconditionné). 0 si l'article est absent du snapshot mais consommé sur la fenêtre"
      - name: conso_journaliere_n1
        description: "Consommation journalière estimée = conso de la fenêtre N-1 ± 1 / nb de jours de la fenêtre"
      - name: conso_mensuelle_moy_n1
        description: "Consommation mensuelle moyenne équivalente sur la fenêtre = conso_journaliere_n1 * 30,4 (indicatif)"
      - name: jours_couverture
        description: "Nombre de jours de stock restants = stock_actuel / conso_journaliere_n1. NULL si aucune conso sur la fenêtre"
      - name: statut
        description: "Feu tricolore : RUPTURE TOTALE (demande mais stock<=0), RUPTURE (< seuil min), VIGILANCE (entre seuils), OK (> seuil max), NON CONSOMME (aucune conso sur la fenêtre)"
        tests:
          - accepted_values:
              arguments:
                values: ['RUPTURE TOTALE', 'RUPTURE', 'VIGILANCE', 'OK', 'NON CONSOMME']
      - name: qte_a_commander
        description: "Quantité suggérée pour atteindre la cible de couverture = max(0, conso_journaliere_n1 * cible - stock_actuel). 0 si aucune conso sur la fenêtre"
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - date_calcul
              - company_id
              - product_code
      # cohérence : la consommation est une somme de sorties, jamais négative
      - dbt_utils.expression_is_true:
          arguments:
            expression: "conso_journaliere_n1 >= 0"
      # cohérence : une quantité à commander ne peut pas être négative
      - dbt_utils.expression_is_true:
          arguments:
            expression: "qte_a_commander >= 0"
      # cohérence : RUPTURE TOTALE <=> demande réelle mais aucun stock vendable
      - dbt_utils.expression_is_true:
          arguments:
            expression: "statut != 'RUPTURE TOTALE' or (conso_journaliere_n1 > 0 and stock_actuel <= 0)"

  - name: fct_supply_chain__classification_article_neshu
    description: |
      [QUOI MÉTIER] Classification des articles Neshu par dépôt pour piloter le forecast/réappro : l'"aiguilleur" qui range chaque couple (dépôt, article) selon son comportement de demande, son cycle de vie et son importance, et en déduit la méthode de prévision à appliquer. N'émet AUCUN forecast (calculé par le modèle de prévision en aval).
      [COMMENT CONSTRUITE] À partir du socle int_oracle_neshu__demande_mensuelle. Stats de demande sur la vie active (min→max des mois observés, sparse) : adi = span / nb de mois avec demande, cv2 = (écart-type/moyenne)² des mois non nuls. classe_demande via la grille Syntetos-Boylan (seuils ADI 1,32 / CV² 0,49 ; indetermine si < 3 mois d'historique). statut_vie (ACTION) au grain couple : actif si vente < 4 mois (le réel gagne, quel que soit le label), sinon arrete (product_exploit=NON) ou inactif. alerte_label (WARNING) au grain ARTICLE : arrete_mais_vend (exploit=NON mais l'article vend encore quelque part) ou actif_mais_silencieux (exploit=OUI mais silencieux partout ≥ 4 mois). classe_abc = Pareto en VALEUR (€ = demande_12m × prix d'achat), cumulé par dépôt (A ≤ 80 % / B ≤ 95 % / C). methode_prevision = exclu (arrete/inactif), naif (indetermine), moyenne_mobile_surveille (intermittent/lumpy), moyenne_mobile sinon. Périmètre : 5 dépôts de distribution produits (dim_neshu__company.company_code Rungis/Lyon/Bordeaux/Strasbourg/Marseille), articles product_owner='Neshu', hors familles PRESENTOIR/PRESTATION SERVICE et hors BADGENESHU.
      [GRAIN] 1 ligne par (company_id, product_id) — état courant recalculé à chaque build.
      [NOTES] V1. L'ABC ne pilote QUE le niveau de service (stock de sécurité en aval), JAMAIS l'exclusion (exclu = cycle de vie uniquement : un article classe C mais actif est prévu). alerte_label au grain article (le label exploit est article-level) pour éviter les faux positifs d'un article actif ailleurs mais silencieux à un dépôt ; elle s'auto-résout quand le métier corrige le label. Saisonnalité (plano été/hiver) non gérée ici (V2 : gating en_saison en aval + exception d'alerte pour les saisonniers hors-saison). Croston/SBA (intermittent/lumpy) = V2 ; en V1 ils passent en moyenne_mobile_surveille. date_calcul = date d'exécution (photo du jour, non historisée).
    columns:
      - name: date_calcul
        description: "Date d'exécution du calcul (photo du jour, non historisée)"
        tests:
          - not_null
      - name: company_id
        description: "Identifiant du dépôt (FK vers dim_neshu__company)"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_neshu__company')
                field: company_id
              config:
                severity: warn
      - name: product_id
        description: "Identifiant du produit (FK vers dim_neshu__product)"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_neshu__product')
                field: product_id
              config:
                severity: warn
      - name: product_code
        description: "Code métier du produit"
        tests:
          - not_null
      - name: product_name
        description: "Nom du produit (aplati depuis dim_neshu__product)"
      - name: statut_vie
        description: "ACTION cycle de vie (grain couple) : actif (vend < 4 mois → prévu), hors_saison (saisonnier silencieux HORS de sa saison → à anticiper, pas mort), inactif (silencieux ≥ 4 mois non saisonnier non arrêté → exclu), arrete (exploit=NON + silencieux → exclu)"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['actif', 'hors_saison', 'inactif', 'arrete']
      - name: classe_demande
        description: "Comportement de demande (Syntetos-Boylan) : regulier, erratique, intermittent, lumpy, ou indetermine (< 3 mois d'historique)"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['regulier', 'erratique', 'intermittent', 'lumpy', 'indetermine']
      - name: classe_abc
        description: "Importance ABC en VALEUR (€), Pareto par dépôt : A (≤ 80 %), B (≤ 95 %), C. NULL si aucune demande sur 12 mois. Pilote le niveau de service, pas l'exclusion"
        tests:
          - accepted_values:
              arguments:
                values: ['A', 'B', 'C']
      - name: methode_prevision
        description: "Méthode de prévision V1 : exclu (arrete/inactif), reference_saisonniere (saisonnier avec ≥13 mois d'historique → N-1 anticipatif), naif (indetermine), moyenne_mobile_surveille (intermittent/lumpy, Croston en V2), moyenne_mobile (regulier/erratique)"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['moyenne_mobile', 'moyenne_mobile_surveille', 'reference_saisonniere', 'naif', 'exclu']
      - name: alerte_exploit
        description: "WARNING incohérence du label EXPLOIT ↔ réel (grain ARTICLE) : arrete_mais_vend (exploit=NON mais vend encore), actif_mais_silencieux (exploit=OUI mais silencieux partout, hors saisonniers hors-saison). NULL si cohérent"
        tests:
          - accepted_values:
              arguments:
                values: ['arrete_mais_vend', 'actif_mais_silencieux']
      - name: alerte_saison
        description: "WARNING incohérence du label SAISON (plano) ↔ comportement (grain ARTICLE) : saison_hiver_mais_vend_ete (plano hiver mais ≥ 25 % du volume l'été), saison_ete_mais_vend_hiver (plano été mais < 50 % l'été). NULL si cohérent. Ex. Oasis/Orangina étiquetés hiver mais vendus toute l'année"
        tests:
          - accepted_values:
              arguments:
                values: ['saison_hiver_mais_vend_ete', 'saison_ete_mais_vend_hiver']
      - name: saison_produit
        description: "Saisonnalité de l'article (labels plano) : ete (été-seul), hiver (hiver-seul), annuel (les deux), non_renseigne"
        tests:
          - accepted_values:
              arguments:
                values: ['ete', 'hiver', 'annuel', 'non_renseigne']
      - name: en_saison
        description: "TRUE si l'article est DANS sa saison à la date du jour (plano × calendrier ISO). Sert au statut hors_saison et à neutraliser la fausse alerte saisonnière"
      - name: premiere_sortie
        description: "1er mois avec demande observée à ce dépôt (= lancement effectif)"
      - name: derniere_sortie
        description: "Dernier mois avec demande observée à ce dépôt"
      - name: mois_inactif
        description: "Nombre de mois depuis la dernière sortie à ce dépôt (pilote statut_vie)"
      - name: nb_mois_demande
        description: "Nombre de mois distincts avec demande sur la vie active (< 3 → classe_demande=indetermine)"
      - name: adi
        description: "Average Demand Interval = span de la vie active / nb de mois avec demande. 1 = demande tous les mois. Seuil Syntetos-Boylan 1,32"
      - name: cv2
        description: "Carré du coefficient de variation des quantités (mois non nuls) = (écart-type/moyenne)². Seuil Syntetos-Boylan 0,49"
      - name: demande_totale
        description: "Demande cumulée sur toute la vie active (unités déconditionnées)"
      - name: demande_12m
        description: "Demande cumulée sur les 12 derniers mois (unités). Base de l'ABC. ≠ récence : peut être élevé même si arrête (ventes en début de fenêtre)"
      - name: valeur_12m
        description: "Valeur de la demande 12 mois = demande_12m × prix d'achat unitaire (€). Base du classement ABC"
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - company_id
              - product_id
      # invariant : exclu SSI cycle de vie arrete/inactif (jamais à cause de l'ABC/valeur)
      - dbt_utils.expression_is_true:
          arguments:
            expression: "(methode_prevision = 'exclu') = (statut_vie in ('arrete', 'inactif'))"

  - name: fct_supply_chain__prevision_demande_neshu
    description: |
      [QUOI MÉTIER] Prévision de demande (mensuelle et journalière) par dépôt et article Neshu — le forecast lui-même, qui alimente le calcul du point de commande en aval.
      [COMMENT CONSTRUITE] À partir du socle int_oracle_neshu__demande_mensuelle, en appliquant la méthode routée par fct_supply_chain__classification_article_neshu (methode_prevision). moyenne_mobile / moyenne_mobile_surveille = somme de la demande sur les N derniers mois COMPLETS / N (mois courant incomplet exclu ; les mois sans demande comptent comme 0, implicite dans le /N). naif (indetermine) = moyenne des mois présents sur la fenêtre. exclu (arrete/inactif) = 0. Fenêtre N paramétrable via var prevision_nb_mois_moyenne (défaut 3). demande_prevue_journaliere = demande_prevue_mensuelle / 30,4.
      [GRAIN] 1 ligne par (company_id, product_id) — état courant recalculé à chaque build.
      [NOTES] V1 = moyenne mobile ; Croston/SBA (intermittent/lumpy) = V2 (aujourd'hui traités en moyenne_mobile_surveille, mêmes calculs mais flaggés). Le mois courant est exclu volontairement (sinon sous-estimation par le mois partiel). date_calcul = date d'exécution (photo du jour, non historisée).
    columns:
      - name: date_calcul
        description: "Date d'exécution du calcul (photo du jour, non historisée)"
        tests:
          - not_null
      - name: company_id
        description: "Identifiant du dépôt (FK vers dim_neshu__company)"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_neshu__company')
                field: company_id
              config:
                severity: warn
      - name: product_id
        description: "Identifiant du produit (FK vers dim_neshu__product)"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_neshu__product')
                field: product_id
              config:
                severity: warn
      - name: product_code
        description: "Code métier du produit"
        tests:
          - not_null
      - name: product_name
        description: "Nom du produit"
      - name: statut_vie
        description: "Statut cycle de vie hérité de la classification (actif/inactif/arrete)"
      - name: classe_abc
        description: "Classe ABC en valeur héritée de la classification (A/B/C, NULL si pas de demande récente)"
      - name: methode_prevision
        description: "Méthode appliquée (héritée de la classification) : moyenne_mobile, moyenne_mobile_surveille, naif, exclu"
        tests:
          - not_null
      - name: demande_fenetre
        description: "Demande cumulée sur les N derniers mois complets (mois courant exclu), unités déconditionnées"
      - name: nb_mois_avec_demande
        description: "Nombre de mois avec demande dans la fenêtre (sert au dénominateur de la méthode naif)"
      - name: demande_prevue_mensuelle
        description: "Prévision de demande mensuelle (unités). 0 pour les articles exclus (arrete/inactif) ou sans demande récente"
        tests:
          - not_null
      - name: demande_prevue_journaliere
        description: "Prévision de demande journalière = demande_prevue_mensuelle / 30,4. Base du point de commande (× délai fournisseur)"
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - company_id
              - product_id
      # cohérence : une prévision de demande n'est jamais négative
      - dbt_utils.expression_is_true:
          arguments:
            expression: "demande_prevue_mensuelle >= 0"
      # invariant : les articles exclus ont une prévision nulle
      - dbt_utils.expression_is_true:
          arguments:
            expression: "methode_prevision != 'exclu' or demande_prevue_mensuelle = 0"
