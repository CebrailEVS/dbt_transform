version: 2

models:
  - name: fct_finance__pnl_bu
    description: |
      [QUOI MÉTIER] P&L mensuel par Business Unit analytique, avec scénarios avec/sans provisions congés payés.
      [COMMENT CONSTRUITE] Issu des écritures comptables Sage (int_sage__pnl) agrégées par BU et KPI ; deux scénarios calculés : AVEC_PROVISIONS_CP (toutes écritures) et SANS_PROVISIONS_CP (exclut comptes 645800, 641200). Enrichi des valeurs YTD, N-1 et écarts/évolutions.
      [GRAIN] 1 ligne par (scenario, annee, mois, bu, kpi).
      [NOTES] Les KPI couvrent : CA, CONSOMMATION_MP_SSTT, MASSE_SALARIALE, FRAIS_DIRECTS_AMORTISSEMENTS, MARGE_BRUTE, MARGE_NETTE. BU_NON_RENSEIGNEE pour les écritures sans imputation analytique.

    columns:
      - name: scenario
        description: >
          Scénario financier appliqué aux données.
          - AVEC_PROVISIONS_CP : inclut les provisions congés payés
          - SANS_PROVISIONS_CP : exclut certains comptes généraux (ex. 645800, 641200)
        tests:
          - not_null

      - name: annee
        description: Année comptable issue de la date de facturation
        tests:
          - not_null

      - name: mois
        description: Mois comptable (1–12)
        tests:
          - not_null

      - name: bu
        description: Business Unit analytique (ou BU_NON_RENSEIGNEE si absente)
        tests:
          - not_null

      - name: kpi
        description: Type de KPI financier
        tests:
          - accepted_values:
              arguments:
                values:
                  - CA
                  - CONSOMMATION_MP_SSTT
                  - MASSE_SALARIALE
                  - FRAIS_DIRECTS_AMORTISSEMENTS
                  - MARGE_BRUTE
                  - MARGE_NETTE

      - name: valeur
        description: Valeur mensuelle du KPI

      - name: valeur_ytd
        description: Valeur cumulée Year-To-Date du KPI

      - name: valeur_n_1
        description: Valeur du KPI pour la même période en année N-1

      - name: valeur_ytd_n_1
        description: Valeur cumulée YTD du KPI en année N-1

      - name: pct_du_ca
        description: Pourcentage du KPI par rapport au chiffre d'affaires du mois

      - name: pct_du_ca_ytd
        description: Pourcentage du KPI par rapport au chiffre d'affaires YTD

      - name: pct_du_ca_n_1
        description: Pourcentage du KPI par rapport au chiffre d'affaires N-1

      - name: pct_du_ca_n_1_ytd
        description : Pourcentage du KPI par rapport au chiffre d'affaires N-1 YTD

      - name: ecart_n_vs_n_1
        description: Écart absolu entre l'année N et N-1 (mensuel)

      - name: evolution_pct
        description: Évolution en pourcentage entre N et N-1 (mensuel)

      - name: ecart_n_vs_n_1_ytd
        description: Écart absolu entre YTD N et YTD N-1

      - name: evolution_pct_ytd
        description: Évolution en pourcentage entre YTD N et YTD N-1

  - name: fct_finance__ecriture_non_ventilee
    description: |
      [QUOI MÉTIER] Liste des écritures comptables de charge (classe 6) ou produit (classe 7) sans aucune ventilation analytique dans Sage — la file des écritures restant à ventiler par la comptabilité, consommée par l'app compta.
      [COMMENT CONSTRUITE] int_mssql_sage__ecriture_non_ventilee : f_ecriturec filtré aux classes 6/7 et >= var('ecriture_non_ventilee_floor', défaut 2025-01-01), en anti-jointure sur les écritures analytiques f_ecriturea (ec_no absents). date_facturation = jm_date + (ec_jour-1) jours.
      [GRAIN] 1 ligne par écriture comptable (ecriture_comptable_id).
      [NOTES] Matérialisée en **view** (et non table) : déviation assumée à la convention marts, justifiée par un petit volume (~27k lignes), une conso opérationnelle par l'app compta (/mnt/data/project/compta) sensible à la fraîcheur et un requêtage peu fréquent. montant brut non signé ; sens_ecriture (0 = débit, 1 = crédit) pour l'interpréter.

    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "substr(numero_compte_general, 1, 1) in ('6', '7')"

    columns:
      - name: date_facturation
        description: Date de facturation reconstruite (jm_date + (ec_jour-1) jours). Axe temporel principal.
        tests:
          - not_null
      - name: ecriture_comptable_id
        description: Numéro de l'écriture comptable Sage. Clé primaire / grain.
        tests:
          - unique
          - not_null
      - name: numero_compte_general
        description: Numéro de compte général (classe 6 = charges, 7 = produits).
        tests:
          - not_null
      - name: libelle_ecriture
        description: Libellé libre de l'écriture comptable.
      - name: sens_ecriture
        description: "Sens comptable de l'écriture : 0 = débit, 1 = crédit."
      - name: date_ecriture_comptable
        description: Date de l'écriture comptable Sage (ec_date).
      - name: montant
        description: Montant (€) de l'écriture, brut non signé (toujours positif).
      - name: montant_signe
        description: >
          Montant (€) orienté selon le sens comptable : positif au crédit (sens_ecriture = 1),
          négatif au débit (sens_ecriture = 0). Même convention que le P&L (somme = produits − charges).
      - name: extracted_at
        description: Timestamp d'extraction de la source (fraîcheur de la donnée exposée à l'app).
