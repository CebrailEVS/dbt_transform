# models/marts/oracle_lcdp/_oracle_lcdp__marts_models.yml
version: 2

models:
  # COMPANY
  - name: dim_lcdp__company
    description: |
      [QUOI MÉTIER] Dimension client (company) LCDP enrichie des labels métier et de la localisation.
      [COMMENT CONSTRUITE] Issu de stg_oracle_lcdp__company joint à stg_oracle_lcdp__location pour les coordonnées, et pivot des labels via stg_oracle_lcdp__label_company (vue aplatie lcdp_v_label_company) sur les familles : ZGEO, DOMACT, BUSMOD, GC, ISACTIVE, MODEH, MODEOF, MODER, PROPRIO, REPRES, BL_GRP, MEF, Gestion reliquat.
      [GRAIN] 1 ligne par company_id.
      [NOTES] parent_company_id permet la hiérarchie société-mère/fille. Les attributs label exposent désormais le libellé FR (label_text_fr) au lieu du code. Exception : is_active reste basé sur le code (YES/NO) pour la conversion booléenne (TRUE si label ISACTIVE='yes').
    columns:
      - name: company_id
        description: "Identifiant unique de la société"
        tests:
          - not_null
          - unique
        
      - name: parent_company_id
        description: "ID de la comapny parente (hiérarchie)"

      - name: company_type_id
        description: "ID Type de société (ex : client, fournisseur...)"

      - name: company_code
        description: "Code client"

      - name: company_name
        description: "Nom de la société"

      - name: geo_zone
        description: "Zone géographique de la société (label ZGEO)"

      - name: activity_domain
        description: "Domaine d'activité (label DOMACT)"

      - name: business_model
        description: "Modèle business (label BUSMOD)"

      - name: key_account
        description: "Grand compte (label GC)"

      - name: is_active
        description: >
          Indique si la société est active (label ISACTIVE).
          TRUE si 'yes', sinon FALSE.

      - name: model_horeca
        description: "Modèle HORECA (label MODEH)"

      - name: model_office
        description: "Modèle Office (label MODEOF)"

      - name: model_revendeur
        description: "Modèle Revendeur (label MODER)"

      - name: owner
        description: "Propriétaire de la société (label PROPRIO)"

      - name: representative
        description: "Représentant commercial (label REPRES)"

      - name: bl_group
        description: "Groupe de bon de livraison (label BL_GRP)"

      - name: invoice_delivery_mode
        description: "Mode d'envoi de facture (label MEF)"

      - name: remainder_management
        description: "Gestion du reliquat (label Gestion reliquat)"

      - name: address1
        description: "Adresse principale (ligne 1)"

      - name: address2
        description: "Adresse complémentaire (ligne 2)"

      - name: city
        description: "Ville"

      - name: postal_code
        description: "Code postal"

      - name: country
        description: "Pays"

      - name: created_at
        description: "Date de création de la société"

      - name: updated_at
        description: "Date de dernière modification"

  # PRODUCT
  - name: dim_lcdp__product
    description: |
      [QUOI MÉTIER] Dimension produit LCDP enrichie des labels métier (famille, groupe, marque, bio).
      [COMMENT CONSTRUITE] Issu de stg_oracle_lcdp__product filtré sur product_type_id IN (1, 5), enrichi par pivot des labels via stg_oracle_lcdp__label_product (vue aplatie lcdp_v_label_product) : FAMIPRO, GROUPRO, MARQPRO, BIO, ISACTIVE. created_at corrigé si NULL pour idproduct=1 (fallback updated_at).
      [GRAIN] 1 ligne par product_id.
      [NOTES] product_type_id : 1 = produit, 5 = ligne de prix. Les attributs label exposent désormais le libellé FR (label_text_fr) au lieu du code. Exception : is_active reste basé sur le code (YES/NO) pour la conversion booléenne.
    columns:
      - name: product_id
        description: "Identifiant unique du produit"
        tests:
          - not_null
          - unique

      - name: product_type_id
        description: "ID Type de produit (1=produit, 5=ligne de prix)"

      - name: product_code
        description: "Code métier du produit"

      - name: product_name
        description: "Nom du produit"

      - name: purchase_unit_price
        description: "Prix d'achat unitaire hors taxe"

      - name: product_family
        description: "Famille du produit (label FAMIPRO)"

      - name: product_group
        description: "Groupe du produit (label GROUPRO)"

      - name: product_brand
        description: "Marque du produit (label MARQPRO)"

      - name: product_bio
        description: "Indicateur produit bio (label BIO)"

      - name: is_active
        description: >
          Indique si le produit est actif (label ISACTIVE).
          TRUE si 'yes', sinon FALSE.

      - name: created_at
        description: "Date de création du produit"

      - name: updated_at
        description: "Date de dernière modification"

  # DEVICE
  - name: dim_lcdp__device
    description: |
      [QUOI MÉTIER] Dimension machine LCDP enrichie des labels métier (catégorie, état, types fontaine/broyeur/percolateur/SP).
      [COMMENT CONSTRUITE] Issu de stg_oracle_lcdp__device joint à stg_oracle_lcdp__company (company_code, company_name) et stg_oracle_lcdp__location (access_info → device_location). Pivot des labels via stg_oracle_lcdp__label_device (vue aplatie lcdp_v_label_device) sur les familles : CATMACH, MARQUE, ETAT_MACHINE, STATUT_MATERIEL, TYPEAUDIT, TYDA, LCDPMON, TYPFONT, TYPBROY, TYPPERCO, TYPSP, TYPDASA, MODSP, MARQSP, BADGE, ISACTIVE.
      [GRAIN] 1 ligne par device_id.
      [NOTES] device_iddevice = parent device (hiérarchie). Les attributs label exposent désormais le libellé FR (label_text_fr, ex. "DA CHAUD") au lieu du code (ex. "CATMACH01"). Exception : is_active reste basé sur le code (YES/NO) pour la conversion booléenne. is_active converti en booléen.
    columns:
      - name: device_id
        description: "Identifiant unique du device"
        tests:
          - not_null
          - unique

      - name: device_iddevice
        description: "ID du device parent (hiérarchie)"

      - name: device_type_id
        description: "ID Type de device"

      - name: company_id
        description: "ID de l'entreprise cliente"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_lcdp__company')
                field: company_id

      - name: location_id
        description: "ID de la localisation"

      - name: device_code
        description: "Code métier du device"

      - name: device_name
        description: "Nom du device"

      - name: company_code
        description: "Code de l'entreprise cliente"

      - name: company_name
        description: "Nom de l'entreprise cliente"

      - name: device_category
        description: "Catégorie de la machine (label CATMACH)"

      - name: device_brand
        description: "Marque du device (label MARQUE)"

      - name: device_state
        description: "État de la machine (label ETAT_MACHINE)"

      - name: device_material_status
        description: "Statut du matériel (label STATUT_MATERIEL)"

      - name: audit_type
        description: "Type d'audit - cashless, télémétrie nayax, etc. (label TYPEAUDIT)"

      - name: typology_da
        description: "Typologie DA (label TYDA)"

      - name: currency_mode
        description: "Mode monnaie - avec ou sans (label LCDPMON)"

      - name: fountain_type
        description: "Type de fontaine (label TYPFONT)"

      - name: grinder_type
        description: "Type de broyeur (label TYPBROY)"

      - name: percolator_type
        description: "Type de percolateur (label TYPPERCO)"

      - name: type_sp
        description: "Type SP (label TYPSP)"

      - name: type_dasa
        description: "Type DASA (label TYPDASA)"

      - name: model_sp
        description: "Modèle SP (label MODSP)"

      - name: brand_sp
        description: "Marque SP (label MARQSP)"

      - name: badge
        description: "Badge (label BADGE)"

      - name: device_location
        description: "Informations d'accès de la localisation"

      - name: is_active
        description: >
          Indique si le device est actif (label ISACTIVE).
          TRUE si 'yes', sinon FALSE.

      - name: last_installation_date
        description: "Dernière date d'installation"

      - name: created_at
        description: "Date de création"

      - name: updated_at
        description: "Date de dernière modification"

  # RESOURCE
  - name: dim_lcdp__resource
    description: |
      [QUOI MÉTIER] Dimension ressource Oracle LCDP : personnes (PERSON) + véhicules (VEHICLE) avec hiérarchie.
      [COMMENT CONSTRUITE] Issu de stg_oracle_lcdp__resources, pivot des labels via stg_oracle_lcdp__label_has_resources : ISACTIVE, Fonction. Miroir de dim_neshu__resource sans l'enrichissement GEA (pas de seed côté LCDP).
      [GRAIN] 1 ligne par resources_id.
      [NOTES] Hiérarchie : resources_idresources d'un VEHICLE pointe vers l'ID de la PERSON associée ; NULL pour les personnes. code_status_record conservé (1=actif) sans filtre — filtrage à la volée côté BI. is_active converti en booléen.
    columns:
      - name: resources_id
        description: "Identifiant unique de la ressource dans Oracle"
        tests:
          - not_null
          - unique

      - name: resources_type_id
        description: "Identifiant du type de ressource (clé vers resources_type)"

      - name: resources_idresources
        description: >
          Lien vers la ressource associée. Pour un véhicule (VEHICLE) : pointe vers l'ID de la personne (PERSON) associée.
          Pour une personne (PERSON) : NULL.

      - name: company_id
        description: "Identifiant de l'entreprise à laquelle est rattachée la ressource"
        tests:
          - relationships:
              arguments:
                to: ref('dim_lcdp__company')
                field: company_id

      - name: company_storehouse_id
        description: "Identifiant de l'entreprise entrepôt associée à la ressource"
        tests:
          - relationships:
              arguments:
                to: ref('dim_lcdp__company')
                field: company_id

      - name: location_id
        description: "Identifiant de la localisation de la ressource"

      - name: resources_code
        description: "Code métier de la ressource (ex : code personne ou immatriculation véhicule)"
        tests:
          - not_null

      - name: resources_name
        description: "Nom de la ressource"

      - name: resources_type
        description: "Type de ressource : PERSON (personne) ou VEHICLE (véhicule)"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['PERSON', 'VEHICLE']

      - name: is_active
        description: >
          Indique si la ressource est active (label ISACTIVE).
          Converti en booléen : TRUE si 'yes', FALSE sinon.
        tests:
          - not_null

      - name: fonction
        description: "Fonction de la personne (label Fonction, ex : APPRO, DIRECT). NULL pour les véhicules."

      - name: cost
        description: "Coût associé à la ressource"

      - name: arrival
        description: "Date d'arrivée de la ressource dans l'entreprise"

      - name: departure
        description: "Date de départ de la ressource (NULL si toujours en poste/en service)"

      - name: code_status_record
        description: >
          Code de statut de l'enregistrement Oracle (1 = actif, autre = inactif).
          Non filtré dans ce modèle — utilisable côté BI pour exclure les inactifs.

      - name: created_at
        description: "Date de création de la ressource dans Oracle"

      - name: updated_at
        description: "Date de dernière mise à jour de la ressource dans Oracle"

  # CHARGEMENT vs SORTIE (taux d'écoulement Nayax)
  - name: fct_lcdp__chargement_sortie
    description: |
      [QUOI MÉTIER] Taux d'écoulement (VOLUME) hebdomadaire des machines LCDP télémétrées Nayax FULL NAYAX (sans monnayeur), par client — comparaison entrées (quantités chargées) vs sorties (nombre de ventes Nayax). Modèle volume pur, sans mesure monétaire (le CA est porté par fct_lcdp__ca_mensuel).
      [COMMENT CONSTRUITE] Périmètre filtré sur dim_lcdp__device.audit_type='1- AUDIT TELEMETRIE (NAYAX)' AND device_category='DA FROID' AND currency_mode='SANS MONNAIE' (full Nayax). Les machines à monnayeur (currency_mode='AVEC MONNAIE') sont EXCLUES : une partie de leurs ventes est encaissée en espèces (invisible côté Nayax) → le taux d'écoulement volume y serait faussé ; leur suivi CA passe par fct_lcdp__ca_mensuel. PÉRIMÈTRE PRODUIT (invariant du modèle) : toutes les mesures de quantité sont restreintes aux groupes de produits VENDABLES via dim_lcdp__product × seed ref_oracle_lcdp__product_group_vendable (is_vendable=true → 3 groupes SNACK / BOISSON FROIDE / PRODUIT FRAIS) ; ce filtre s'applique à tout le modèle, il n'est donc PAS répété dans le nom des colonnes. company_id = client (company_peer) porté par la tâche elle-même (et non l'attribut figé de dim_lcdp__device : ~21% des devices changent de client dans le temps). Entrées issues de int_oracle_lcdp__chargement_tasks, classées par movement_type (sens dérivé du SIGNE de la quantité, pas du label) : les LOADING alimentent qty_chargee, les REMOVING (retraits de stock, ex. péremption) alimentent qty_retiree. Sorties issues de int_oracle_lcdp__telemetry_tasks (1 event = 1 vente). Invendus issus de int_oracle_lcdp__invendus_tasks (task_type 11, produits retirés car invendus : péremption/casse), exposés à part (qty_invendus). Agrégation par device × company × semaine ISO (lundi), FULL OUTER JOIN entre les trois flux sur (device, company, semaine). Rolling 4 semaines (W-3 à W incluse) partitionné par device × company, via window function bornée à 21 jours.
      [GRAIN] 1 ligne par device_id × company_id × week_start_date.
      [NOTES] GRAIN PAR CLIENT : 99,7% des device-semaines n'ont qu'un seul client → le grain équivaut alors à device×semaine. Sur les ~12 semaines de TRANSFERT (machine changeant de client dans la même semaine), on obtient 1 ligne par client : les volumes (qty_*, nb_ventes) restent correctement attribués et additifs (somme des lignes client = total device), MAIS le taux hebdo peut être partiel sur ces semaines (chargé et ventes parfois sur des clients différents le jour du handoff) — le rolling 4 sem. (partition device×client) lisse l'effet ; un transfert repart sur une fenêtre propre. Hors périmètre : DA CHAUD, DA SEMI-AUTO, BORNE/BROYEUR (chargement non commensurable aux events) et machines à monnayeur (volume faussé — voir fct_lcdp__ca_mensuel pour leur CA). Backfill depuis 2025-01-01. taux_ecoulement_volume = NULL si chargement = 0 (vidange de stock historique attendue). COMMENSURABILITÉ : le taux nb_ventes / qty_chargee n'a de sens que parce que 1 event télémétrie Nayax = 1 unité vendue (telemetry_quantity = 1 en amont) ; nb_ventes est un count(*) d'events (entier), comparé à une quantité chargée DÉCLARÉE (somme en unités de base) — deux systèmes de mesure distincts. CONVENTION MESURES : préfixe qty_ = somme de quantités physiques en unités de base ; nb_ = compte d'événements (count). MODÈLE VOLUME PUR : aucune mesure monétaire (CA, coût, marge) n'est exposée ici (décision 2026-06-17) — le suivi repose uniquement sur le rapport quantités chargées / nombre de ventes. Le CA full-Nayax est disponible dans fct_lcdp__ca_mensuel (grain mensuel). RETRAITS : les REMOVING (produit sorti des machines, ex. péremption) sont exposés via qty_retiree (volume d'articles, pas de count d'opérations) ; le taux d'écoulement NET (taux_ecoulement_volume_net_4wk = ventes / (chargé − retiré)) corrige le dénominateur. Classement chargé/retiré piloté par movement_type (signe de la quantité, cf. int_oracle_lcdp__chargement_tasks). INVENDUS : qty_invendus (et qty_invendus_4wk) exposent les produits constatés invendus et retirés (task_type 11, ex. péremption) — brique additive INFORMATIVE, distincte des retraits de chargement (constat dédié, pas de double comptage). N'entre PAS dans le taux d'écoulement net (décision métier 2026-06-26) ; à mobiliser séparément pour le suivi de la casse/pertes.
    config:
      contract:
        enforced: false
    columns:
      - name: device_id
        description: "Identifiant de la machine (FK vers dim_lcdp__device)"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_lcdp__device')
                field: device_id

      - name: week_start_date
        description: "Lundi de la semaine ISO (date_trunc week monday) de la mesure"
        tests:
          - not_null

      - name: company_id
        description: "Client (company_peer) porté par la tâche, composante du grain (device × company × week). FK vers dim_lcdp__company. ~21% des devices changent de client dans le temps → distinct de l'attribut figé de dim_lcdp__device. Sur une semaine de transfert, la machine apparaît sur 1 ligne par client."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_lcdp__company')
                field: company_id

      - name: qty_chargee
        description: "Quantité chargée sur la semaine (movement_type='LOADING'), en unités de base. Périmètre vendable (invariant du modèle). Mesure additive."
        tests:
          - not_null

      - name: qty_retiree
        description: "Quantité retirée des machines sur la semaine (movement_type='REMOVING', ex. péremption), en valeur positive et en unités de base. Périmètre vendable. Mesure additive."
        tests:
          - not_null

      - name: nb_ventes
        description: "Nombre d'events télémétrie Nayax (= nombre de ventes, count) sur la semaine. 1 event = 1 unité vendue (telemetry_quantity = 1) → commensurable avec qty_chargee. Mesure additive."
        tests:
          - not_null

      - name: qty_invendus
        description: "Quantité de produits constatés invendus et retirés sur la semaine (task_type 11 INVENDUS, ex. péremption/casse), en unités de base. Périmètre vendable. Informative — distincte de qty_retiree (pas de double comptage), n'entre pas dans le taux net. Mesure additive."
        tests:
          - not_null

      - name: taux_ecoulement_volume_hebdo
        description: "Ratio nb_ventes / qty_chargee sur la semaine (non additif). NULL si chargement = 0."

      - name: qty_chargee_4wk
        description: "Quantité chargée cumulée sur la fenêtre W-3 à W (4 semaines glissantes). Mesure additive."

      - name: qty_retiree_4wk
        description: "Quantité retirée cumulée sur la fenêtre W-3 à W (4 semaines glissantes). Mesure additive."

      - name: nb_ventes_4wk
        description: "Nombre d'events télémétrie cumulé sur la fenêtre W-3 à W. Mesure additive."

      - name: qty_invendus_4wk
        description: "Quantité d'invendus cumulée sur la fenêtre W-3 à W (4 semaines glissantes). Mesure additive."

      - name: taux_ecoulement_volume_4wk
        description: "Ratio nb_ventes_4wk / qty_chargee_4wk (non additif). Lisse les décalages chargement → vente."

      - name: taux_ecoulement_volume_net_4wk
        description: "Taux d'écoulement NET 4 sem. : nb_ventes_4wk / (qty_chargee_4wk − qty_retiree_4wk). Déduit les retraits du dénominateur. NULL si retiré >= chargé (dénominateur <= 0, fenêtre de déstockage non interprétable)."

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - device_id
              - company_id
              - week_start_date
      - dbt_utils.expression_is_true:
          arguments:
            expression: "qty_chargee >= 0"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "qty_retiree >= 0"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "nb_ventes >= 0"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "qty_invendus >= 0"

  - name: fct_lcdp__ca_mensuel
    description: |
      [QUOI MÉTIER] Chiffre d'affaires mensuel des machines LCDP télémétrées Nayax (DA FROID), consolidant le CA Nayax et le CA encaissé en espèces (machines à monnayeur). Vue revenue pure (sans marge).
      [COMMENT CONSTRUITE] Périmètre dim_lcdp__device.audit_type='1- AUDIT TELEMETRIE (NAYAX)' AND device_category='DA FROID' (machines AVEC et SANS monnayeur). CA Nayax = Σ sale_amount_net_eur (HT) / sale_amount_net_tax_eur (TTC) de int_oracle_lcdp__telemetry_tasks, agrégé au mois. CA cash = Σ ca_cash_ht_eur / ca_cash_eur de int_oracle_lcdp__comptage_tasks (pièces + billets, machines à monnayeur), au mois du comptage. FULL OUTER JOIN device × mois entre les deux flux ; CA total = Nayax + cash. has_monnayeur depuis currency_mode. Backfill depuis 2025-01-01.
      [GRAIN] 1 ligne par device_id × month_start_date (1er jour du mois).
      [NOTES] ATTRIBUTION TEMPORELLE — deux flux de CA à temporalités différentes, réconciliés par le grain mensuel. (1) CA Nayax : rattaché au MOIS EXACT de la vente (chaque event télémétrie est horodaté). (2) CA cash : rattaché au mois de la tâche REGL COMPTAGE, PAS au mois réel des ventes espèces. Un comptage relève le cash accumulé dans le monnayeur depuis le comptage précédent, à cadence IRRÉGULIÈRE (~1-2 sem) ; le CA d'un comptage couvre donc une fenêtre à cheval sur plusieurs jours/semaines, parfois deux mois. POURQUOI LE GRAIN MENSUEL : il absorbe cette irrégularité — à l'échelle du mois, le décalage de quelques jours d'un comptage en fin/début de mois reste marginal (fuite de bord faible), alors qu'un grain hebdo serait faussé par la cadence aléatoire des comptages. NE PAS descendre sous le mensuel. ca_total = CA Nayax (mois de vente) + CA cash (mois de comptage) : addition assumée malgré les temporalités légèrement différentes. Pour full Nayax (has_monnayeur=false), ca_cash_*=0 et le mois est exact. REVENUE PUR : aucun coût / marge / COGS n'est calculé ici (décision métier 2026-06-17). Le coût d'achat des chargements n'est volontairement PAS joint : son timing (mois de chargement) diffère de celui des ventes et brouillerait la lecture CA ; le suivi marge/écoulement vit dans fct_lcdp__chargement_sortie (full Nayax). Le COGS du cash serait de toute façon inconnu (produit vendu en espèces non détaillé). Pas de volume cash (pièces non comptées). Montants HT et TTC exposés. Backfill depuis 2025-01-01.
    config:
      contract:
        enforced: false
    columns:
      - name: month_start_date
        description: "Premier jour du mois (date_trunc month) de la mesure"
        tests:
          - not_null
      - name: device_id
        description: "Identifiant de la machine (FK vers dim_lcdp__device)"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_lcdp__device')
                field: device_id
      - name: company_id
        description: "Identifiant du client (FK vers dim_lcdp__company)"
      - name: has_monnayeur
        description: "TRUE si la machine a un monnayeur (currency_mode=AVEC MONNAIE) → CA cash présent ; FALSE = full Nayax"
      - name: nb_ventes_nayax
        description: "Nombre d'events de vente Nayax sur le mois (ventes carte/sans contact ; n'inclut pas les ventes espèces)"
      - name: ca_nayax_ht_eur
        description: "CA HT des ventes Nayax sur le mois (€)"
      - name: ca_nayax_ttc_eur
        description: "CA TTC des ventes Nayax sur le mois (€)"
      - name: ca_cash_ht_eur
        description: "CA HT encaissé en espèces (comptages du mois, €). 0 pour les machines sans monnayeur."
      - name: ca_cash_ttc_eur
        description: "CA TTC encaissé en espèces (pièces + billets des comptages du mois, €). 0 pour les machines sans monnayeur."
      - name: ca_total_ht_eur
        description: "CA HT total = ca_nayax_ht_eur + ca_cash_ht_eur (€)"
      - name: ca_total_ttc_eur
        description: "CA TTC total = ca_nayax_ttc_eur + ca_cash_ttc_eur (€)"
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - device_id
              - month_start_date
      - dbt_utils.expression_is_true:
          arguments:
            expression: "ca_total_ht_eur >= 0"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "ca_total_ttc_eur >= 0"

  - name: fct_lcdp__passage_appro
    description: |
      [QUOI MÉTIER] Passages APPRO des roadmen chez les clients LCDP, enrichis du pointage début/fin de journée du roadman.
      [COMMENT CONSTRUITE] Issu de int_oracle_lcdp__appro_tasks_enriched (tâches appro idtask_type=32 + roadman type 2 + référentiels company/device, statut ENCOURS reclassé FAIT) joint au pointage journalier dérivé de int_oracle_lcdp__pointage_tasks : date_pointage_debut = premier START_DAY ≥ 03:00 par roadman/jour, date_pointage_fin = dernier END_DAY postérieur au début le même jour.
      [GRAIN] 1 ligne par task_id (1 tâche APPRO).
      [NOTES] Périmètre restreint aux statuts PREVU / FAIT / ANOMALIE (ENCOURS déjà replié en FAIT en intermédiaire) ; ANNULE et VALIDE sont exclus au niveau de ce mart (l'intermédiaire conserve le périmètre complet). is_planned (PREVU/FAIT/ENCOURS) / is_done (FAIT/ENCOURS) / is_anomaly (ANOMALIE) : indicateurs binaires. ANOMALIE est exclu de is_planned (donc du dénominateur du taux, règle métier non figée) mais les lignes anomalie restent présentes et identifiables via is_anomaly. Taux de réalisation = sum(is_done)/sum(is_planned). pointage_missing_flag=1 si aucun début de journée trouvé pour le roadman ce jour. passage_duration_min calculée uniquement pour les passages FAIT.

    columns:
      - name: task_id
        description: Identifiant unique de la tâche de passage
        tests:
          - not_null
          - unique

      - name: device_id
        description: Identifiant de la machine concernée (FK vers dim_lcdp__device)
        tests:
          - relationships:
              arguments:
                to: ref('dim_lcdp__device')
                field: device_id

      - name: company_id
        description: Identifiant du client (FK vers dim_lcdp__company)
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_lcdp__company')
                field: company_id

      - name: resources_roadman_id
        description: Identifiant du roadman ayant effectué le passage (FK vers dim_lcdp__resource)
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_lcdp__resource')
                field: resources_id

      - name: product_source_id
        description: Identifiant du produit source (chargé). Polymorphe selon product_source_type ; pas de FK dim garantie.

      - name: product_destination_id
        description: Identifiant du produit destination (déchargé). Polymorphe selon product_destination_type ; pas de FK dim garantie.

      - name: company_code
        description: Code métier du client

      - name: company_name
        description: Nom du client

      - name: company_info
        description: Nom et code du client (format "Nom - Code")

      - name: device_code
        description: Code métier de la machine

      - name: device_name
        description: Nom de la machine

      - name: device_info
        description: Nom et code de la machine (format "Nom - Code")

      - name: roadman_code
        description: Code métier du roadman

      - name: roadman_name
        description: Nom du roadman

      - name: product_source_type
        description: Type du produit source (qualifie product_source_id)

      - name: product_destination_type
        description: Type du produit destination (qualifie product_destination_id)

      - name: task_location_info
        description: Informations de localisation de la tâche (access_info de la LOCATION Oracle)

      - name: task_status_code
        description: >
          Statut métier de la tâche. Les statuts ENCOURS sont reclassés FAIT après validation métier.

      - name: date_pointage_debut
        description: Début de journée du roadman (premier pointage START_DAY ≥ 03:00). NULL si absent.

      - name: date_pointage_fin
        description: Fin de journée du roadman (dernier pointage END_DAY postérieur au début, même jour). NULL si absent.

      - name: date_pointage_jour
        description: Jour de pointage du roadman (date sans heure)

      - name: start_date_day
        description: Date de début du passage sans l'heure. Clé de rattachement au pointage journalier.

      - name: task_start_date
        description: Date et heure de début réel du passage
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "<= task_end_date"
                config:
                  severity: warn

      - name: task_end_date
        description: Date et heure de fin réelle du passage. NULL si passage en cours.

      - name: passage_duration_min
        description: Durée du passage en minutes (fin - début). NULL si passage non terminé.

      - name: is_planned
        description: >
          Indicateur binaire — tâche planifiée (1) si statut PREVU / FAIT / ENCOURS, sinon 0.
          ANOMALIE volontairement exclu : base du dénominateur du taux de réalisation (règle métier non figée).
        tests:
          - accepted_values:
              arguments:
                values: [0, 1]
                quote: false
              config:
                severity: warn

      - name: is_done
        description: Indicateur binaire indiquant si la tâche est réalisée (1, statut FAIT/ENCOURS) ou non (0)

      - name: is_anomaly
        description: Indicateur binaire indiquant si la tâche est en anomalie (1, statut ANOMALIE) ou non (0)
        tests:
          - accepted_values:
              arguments:
                values: [0, 1]
                quote: false
              config:
                severity: warn

      - name: pointage_missing_flag
        description: 1 = aucun début de journée (pointage) trouvé pour ce roadman ce jour-là

      - name: created_at
        description: Date de création de la tâche dans le système source

      - name: updated_at
        description: Date de dernière mise à jour de la tâche dans le système source

      - name: dbt_updated_at
        description: Horodatage de la dernière exécution du modèle dbt (trace le dernier refresh)

      - name: dbt_invocation_id
        description: Identifiant unique de l'exécution dbt

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - task_id
              - roadman_code
            config:
              severity: error

