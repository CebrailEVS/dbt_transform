# models/marts/oracle_lcdp/_oracle_lcdp__marts_models.yml
version: 2

models:
  # COMPANY
  - name: dim_lcdp__company
    description: |
      [QUOI MÉTIER] Dimension client (company) LCDP enrichie des labels métier et de la localisation.
      [COMMENT CONSTRUITE] Issu de stg_oracle_lcdp__company joint à stg_oracle_lcdp__location pour les coordonnées, et pivot des labels via stg_oracle_lcdp__label_company (vue aplatie lcdp_v_label_company) sur les familles : ZGEO, DOMACT, BUSMOD, GC, ISACTIVE, MODEH, MODEOF, MODER, PROPRIO, REPRES, BL_GRP, MEF, Gestion reliquat.
      [GRAIN] 1 ligne par company_id.
      [NOTES] parent_company_id permet la hiérarchie société-mère/fille. Les attributs label exposent désormais le libellé FR (label_text_fr) au lieu du code. Exception : is_active reste basé sur le code (YES/NO) pour la conversion booléenne (TRUE si label ISACTIVE='yes').
    columns:
      - name: company_id
        description: "Identifiant unique de la société"
        tests:
          - not_null
          - unique
        
      - name: parent_company_id
        description: "ID de la comapny parente (hiérarchie)"

      - name: company_type_id
        description: "ID Type de société (ex : client, fournisseur...)"

      - name: company_code
        description: "Code client"

      - name: company_name
        description: "Nom de la société"

      - name: geo_zone
        description: "Zone géographique de la société (label ZGEO)"

      - name: activity_domain
        description: "Domaine d'activité (label DOMACT)"

      - name: business_model
        description: "Modèle business (label BUSMOD)"

      - name: key_account
        description: "Grand compte (label GC)"

      - name: is_active
        description: >
          Indique si la société est active (label ISACTIVE).
          TRUE si 'yes', sinon FALSE.

      - name: model_horeca
        description: "Modèle HORECA (label MODEH)"

      - name: model_office
        description: "Modèle Office (label MODEOF)"

      - name: model_revendeur
        description: "Modèle Revendeur (label MODER)"

      - name: owner
        description: "Propriétaire de la société (label PROPRIO)"

      - name: representative
        description: "Représentant commercial (label REPRES)"

      - name: bl_group
        description: "Groupe de bon de livraison (label BL_GRP)"

      - name: invoice_delivery_mode
        description: "Mode d'envoi de facture (label MEF)"

      - name: remainder_management
        description: "Gestion du reliquat (label Gestion reliquat)"

      - name: address1
        description: "Adresse principale (ligne 1)"

      - name: address2
        description: "Adresse complémentaire (ligne 2)"

      - name: city
        description: "Ville"

      - name: postal_code
        description: "Code postal"

      - name: country
        description: "Pays"

      - name: created_at
        description: "Date de création de la société"

      - name: updated_at
        description: "Date de dernière modification"

  # PRODUCT
  - name: dim_lcdp__product
    description: |
      [QUOI MÉTIER] Dimension produit LCDP enrichie des labels métier (famille, groupe, marque, bio).
      [COMMENT CONSTRUITE] Issu de stg_oracle_lcdp__product filtré sur product_type_id IN (1, 5), enrichi par pivot des labels via stg_oracle_lcdp__label_product (vue aplatie lcdp_v_label_product) : FAMIPRO, GROUPRO, MARQPRO, BIO, ISACTIVE. created_at corrigé si NULL pour idproduct=1 (fallback updated_at).
      [GRAIN] 1 ligne par product_id.
      [NOTES] product_type_id : 1 = produit, 5 = ligne de prix. Les attributs label exposent désormais le libellé FR (label_text_fr) au lieu du code. Exception : is_active reste basé sur le code (YES/NO) pour la conversion booléenne.
    columns:
      - name: product_id
        description: "Identifiant unique du produit"
        tests:
          - not_null
          - unique

      - name: product_type_id
        description: "ID Type de produit (1=produit, 5=ligne de prix)"

      - name: product_code
        description: "Code métier du produit"

      - name: product_name
        description: "Nom du produit"

      - name: purchase_unit_price
        description: "Prix d'achat unitaire hors taxe"

      - name: product_family
        description: "Famille du produit (label FAMIPRO)"

      - name: product_group
        description: "Groupe du produit (label GROUPRO)"

      - name: product_brand
        description: "Marque du produit (label MARQPRO)"

      - name: product_bio
        description: "Indicateur produit bio (label BIO)"

      - name: is_active
        description: >
          Indique si le produit est actif (label ISACTIVE).
          TRUE si 'yes', sinon FALSE.

      - name: created_at
        description: "Date de création du produit"

      - name: updated_at
        description: "Date de dernière modification"

  # DEVICE
  - name: dim_lcdp__device
    description: |
      [QUOI MÉTIER] Dimension machine LCDP enrichie des labels métier (catégorie, état, types fontaine/broyeur/percolateur/SP).
      [COMMENT CONSTRUITE] Issu de stg_oracle_lcdp__device joint à stg_oracle_lcdp__company (company_code, company_name) et stg_oracle_lcdp__location (access_info → device_location). Pivot des labels via stg_oracle_lcdp__label_device (vue aplatie lcdp_v_label_device) sur les familles : CATMACH, MARQUE, ETAT_MACHINE, STATUT_MATERIEL, TYPEAUDIT, TYDA, LCDPMON, TYPFONT, TYPBROY, TYPPERCO, TYPSP, TYPDASA, MODSP, MARQSP, BADGE, ISACTIVE.
      [GRAIN] 1 ligne par device_id.
      [NOTES] device_iddevice = parent device (hiérarchie). Les attributs label exposent désormais le libellé FR (label_text_fr, ex. "DA CHAUD") au lieu du code (ex. "CATMACH01"). Exception : is_active reste basé sur le code (YES/NO) pour la conversion booléenne. is_active converti en booléen.
    columns:
      - name: device_id
        description: "Identifiant unique du device"
        tests:
          - not_null
          - unique

      - name: device_iddevice
        description: "ID du device parent (hiérarchie)"

      - name: device_type_id
        description: "ID Type de device"

      - name: company_id
        description: "ID de l'entreprise cliente"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_lcdp__company')
                field: company_id

      - name: location_id
        description: "ID de la localisation"

      - name: device_code
        description: "Code métier du device"

      - name: device_name
        description: "Nom du device"

      - name: company_code
        description: "Code de l'entreprise cliente"

      - name: company_name
        description: "Nom de l'entreprise cliente"

      - name: device_category
        description: "Catégorie de la machine (label CATMACH)"

      - name: device_brand
        description: "Marque du device (label MARQUE)"

      - name: device_state
        description: "État de la machine (label ETAT_MACHINE)"

      - name: device_material_status
        description: "Statut du matériel (label STATUT_MATERIEL)"

      - name: audit_type
        description: "Type d'audit - cashless, télémétrie nayax, etc. (label TYPEAUDIT)"

      - name: typology_da
        description: "Typologie DA (label TYDA)"

      - name: currency_mode
        description: "Mode monnaie - avec ou sans (label LCDPMON)"

      - name: fountain_type
        description: "Type de fontaine (label TYPFONT)"

      - name: grinder_type
        description: "Type de broyeur (label TYPBROY)"

      - name: percolator_type
        description: "Type de percolateur (label TYPPERCO)"

      - name: type_sp
        description: "Type SP (label TYPSP)"

      - name: type_dasa
        description: "Type DASA (label TYPDASA)"

      - name: model_sp
        description: "Modèle SP (label MODSP)"

      - name: brand_sp
        description: "Marque SP (label MARQSP)"

      - name: badge
        description: "Badge (label BADGE)"

      - name: device_location
        description: "Informations d'accès de la localisation"

      - name: is_active
        description: >
          Indique si le device est actif (label ISACTIVE).
          TRUE si 'yes', sinon FALSE.

      - name: last_installation_date
        description: "Dernière date d'installation"

      - name: created_at
        description: "Date de création"

      - name: updated_at
        description: "Date de dernière modification"

  # RESOURCE
  - name: dim_lcdp__resource
    description: |
      [QUOI MÉTIER] Dimension ressource Oracle LCDP : personnes (PERSON) + véhicules (VEHICLE) avec hiérarchie.
      [COMMENT CONSTRUITE] Issu de stg_oracle_lcdp__resources, pivot des labels via stg_oracle_lcdp__label_has_resources : ISACTIVE, Fonction. Miroir de dim_neshu__resource sans l'enrichissement GEA (pas de seed côté LCDP).
      [GRAIN] 1 ligne par resources_id.
      [NOTES] Hiérarchie : resources_idresources d'un VEHICLE pointe vers l'ID de la PERSON associée ; NULL pour les personnes. code_status_record conservé (1=actif) sans filtre — filtrage à la volée côté BI. is_active converti en booléen.
    columns:
      - name: resources_id
        description: "Identifiant unique de la ressource dans Oracle"
        tests:
          - not_null
          - unique

      - name: resources_type_id
        description: "Identifiant du type de ressource (clé vers resources_type)"

      - name: resources_idresources
        description: >
          Lien vers la ressource associée. Pour un véhicule (VEHICLE) : pointe vers l'ID de la personne (PERSON) associée.
          Pour une personne (PERSON) : NULL.

      - name: company_id
        description: "Identifiant de l'entreprise à laquelle est rattachée la ressource"
        tests:
          - relationships:
              arguments:
                to: ref('dim_lcdp__company')
                field: company_id

      - name: company_storehouse_id
        description: "Identifiant de l'entreprise entrepôt associée à la ressource"
        tests:
          - relationships:
              arguments:
                to: ref('dim_lcdp__company')
                field: company_id

      - name: location_id
        description: "Identifiant de la localisation de la ressource"

      - name: resources_code
        description: "Code métier de la ressource (ex : code personne ou immatriculation véhicule)"
        tests:
          - not_null

      - name: resources_name
        description: "Nom de la ressource"

      - name: resources_type
        description: "Type de ressource : PERSON (personne) ou VEHICLE (véhicule)"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['PERSON', 'VEHICLE']

      - name: is_active
        description: >
          Indique si la ressource est active (label ISACTIVE).
          Converti en booléen : TRUE si 'yes', FALSE sinon.
        tests:
          - not_null

      - name: fonction
        description: "Fonction de la personne (label Fonction, ex : APPRO, DIRECT). NULL pour les véhicules."

      - name: cost
        description: "Coût associé à la ressource"

      - name: arrival
        description: "Date d'arrivée de la ressource dans l'entreprise"

      - name: departure
        description: "Date de départ de la ressource (NULL si toujours en poste/en service)"

      - name: code_status_record
        description: >
          Code de statut de l'enregistrement Oracle (1 = actif, autre = inactif).
          Non filtré dans ce modèle — utilisable côté BI pour exclure les inactifs.

      - name: created_at
        description: "Date de création de la ressource dans Oracle"

      - name: updated_at
        description: "Date de dernière mise à jour de la ressource dans Oracle"

  # CHARGEMENT vs SORTIE (taux d'écoulement Nayax)
  - name: fct_lcdp__chargement_sortie
    description: |
      [QUOI MÉTIER] Taux d'écoulement hebdomadaire des machines LCDP télémétrées Nayax — comparaison entrées (chargements vendables) vs sorties (events Nayax PLANIFIED_SAILS) en volume et en €.
      [COMMENT CONSTRUITE] Périmètre filtré sur dim_lcdp__device.audit_type='1- AUDIT TELEMETRIE (NAYAX)' AND device_category='DA FROID'. Entrées issues de int_oracle_lcdp__chargement_tasks filtrées sur load_type_code='LOADING' (les REMOVING = retraits de stock sont exclus pour ne pas fausser le flux d'entrée), jointes à dim_lcdp__product et au seed ref_oracle_lcdp__product_group_vendable (filtre is_vendable=true → 3 groupes SNACK / BOISSON FROIDE / PRODUIT FRAIS). Sorties issues de int_oracle_lcdp__telemetry_tasks (1 event = 1 vente, sale_amount_net remonté par Nayax). Agrégation par device × semaine ISO (lundi), FULL OUTER JOIN entre les deux flux. Rolling 4 semaines (W-3 à W incluse) calculé via window function bornée à 21 jours.
      [GRAIN] 1 ligne par device_id × week_start_date.
      [NOTES] Hors périmètre V1 : DA CHAUD, DA SEMI-AUTO et BORNE/BROYEUR (chargement non commensurable aux events). Backfill depuis 2025-01-01. taux_ecoulement_volume = NULL si chargement = 0 (vidange de stock historique attendue). taux_marge_brute_apparent = CA HT sortie / coût d'achat chargement, valeur > 1 attendue (marge brute distributeur typique ≈ 2,0-2,1×). Les chargements de type REMOVING (retraits de stock pour audit/fin de contrat) sont exclus pour ne pas fausser les entrées — leur traçabilité reste accessible directement via int_oracle_lcdp__chargement_tasks.
    config:
      contract:
        enforced: false
    columns:
      - name: device_id
        description: "Identifiant de la machine (FK vers dim_lcdp__device)"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_lcdp__device')
                field: device_id

      - name: week_start_date
        description: "Lundi de la semaine ISO (date_trunc week monday) de la mesure"
        tests:
          - not_null

      - name: qty_vendable_chargee
        description: "Quantité totale chargée sur la semaine, restreinte aux product_group vendables"
        tests:
          - not_null

      - name: cout_achat_chargement_eur
        description: "Coût d'achat total du chargement vendable de la semaine (€ HT, basé sur purchase_unit_price latest)"
        tests:
          - not_null

      - name: nb_chargements
        description: "Nombre de tâches distinctes de chargement sur la semaine"
        tests:
          - not_null

      - name: nb_ventes
        description: "Nombre d'events télémétrie Nayax (= nombre de ventes) sur la semaine"
        tests:
          - not_null

      - name: ca_ht_sortie_eur
        description: "Chiffre d'affaires HT remonté par les events Nayax sur la semaine (€)"
        tests:
          - not_null

      - name: ca_ttc_sortie_eur
        description: "Chiffre d'affaires TTC remonté par les events Nayax sur la semaine (€)"
        tests:
          - not_null

      - name: taux_ecoulement_volume_hebdo
        description: "Ratio nb_ventes / qty_vendable_chargee sur la semaine. NULL si chargement = 0."

      - name: taux_marge_brute_apparent_hebdo
        description: "Ratio ca_ht_sortie_eur / cout_achat_chargement_eur sur la semaine. NULL si chargement = 0. Indicateur de marge brute apparente (coefficient distributeur)."

      - name: marge_brute_apparente_hebdo_eur
        description: "Différence ca_ht_sortie_eur - cout_achat_chargement_eur sur la semaine (€)"

      - name: qty_vendable_chargee_4wk
        description: "Quantité chargée vendable cumulée sur la fenêtre W-3 à W (4 semaines glissantes)"

      - name: cout_achat_chargement_4wk_eur
        description: "Coût d'achat chargement cumulé sur la fenêtre W-3 à W (€)"

      - name: nb_ventes_4wk
        description: "Nombre d'events télémétrie cumulé sur la fenêtre W-3 à W"

      - name: ca_ht_sortie_4wk_eur
        description: "CA HT cumulé sur la fenêtre W-3 à W (€)"

      - name: ca_ttc_sortie_4wk_eur
        description: "CA TTC cumulé sur la fenêtre W-3 à W (€)"

      - name: taux_ecoulement_volume_4wk
        description: "Ratio nb_ventes_4wk / qty_vendable_chargee_4wk. Lisse les décalages chargement → vente."

      - name: taux_marge_brute_apparent_4wk
        description: "Ratio ca_ht_sortie_4wk_eur / cout_achat_chargement_4wk_eur."

      - name: marge_brute_apparente_4wk_eur
        description: "Marge brute apparente cumulée sur la fenêtre W-3 à W (€)"

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - device_id
              - week_start_date
      - dbt_utils.expression_is_true:
          arguments:
            expression: "qty_vendable_chargee >= 0"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "cout_achat_chargement_eur >= 0"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "nb_ventes >= 0"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "ca_ht_sortie_eur >= 0"
