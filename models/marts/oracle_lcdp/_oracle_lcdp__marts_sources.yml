version: 2

# ============================================
# SOURCES EXTERNES - MARTS ORACLE LCDP
# ============================================
# Tables écrites directement dans prod_marts par des pipelines
# externes à dbt (Cloud Run jobs orchestrés via GCP Cloud Workflows).
# Documentées ici pour : tests qualité, visibilité dbt docs, référencement source().
# ============================================

sources:
  - name: marts_oracle_lcdp_external
    description: |
      Tables de la couche marts alimentées par des pipelines externes à dbt.
      Chargées via Cloud Run jobs orchestrés par GCP Cloud Workflows.
      Ne pas modifier via dbt — toute évolution passe par le Cloud Run job concerné.
    config:
      tags: ['marts', 'oracle_lcdp', 'external_source']
    database: evs-datastack-prod
    schema: prod_marts

    tables:
      - name: fct_oracle_lcdp__monitoring_passages_appro
        description: |
          Table de monitoring des passages approvisionneurs Roadman chez les clients LCDP.

          **Pipeline :**
          - Cloud Run job : `ingest-oracle-lcdp-passages-appro`
          - Orchestration : GCP Cloud Workflows (`pipeline-passages-appro-lcdp`)
          - Schedule : jours ouvrés, 07h–15h (Europe/Paris), géré par Cloud Scheduler

          **Refresh :**
          - Mode : TRUNCATE + full reload
          - Historique : 15 derniers jours
          - Statuts inclus : PREVU, ENCOURS, FAIT

          **Usage métier :**
          Suivi en quasi temps-réel des passages Roadman LCDP.
          PBI : workspace "Lcdp" / dataset "DEV APPRO MONITORING".

          ⚠️ Ne pas modifier cette table via dbt.

        config:
          meta:
            owner: "Cebrail Aksoy"
            refresh_frequency: "hourly"
            refresh_schedule: "weekdays 07-15 Paris"
            data_retention_days: 15
            external_pipeline: true
            cloud_run_job: "ingest-oracle-lcdp-passages-appro"
            cloud_workflow: "pipeline-passages-appro-lcdp"
          loaded_at_field: loaded_at_utc

        columns:
          - name: task_id
            description: "Identifiant unique de la tâche de passage (clé primaire)"
            data_type: integer
            tests:
              - unique
              - not_null

          - name: roadman_code
            description: "Code du roadman assigné au passage."
            data_type: string

          - name: company_code
            description: "Code client"
            data_type: string

          - name: company_name
            description: "Nom du client"
            data_type: string

          - name: company_info
            description: "Info complet du client au format 'nom - code'."
            data_type: string

          - name: device_id
            description: "Identifiant de l'équipement/machine concerné"
            data_type: integer

          - name: device_info
            description: "Info complet de l'équipement au format 'nom - code'."
            data_type: string

          - name: passage_start_datetime
            description: "Date et heure de début réel du passage."
            data_type: timestamp
            tests:
              - not_null

          - name: passage_start_date
            description: "Date du passage sans l'heure. Utilisé pour les agrégations journalières."
            data_type: date

          - name: passage_end_datetime
            description: "Date et heure de fin réelle du passage. Peut être NULL si passage en cours."
            data_type: timestamp

          - name: passage_status
            description: "Statut du passage : PREVU / ENCOURS / FAIT"
            data_type: string

          - name: passage_duration_min
            description: "Durée du passage en minutes. NULL si passage pas encore terminé."
            data_type: float

          - name: is_done
            description: "1 = FAIT, 0 = PREVU ou ENCOURS"
            data_type: integer

          - name: is_planned
            description: "1 = PREVU / ENCOURS / FAIT, 0 = autres statuts"
            data_type: integer

          - name: passage_sequence
            description: "Numéro de séquence du passage pour ce roadman dans la journée."
            data_type: integer

          - name: loaded_at_utc
            description: "Timestamp de chargement dans BigQuery. Permet de tracer le dernier refresh."
            data_type: timestamp
            tests:
              - not_null

        tests:
          - dbt_utils.unique_combination_of_columns:
              arguments:
                combination_of_columns:
                  - task_id
                  - roadman_code
                config:
                  severity: error
