# models/marts/oracle_neshu/_oracle_neshu__marts_models.yml
version: 2

models:
  # COMPANY
  - name: dim_neshu__company
    description: |
      [QUOI MÉTIER] Dimension client (company) Neshu enrichie des labels métier et de la localisation.
      [COMMENT CONSTRUITE] Issu de stg_oracle_neshu__company joint à stg_oracle_neshu__location pour les coordonnées, et pivot des labels (stg_oracle_neshu__label_has_company + label + label_family) sur les familles : REGION, SECTEUR_ACTVITE, CODE_SECTEUR, SECTEUR_DACTIVITE, TRANCHE_COLLAB, TYPECOMPAGNIE, MODELEECOCLIENT, STATUT_CLIENT, ISACTIVE, KA, KATIERS, TELETRAVAIL, PROADMAN, GSM_TERRAIN, BADGE, RECYCLAGE.
      [GRAIN] 1 ligne par company_id.
      [NOTES] is_active converti en booléen (TRUE si label ISACTIVE='yes'). Les ghost-deletes ERP (code_status_record = -1, sociétés supprimées de l'ERP mais conservées en base) sont hard-filtrés : aucune FK aval ne les référence depuis que l'ERP a réaffecté les rôles entrepôt (resource.company_storehouse_id) en juin 2026.
    columns:
      - name: company_id
        description: "Identifiant unique de la société"
        tests:
          - not_null
          - unique

      - name: company_type_id
        description: "ID Type de société (ex : client, fournisseur...)"

      - name: company_code
        description: "Code client"

      - name: company_name
        description: "Nom de la société"

      - name: company_label
        description: "Libellé d'affichage = concaténation `company_code - company_name`."

      - name: region
        description: "Région géographique de la société (label REGION)"

      - name: sector
        description: "Secteur d’activité (HORECA/OFFICE) (label SECTEUR_ACTVITE)"

      - name: sector_code
        description: "Code sectoriel associé, lien avec ceux de nespresso (label CODE_SECTEUR)"

      - name: activity_sector
        description: "Secteur d'activité détaillé (label SECTEUR_DACTIVITE)"

      - name: employee_range
        description: "Tranche de collaborateurs (label TRANCHE_COLLAB)"

      - name: company_type
        description: "Type d’entreprise (label TYPECOMPAGNIE)"

      - name: company_economic_model
        description: "Modèle économique client (label MODELEECOCLIENT)"

      - name: client_status
        description: "Statut client (OR/ARGENT/BRONZE) (label STATUT_CLIENT)"

      - name: is_active
        description: >
          Indique si la société est active (label ISACTIVE).
          TRUE si 'yes', sinon FALSE.

      - name: is_client_neshu
        description: >
          TRUE si la société est un client Neshu, selon l'une des 3 conditions :
          company_code de la forme 'CN____' ou 'CP____' (préfixe + 4 caractères),
          ou company_type (label TYPECOMPAGNIE) = 'CLIENTNESHU'.
        tests:
          - not_null

      - name: key_account
        description: "KA grand compte (label KA)"

      - name: katiers
        description: "Label KATIERS lié au KA"

      - name: remote_work
        description: "Indicateur du nombre de télétravail par semaine (label TELETRAVAIL)"

      - name: proadman
        description: "Nombre de passage roadman (label PROADMAN)"

      - name: gsm
        description: "Gobelet Sucre Melangeur FORMULE (label GSM_TERRAIN)"

      - name: badge
        description: "Indicateur de badge client (label BADGE)"

      - name: recycling
        description: "Indicateur de recyclage (label RECYCLAGE)"

      - name: address1
        description: "Adresse principale (ligne 1)"

      - name: address2
        description: "Adresse complémentaire (ligne 2)"

      - name: city
        description: "Ville de la société"

      - name: postal_code
        description: "Code postal de la société"

      - name: country
        description: "Pays de la société"

      - name: created_at
        description: "Date de création dans la base source"

      - name: updated_at
        description: "Date de dernière mise à jour dans la base source"

  # PRODUCT
  - name: dim_neshu__product
    description: |
      [QUOI MÉTIER] Dimension produit Neshu enrichie des labels métier (famille, groupe, marque, bio, propriétaire).
      [COMMENT CONSTRUITE] Issu de stg_oracle_neshu__product filtré sur product_type_id IN (1, 5), enrichi par pivot des labels via stg_oracle_neshu__label_has_product : MARQUEP, PROPRIETAIRE, FAMILLE, BIO, GROUPE, ISACTIVE. product_type standardisé via règle métier (CAFE CAPS, THE, CHOCOLATS VAN HOUTEN, BOISSONS GOURMANDES, ACCESSOIRES, CAFENOIR, SNACKING, BOISSONS FRAICHES, INDEFINI).
      [GRAIN] 1 ligne par product_id.
      [NOTES] product_type_id : 1 = produit, 5 = ligne de prix. is_active converti en booléen.
    columns:
      - name: product_id
        description: "Identifiant unique du produit"
        tests:
          - not_null
          - unique

      - name: product_type_id
        description: "Type de produit (1 = produit, 5 = ligne de prix)"

      - name: product_code
        description: "Code produit (référence interne)"

      - name: product_name
        description: "Nom du produit"

      - name: purchase_unit_price
        description: "Prix d'achat unitaire du produit"

      - name: product_brand
        description: "Marque du produit, extraite du label MARQUEP"

      - name: product_owner
        description: "Propriétaire du produit, via label PROPRIETAIRE"

      - name: product_family
        description: "Famille produit (ex : CAFE CAPSULES, THE), via label FAMILLE"

      - name: product_bio
        description: "Indication BIO ou non (via label BIO)"

      - name: product_group
        description: "Groupe produit (ACCESSOIRES, SNACKING...), via label GROUPE"

      - name: product_type
        description: >
          Typologie produit standardisée selon règles métier :
          ex. 'CAFE CAPS', 'THE', 'CHOCOLATS VAN HOUTEN', 'BOISSONS GOURMANDES'.
  
      - name: is_active
        description: >
          État d'activité du produit, converti en booléen :
          TRUE si le label ISACTIVE = 'YES', sinon FALSE.

      - name: created_at
        description: "Date de création du produit dans la source"

      - name: updated_at
        description: "Date de dernière mise à jour du produit dans la source"

    # DEVICE
  - name: dim_neshu__device
    description: |
      [QUOI MÉTIER] Dimension machine Neshu enrichie des labels métier et rattachée au client (company).
      [COMMENT CONSTRUITE] Issu de stg_oracle_neshu__device filtré sur device_type_id=1 (machines), joint à stg_oracle_neshu__location pour device_location, et pivot des labels via stg_oracle_neshu__label_has_device : MARQUE, GAMME, CATEGORIE, MODECOMA, ISACTIVE. company_id avec relationship vers dim_neshu__company.
      [GRAIN] 1 ligne par device_id.
      [NOTES] device_iddevice = parent device (NULL si pas d'équipement parent). is_active converti en booléen.
    columns:
      - name: device_id
        description: "Identifiant unique de la machine"
        tests:
          - not_null
          - unique

      - name: device_type_id
        description: "Type de machine (1 = machine, autres ignorés ici)"

      - name: device_iddevice
        description: "ID de la machine correspondant : vaut nulle si pas d'équipement parent, sinon l'ID de la machine parente"

      - name: company_id
        description: "Identifiant du client (company) auquel est rattachée la machine"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_neshu__company')
                field: company_id

      - name: location_id
        description: "Identifiant de localisation"

      - name: device_code
        description: "Code interne de la machine"

      - name: device_name
        description: "Nom de la machine"

      - name: device_label
        description: "Libellé d'affichage = concaténation `device_code - device_name`."

      - name: company_code
        description: "Code client associé à la machine"

      - name: device_brand
        description: "Marque de la machine (label MARQUE)"

      - name: device_gamme
        description: "Gamme de la machine (label GAMME)"

      - name: device_category
        description: "Catégorie de la machine (label CATEGORIE)"

      - name: device_economic_model
        description: "Modèle économique de la machine (label MODECOMA)"

      - name: is_active
        description: >
          Indique si la machine est considérée comme active selon le label ISACTIVE.
          TRUE si 'yes', sinon FALSE (converti en booléen).

      - name: device_location
        description: "Informations d'accès au site de la machine (depuis la table location)"

      - name: last_installation_date
        description: "Date de dernière installation de la machine"

      - name: created_at
        description: "Date de création de la machine dans la base source"

      - name: updated_at
        description: "Date de dernière mise à jour de la machine dans la base source"

# FACT BUSINESS REVIEW
  - name: fct_neshu__consommation
    description: |
      [QUOI MÉTIER] Consommations produits clients Neshu, consolidées depuis 3 sources opérationnelles.
      [COMMENT CONSTRUITE] Union de 3 flux : télémétrie machines (int_oracle_neshu__telemetry_tasks), chargements machines (int_oracle_neshu__chargement_tasks), livraisons directes (int_oracle_neshu__livraison_tasks). Enrichi par dim_neshu__company, dim_neshu__device, dim_neshu__product. Règles métier : (a) multiplicateurs de conditionnement (rame/boîte/carton) via le seed ref_oracle_neshu__product_packaging (clé product_id) appliqués aux flux chargement et livraison ; (b) arbitrage télémétrie vs chargement porté par la règle générale gratuit/payant (machines gratuites NESPRESSO/NESTLE/ANIMO comptées via chargement, payantes via télémétrie ; chocolats et accessoires toujours via chargement) ; (c) cas particuliers (machine/client) dérogeant à cette règle externalisés dans le seed ref_oracle_neshu__consommation_source_override. La livraison n'est jamais arbitrée. location='LIVRAISON' et device_*='LIVRAISON' pour les flux livraison directe (sans machine).
      [GRAIN] 1 ligne par (company_id, device_id, product_id, location_id, location, consumption_date, data_source).
      [NOTES] data_source ∈ {TELEMETRIE, CHARGEMENT, LIVRAISON}. device_id NULL uniquement si data_source='LIVRAISON' (invariant testé). Overrides d'arbitrage : voir ref_oracle_neshu__consommation_source_override (mode redirection ciblée vs takeover machine via is_takeover). Multiplicateurs : voir ref_oracle_neshu__product_packaging ; le test assert_neshu__packaging_seed_complete alerte si un produit conditionné manque au seed.
    
    columns:
      # === IDENTIFIANTS ===
      - name: company_id
        description: "Identifiant unique de la société cliente"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_neshu__company')
                field: company_id

      - name: device_id
        description: "Identifiant de la machine (NULL pour les livraisons directes)"
        tests:
          - relationships:
              arguments:
                to: ref('dim_neshu__device')
                field: device_id

      - name: location_id
        description: "Identifiant de localisation (NULL pour les livraisons)"

      - name: product_id
        description: "Identifiant unique du produit"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_neshu__product')
                field: product_id

      # === COMPANY ===
      - name: company_code
        description: "Code client (ex: CN1234)"
        tests:
          - not_null

      - name: company_name
        description: "Nom de la société cliente"
        tests:
          - not_null

      # === LOCALISATION ===
      - name: location
        description: "Localisation de la consommation (Localisation task par défault, si vide => prendre localisation device) ou 'LIVRAISON' pour les livraisons directes"

      # === MACHINE ===
      - name: device_serial_number
        description: "Numéro de série de la machine ou 'LIVRAISON'"

      - name: device_name
        description: "Nom de la machine ou 'LIVRAISON'"

      - name: device_brand
        description: "Marque de la machine (NESPRESSO, NESTLE, ANIMO) ou 'LIVRAISON'"

      - name: device_economic_model
        description: "Modèle économique (Participatif valeurs, Participatif unités, Payant) ou 'LIVRAISON'"

      # === PRODUIT ===
      - name: product_name
        description: "Nom complet du produit"
        tests:
          - not_null

      - name: product_brand
        description: "Marque du produit"

      - name: product_family
        description: "Famille de produits"

      - name: product_group
        description: "Groupe de produits"

      - name: product_type
        description: "Type de produit (adapté aux règles métier)"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: 
                  - 'THE'
                  - 'CAFE CAPS'
                  - 'CHOCOLATS VAN HOUTEN'
                  - 'BOISSONS GOURMANDES'
                  - 'ACCESSOIRES'
                  - 'CAFENOIR'
                  - 'INDEFINI'
                  - 'SNACKING'
                  - 'BOISSONS FRAICHES'

      # === CONTEXTE ===
      - name: consumption_date
        description: "Date de consommation (format DATE)"
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: "'2020-01-01'"
                max_value: "current_date()"

      - name: data_source
        description: "Source des données de consommation"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['TELEMETRIE', 'CHARGEMENT', 'LIVRAISON']

      # === MESURES ===
      - name: quantity
        description: >
          Quantité consommée (ajustée selon les règles produit).
          Multiplicateurs appliqués pour les rames, boîtes, etc.
        tests:
          - not_null

      # === METADONNEES ===
      - name: dbt_updated_at
        description: "Timestamp de dernière mise à jour par dbt"
        tests:
          - not_null

      - name: dbt_invocation_id
        description: "ID unique de l'exécution dbt"
        tests:
          - not_null

    # === TESTS AU NIVEAU TABLE ===
    tests:
      # Test d'unicité sur la combinaison clé
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - company_id
              - device_id
              - product_id
              - location_id
              - location
              - consumption_date
              - data_source
          name: unique_consumption_record

      # Test de cohérence : pas de device_id NULL sauf pour LIVRAISON
      - dbt_utils.expression_is_true:
          arguments:
            expression: "(device_id IS NOT NULL) OR (data_source = 'LIVRAISON')"
          name: device_id_required_except_livraison

      # === CONTRACT ===
  - name: dim_neshu__contract
    description: |
      [QUOI MÉTIER] Dimension contrat Neshu : 1 contrat actif principal sélectionné par client.
      [COMMENT CONSTRUITE] Issu de stg_oracle_neshu__contract, pivot des labels via stg_oracle_neshu__label_has_contract (ISACTIVE, ENGAGEMENT, NOMBRE_COLLAB). Sélection du contrat principal par company_id : tri descendant sur current_end_date puis sur original_start_date, conservation du premier.
      [GRAIN] 1 ligne par contract_id (et indirectement 1 par company_id — warn-tested).
      [NOTES] is_active converti depuis label ISACTIVE. engagement_clean = parsing numérique d'engagement_raw.

    columns:
      - name: contract_id
        description: Identifiant unique du contrat
        data_type: number
        tests:
          - unique
          - not_null
      
      - name: company_id
        description: Identifiant de l'entreprise cliente associée au contrat
        data_type: number
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_neshu__company')
                field: company_id

      - name: contract_code
        description: Code du contrat
        data_type: varchar
      
      - name: engagement_raw
        description: Engagement brut du contrat (valeur non nettoyée)
        data_type: varchar
      
      - name: engagement_clean
        description: Engagement nettoyé du contrat
        data_type: number
      
      - name: nombre_collab
        description: Nombre de collaborateurs associés au contrat
        data_type: number
      
      - name: is_active
        description: Indique si le contrat est actif (transformé depuis le label ISACTIVE)
        data_type: boolean
        tests:
          - not_null
      
      - name: original_start_date
        description: Date de début originale du contrat
        data_type: timestamp
      
      - name: original_end_date
        description: Date de fin originale du contrat
        data_type: timestamp
      
      - name: current_end_date
        description: Date de fin courante du contrat
        data_type: timestamp
      
      - name: termination_date
        description: Date de résiliation du contrat
        data_type: timestamp
      
      - name: created_at
        description: Date de création de l'enregistrement
        data_type: timestamp
        tests:
          - not_null
      
      - name: updated_at
        description: Date de dernière mise à jour de l'enregistrement
        data_type: timestamp
        tests:
          - not_null
    
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - company_id
          config:
            severity: warn
            error_if: ">1"


  - name: fct_neshu__chargement_consommation
    description: |
      [QUOI MÉTIER] Quantités chargées vs consommées par machine et par jour de passage APPRO (taux d'écoulement).
      [COMMENT CONSTRUITE] Pour chaque passage APPRO d'une machine, calcul via LAG du passage précédent pour borner la période d'écoulement ; q_consommee = somme des télémétries entre les deux passages ; q_chargee = somme des chargements lors du passage actuel. Sources : int_oracle_neshu__chargement_tasks, int_oracle_neshu__telemetry_tasks, jointes par device_id et period bounds.
      [GRAIN] 1 ligne par (device_id, date_debut_passage_appro, product_id). Grain JOURNALIER, pas par passage : les jours à plusieurs passages (~1,7 % des device-jours) sont fusionnés en une seule ligne.
      [NOTES]
      ⚠️ q_consommee = somme BRUTE des télémétries, SANS arbitrage télémétrie/chargement ni multiplicateur de conditionnement. Ce N'EST PAS la métrique officielle de consommation : le volume de consommation arbitré (consommation_volume du semantic layer) est porté par fct_neshu__consommation. Ne pas confondre les deux.
      Ce mart re-dérive sa propre notion de passage (int_oracle_neshu__appro_tasks filtré task_status_code='FAIT', depuis 2025-01-01) et n'est PAS aligné sur fct_neshu__passage_appro (source de vérité passages, périmètre PREVU/FAIT/ANOMALIE) — ré-ancrage à prévoir.
      q_chargee utilise un MAX (et non un SUM) : sur un jour à plusieurs passages, la jointure chargement par DATE duplique le total journalier sur chaque passage, le MAX dédoublonne ce total. task_start_date_min = MIN des horodatages des passages du jour (pas un horodatage unique).
      roadman_code = nom du roadman associé au véhicule source (attribut d'affichage). product_source_id / product_source_type = identifiant et type Oracle de la source du chargement (exposés pour diagnostic, pas de test FK car mart combinant plusieurs intermediates). product_type aplati pour filtre BI. product_code conservé en attribut d'affichage.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [device_id, date_debut_passage_appro, product_id]

    columns:
      - name: device_id
        description: "Identifiant du device ayant effectué le passage."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_neshu__device')
                field: device_id

      - name: date_debut_passage_appro
        description: "Date du passage APPRO (troncature à la journée)."
        tests:
          - not_null

      - name: task_start_date_min
        description: "Horodatage du premier passage APPRO du jour (MIN sur les passages fusionnés dans la ligne)."

      - name: date_passage_precedent
        description: "Date du passage APPRO précédent pour ce device."

      - name: roadman_code
        description: |
          ⚠️ Naming hérité trompeur — il s'agit en réalité du `name` de
          stg_oracle_neshu__resources (le roadman/véhicule associé), et non d'un code.
          Contient un mélange hétérogène :
            - nom de famille d'un roadman pour les véhicules avec PERSON associée (ex. "DUPONT")
            - libellé de véhicule contrat (ex. "VARKEMA")
            - libellé de site logistique (ex. "PREPA RUNGIS")
            - état temporaire (ex. "LIBRE ( ANCIEN SJEROME)")
          Conséquence : ne pas utiliser comme clé de filtre/jointure côté BI sans
          discriminer la nature via product_source_type. Attribut d'affichage uniquement.
          Pour identifier proprement la source : product_source_id (+ product_source_type).

      - name: product_source_id
        description: "Identifiant de la ressource source du chargement (idresources). Non testé en FK : ce mart combine plusieurs intermediates et la sémantique de source mélange véhicules, dépôts et anomalies Oracle (cf. idresources=278). Exposé pour diagnostic."

      - name: product_source_type
        description: "Type Oracle de la source (RESOURCES, COMPANY, etc.). Permet de désambiguïser product_source_id en cas de collision d'IDs entre tables."

      - name: product_type
        description: "Type de produit associé aux quantités consommées ou chargées."
        tests:
          - not_null

      - name: product_id
        description: "Identifiant unique du produit (FK vers dim_neshu__product)."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_neshu__product')
                field: product_id

      - name: product_code
        description: "Code produit (attribut d'affichage, aplati depuis dim_neshu__product)."
        tests:
          - not_null

      - name: q_consommee
        description: "Somme BRUTE des télémétries écoulées entre le passage précédent et le passage actuel (sans arbitrage ni conditionnement). Ne correspond PAS à la métrique officielle consommation_volume (cf. fct_neshu__consommation)."

      - name: q_chargee
        description: "Quantité chargée lors du passage APPRO (MAX du total journalier, cf. NOTES)."

      - name: dbt_updated_at
        description: "Horodatage de la dernière exécution dbt ayant matérialisé la ligne."

      - name: dbt_invocation_id
        description: "Identifiant d'invocation dbt ayant produit la ligne (traçabilité du run)."


  - name: fct_neshu__chargement_quinzaine
    description: |
      [QUOI MÉTIER] Quantités chargées par client, type de produit, année et quinzaine.
      [COMMENT CONSTRUITE] Issu de int_oracle_neshu__chargement_tasks joint à dim_neshu__product (product_type) et dim_neshu__device (company_code). Regroupement BOISSONS FRAICHES + SNACKING → SODA + SNACKS pour le reporting BI. Quinzaine calculée depuis le lundi de référence de l'année (FLOOR(jours / 14) + 1).
      [GRAIN] 1 ligne par (product_type, company_code, annee_chgt, quinzaine_chgt).
      [NOTES] quinzaine_chgt ∈ [1, 27].

    columns:
      - name: product_type
        description: Type de produit issu de la dimension produit
        tests:
          - not_null

      - name: company_code
        description: Code de la société
        tests:
          - not_null

      - name: annee_chgt
        description: Année de la date de démarrage de la tâche
        tests:
          - not_null

      - name: quinzaine_chgt
        description: Numéro de quinzaine calculé à partir du lundi de référence
        tests:
          - not_null

      - name: quantite_chargee
        description: Quantité totale chargée sur la période


  - name: dim_neshu__resource
    description: |
      [QUOI MÉTIER] Dimension ressource Oracle Neshu : roadmen (PERSON) + véhicules (VEHICLE) avec hiérarchie.
      [COMMENT CONSTRUITE] Issu de stg_oracle_neshu__resources, pivot des labels via stg_oracle_neshu__label_has_resources : ISACTIVE, Fonction. Enrichi du code GEA depuis ref_oracle_neshu__roadman_gea (seed) sur les PERSON uniquement (jointure resources_code).
      [GRAIN] 1 ligne par resources_id.
      [NOTES] Hiérarchie : resources_idresources d'un VEHICLE pointe vers l'ID du roadman PERSON associé ; NULL pour les roadmen. code_status_record conservé (1=actif) sans filtre — filtrage à la volée côté BI. is_active converti en booléen.
    columns:
      - name: resources_id
        description: "Identifiant unique de la ressource dans Oracle"
        tests:
          - not_null
          - unique

      - name: resources_type_id
        description: "Identifiant du type de ressource (clé vers resources_type)"

      - name: resources_idresources
        description: >
          Lien vers la ressource associée. Pour un véhicule (VEHICLE) : pointe vers l'ID du roadman (PERSON) associé.
          Pour un roadman (PERSON) : NULL.

      - name: company_id
        description: "Identifiant de l'entreprise à laquelle est rattachée la ressource (NULL toléré : ressources génériques, comptes API, véhicules sans rattachement)"
        tests:
          - relationships:
              arguments:
                to: ref('dim_neshu__company')
                field: company_id

      - name: company_storehouse_id
        description: "Identifiant de l'entreprise entrepôt associée à la ressource (NULL toléré : véhicules itinérants sans dépôt fixe)"
        tests:
          - relationships:
              arguments:
                to: ref('dim_neshu__company')
                field: company_id

      - name: location_id
        description: "Identifiant de la localisation de la ressource"

      - name: resources_code
        description: "Code métier de la ressource (ex : code roadman ou immatriculation véhicule)"
        tests:
          - not_null

      - name: resources_name
        description: "Nom de la ressource"

      - name: resources_type
        description: "Type de ressource : PERSON (roadman) ou VEHICLE (véhicule)"
        tests:
          - not_null

      - name: gea_code
        description: >
          Code GEA du roadman, issu de `ref_oracle_neshu__roadman_gea`.
          Jointé sur `resources_code` pour les PERSON uniquement. NULL pour les véhicules.

      - name: is_active
        description: >
          Indique si la ressource est active (label ISACTIVE).
          Converti en booléen : TRUE si 'yes', FALSE sinon.
        tests:
          - not_null

      - name: fonction
        description: "Fonction du roadman (label Fonction, ex : ROADMAN, RESPONSABLE). NULL pour les véhicules."

      - name: cost
        description: "Coût associé à la ressource"

      - name: arrival
        description: "Date d'arrivée de la ressource dans l'entreprise"

      - name: departure
        description: "Date de départ de la ressource (NULL si toujours en poste/en service)"

      - name: code_status_record
        description: >
          Code de statut de l'enregistrement Oracle (1 = actif, autre = inactif).
          Non filtré dans ce modèle — utilisable côté BI pour exclure les inactifs.

      - name: created_at
        description: "Date de création de la ressource dans Oracle"

      - name: updated_at
        description: "Date de dernière mise à jour de la ressource dans Oracle"

  - name: fct_neshu__passage_appro
    description: |
      [QUOI MÉTIER] Passages APPRO des roadmen enrichis des métriques journalières de temps de travail.
      [COMMENT CONSTRUITE] Issu de int_oracle_neshu__appro_tasks joint à int_oracle_neshu__pointage_tasks (START_DAY) pour le pointage journalier du roadman. Calculs window function par roadman et jour : rang du passage, nombre quotidien de passages, durée moyenne, durée nette du temps de travail (dernière fin - début effectif, nettoyée des valeurs aberrantes <0 ou >12h). Statut ENCOURS reclassé en FAIT après validation métier.
      [GRAIN] 1 ligne par task_id (1 tâche APPRO).
      [NOTES] Périmètre restreint aux statuts PREVU / FAIT / ANOMALIE (filtré dans la CTE passage_appro, avant les window functions, pour que les métriques journalières ne portent que sur ce périmètre) ; ANNULE / VALIDE / ACQUITTE / ENATTENTE exclus. NESHU compte les anomalies : ANOMALIE est inclus dans is_planned (donc dans le taux). effective_work_start = pointage si disponible, sinon première tâche du jour. is_planned (PREVU/FAIT/ENCOURS/ANOMALIE) / is_done (FAIT/ENCOURS) / is_anomaly (ANOMALIE) : indicateurs binaires. Source de vérité unique des passages appro (KPIs journaliers + attributs détaillés), consommée par le monitoring et le reporting appro.

    columns:

      # =====================
      # 1️⃣ IDs
      # =====================

      - name: task_id
        description: Identifiant unique de la tâche de passage
        tests:
          - not_null
          - unique

      - name: device_id
        description: Identifiant du device associé à la tâche (NULL toléré, cf. task_id 11460408 — source Oracle)
        tests:
          - relationships:
              arguments:
                to: ref('dim_neshu__device')
                field: device_id

      - name: company_id
        description: Identifiant de l'entreprise cliente
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_neshu__company')
                field: company_id

      - name: resources_roadman_id
        description: Identifiant du roadman ayant effectué le passage
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_neshu__resource')
                field: resources_id

      - name: product_source_id
        description: Identifiant du produit source (chargé) de la tâche. Polymorphe selon product_source_type ; pas de FK dim garantie.

      - name: product_destination_id
        description: Identifiant du produit destination (déchargé) de la tâche. Polymorphe selon product_destination_type ; pas de FK dim garantie.

      # =====================
      # 2️⃣ Attributs
      # =====================

      - name: company_info
        description: Nom et code de l'entreprise (format "Nom - Code")

      - name: company_code
        description: Code métier de l'entreprise cliente

      - name: company_name
        description: Nom de l'entreprise cliente

      - name: device_info
        description: Nom et code du device (format "Nom - Code")

      - name: device_code
        description: Code métier du device

      - name: device_name
        description: Nom du device

      - name: roadman_code
        description: Code métier du roadman

      - name: gea_code
        description: Code GEA rattaché au roadman

      - name: product_source_type
        description: Type du produit source (qualifie product_source_id)

      - name: product_destination_type
        description: Type du produit destination (qualifie product_destination_id)

      - name: task_location_info
        description: Informations de localisation de la tâche (access_info de la LOCATION Oracle)

      - name: task_status_code
        description: >
          Statut métier de la tâche.
          Les statuts ENCOURS sont reclassés comme FAIT suite à validation métier.

      # =====================
      # 3️⃣ Dates / Temps
      # =====================

      - name: date_pointage
        description: Date et heure de pointage du roadman (si disponible)

      - name: date_pointage_jour
        description: Jour de pointage du roadman (date sans heure)

      - name: task_start_date
        description: Date et heure de début de la tâche

      - name: task_end_date
        description: Date et heure de fin de la tâche

      - name: last_task_end_of_day
        description: >
          Dernière heure de fin de tâche (statut FAIT) du roadman pour la journée

      - name: effective_work_start
        description: >
          Heure de début effective du travail pour la journée :
          date de pointage si disponible, sinon première tâche de la journée

      # =====================
      # 4️⃣ Mesures / KPI
      # =====================

      - name: is_planned
        description: Indicateur binaire — tâche planifiée (1) si statut PREVU / FAIT / ENCOURS / ANOMALIE, sinon 0
        tests:
          - accepted_values:
              arguments:
                values: [0, 1]
                quote: false
              config:
                severity: warn

      - name: is_done
        description: Indicateur binaire indiquant si la tâche est réalisée (1, statut FAIT/ENCOURS) ou non (0)

      - name: is_anomaly
        description: Indicateur binaire indiquant si la tâche est en anomalie (1, statut ANOMALIE) ou non (0)
        tests:
          - accepted_values:
              arguments:
                values: [0, 1]
                quote: false
              config:
                severity: warn

      - name: passage_rank_of_day
        description: Ordre du passage du roadman dans la journée (1 = premier passage)

      - name: daily_task_count
        description: Nombre total de passages réalisés par le roadman sur la journée

      - name: avg_passage_duration_day
        description: Durée moyenne d’un passage (en minutes) pour le roadman sur la journée

      - name: passage_duration_min
        description: Durée du passage en minutes (fin - début)

      - name: work_duration_min_raw
        description: >
          Durée brute du temps de travail journalier en minutes
          (différence entre la dernière fin de tâche et le début effectif)

      - name: work_duration_min
        description: >
          Durée nette du temps de travail journalier en minutes,
          après nettoyage des valeurs aberrantes (négatif ou > 12h)

      # =====================
      # 5️⃣ Métadonnées
      # =====================

      - name: created_at
        description: Date de création de la tâche dans le système source

      - name: updated_at
        description: Date de dernière mise à jour de la tâche dans le système source

      - name: dbt_updated_at
        description: Horodatage de la dernière exécution du modèle dbt

      - name: dbt_invocation_id
        description: Identifiant unique de l'exécution dbt

  - name: fct_neshu__maintenance_preventive
    description: |
      [QUOI MÉTIER] État de la maintenance préventive par machine NESHU : retard, échéance, statut intervention.
      [COMMENT CONSTRUITE] Croisement Oracle DLOG (dim_neshu__device filtré sur is_active + types 1/2 + liste de modèles éligibles + company_code au format CN[0-9]{4}, préfixé NESH_) et Yuman (stg_yuman__materials, clients, sites, workorders) sur le numéro de série. retard_delai = jours restants (+) ou de retard (−) vs échéance annuelle (365 jours). Règles métier : machine < 395j = période de grâce (pas de retard) ; sinon comparaison à la dernière préventive (source Yuman prioritaire sur DLOG, sinon date d'installation).
      [GRAIN] 1 ligne par device_id (état courant par machine).
      [NOTES] Naming fct_ retenu (état observé à date) mais comportement dim-like (unique sur device_id). status_inter ∈ {Ouvert, Planifie, Aucune}. source_last_preventive ∈ {yuman, dlog, aucune}.

    columns:
      - name: device_id
        description: Identifiant unique du device dans DLOG NESHU
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('dim_neshu__device')
                field: device_id

      - name: device_code
        description: Numéro de série du device de la source DLOG NESHU
        tests:
          - not_null

      - name: device_name
        description: Nom du device de la source DLOG NESHU
        tests:
          - not_null

      - name: company_code
        description: Code de l'entreprise/site client dans Oracle (format NESH_CNxxxx)
        tests:
          - not_null

      - name: company_name
        description: Nom de l'entreprise/site client dans Oracle
        tests:
          - not_null

      - name: device_last_installation_date
        description: Date de dernière installation du device (source Oracle)
        tests:
          - not_null

      - name: material_id
        description: Identifiant unique du matériel dans Yuman (peut être NULL si machine non référencée dans Yuman)
        tests:
          - relationships:
              arguments:
                to: ref('stg_yuman__materials')
                field: material_id
              config:
                where: "material_id is not null"

      - name: material_serial_number
        description:
          Numéro de série du matériel Yuman (correspond au device_code Oracle avec préfixe NESH_).
          Clé de liaison entre Oracle et Yuman. Peut être NULL si machine uniquement dans Oracle.

      - name: material_name
        description: Nom du type de machine ('MOMENTO 100', 'GEMINI 200', 'OPTIBEAN X 12' etc)

      - name: client_code
        description: Code client (source Yuman)

      - name: client_name
        description: Nom du client (source Yuman)

      - name: client_category
        description: Catégorie du client dans Yuman (OR / ARGENT / BRONZE)

      - name: site_postal_code
        description: Code postal du site d'installation (source Yuman)

      - name: retard_bol
        description: |
          Indicateur booléen de retard de maintenance préventive.
          - TRUE : machine en retard (nécessite une intervention)
          - FALSE : machine à jour ou dans la période de grâce
        tests:
          - not_null

      - name: retard_delai
        description: |
          Délai en jours par rapport à l'échéance de maintenance préventive.
          - Valeur positive : nombre de jours restants avant l'échéance
          - Valeur négative : nombre de jours de retard
          - Ex: +30 = 30 jours d'avance, -45 = 45 jours de retard
        tests:
          - not_null

      - name: source_last_preventive
        description: |
          Source de la dernière intervention préventive référencée.
          - 'yuman' : dernière préventive enregistrée dans Yuman
          - 'dlog' : dernière préventive enregistrée dans Oracle/DLOG
          - 'aucune' : aucune préventive trouvée ou machine récente (< 13 mois)
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['yuman', 'dlog', 'aucune']

      - name: status_inter
        description: |
          Statut de la demande d'intervention préventive en cours.
          - 'Ouvert' : demande ouverte mais non planifiée
          - 'Planifie' : intervention planifiée avec une date
          - 'Aucune' : aucune demande en cours
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Ouvert', 'Planifie', 'Aucune']

      - name: date_planned
        description: Date planifiée de l'intervention préventive (si status_inter = 'Planifie')

      - name: material_created_at
        description: Date de création de l'enregistrement matériel dans Yuman (utilisée pour la déduplication)


