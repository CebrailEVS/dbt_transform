  - name: fct_neshu__machine_appro_intervention
    description: |
      [QUOI MÉTIER]
      Vue cross-source Neshu × Yuman par machine en appro : pour chaque
      device Neshu ayant au moins un passage appro, expose son contexte appro
      (dernier FAIT, prochain PRÉVU, compteurs) et ses interventions curatives
      Yuman dans 3 buckets (clôturée ≤15j, en cours, planifiée — à venir ou en retard).

      [COMMENT CONSTRUITE]
      Joint `int_oracle_neshu__appro_machine_context` (intermediate
      factorisé, grain device) avec `dim_neshu__device` et
      `dim_neshu__company` (attributs display). Côté Yuman, filtre
      `int_yuman__demands_workorders_enriched` sur partenaire NESHU et
      catégorie CURATIVE*, puis dispatch en 3 buckets selon le statut
      (logique statut-d'abord, buckets mutuellement exclusifs) :
        - past    : workorder_status='Closed'      + demand Accepted + date_done dans [J-15 ; aujourd'hui]
        - current : workorder_status='In progress'  + demand Accepted (toute date)
        - future  : workorder_status='Scheduled'    + demand Accepted (toute date, planifié à venir OU en retard)
      Chaque workorder a un statut unique → au plus un bucket, pas de doublon
      (ex. une In progress avec date_done renseignée reste en 'current', pas en 'past').
      Cross-source join sur
      `UPPER(TRIM(device_code))` = `serial_clean` (normalisation Yuman :
      strip 'NESH_' prefix).

      [GRAIN]
      1 ligne par device_id Neshu (ayant ≥ 1 passage appro).

      [NOTES]
      Bucket "en cours" : inclut les interventions In progress en pause
      (is_workorder_paused). Une In progress en pause est toujours en cours
      (suspendue), exposée via current_is_workorder_paused + les motifs ;
      filtrer current_is_workorder_paused = false pour ne garder que les
      actives. Les workorders Closed conservent leurs champs de pause
      (pause historique, déjà reprise) mais ne sont pas "en cours".
      Les déplacements sans réparation (is_workorder_not_done) sont exclus.

      ⚠️ Jointure cross-source actuellement fragile (string match
      device_code ↔ serial). Une table de mapping device Yuman ↔ device
      Oracle Neshu pourrait remplacer ce match string si besoin futur.
      Diagnostic effectué (2026-05-24) : 94 % des devices avec workorders
      curative ont un match 1-1 propre (1175/1250). 6 % (75 devices) ont
      2 materials Yuman par device — pour ces cas, les attributs détaillés
      `past_/current_/future_*` ne reflètent qu'un seul material (choisi
      par row_number partition sur serial_clean order by date_done desc).
      Les compteurs (`nb_interventions_15j`) restent justes car comptent
      tous les workorders distincts du serial. ROI bridge faible — pas
      prioritaire tant que le DA ne signale pas de pain métier.

      Replace l'ancienne PR #77 (Rim) qui plaçait ce mart à tort dans
      `marts/technique/` avec un nom au pluriel et une logique appro
      enfouie en 7 CTEs (factorisée via l'intermediate).

      OBT controlled : seuls les IDs (device_id, company_id, material_id par
      bucket) + 1-3 attributs d'affichage par dim sont exposés. Les autres
      attributs dim (brand, technician_equipe, client_category) sont
      accessibles via jointure depuis le BI (dim_technique__material,
      dim_technique__technician).
    columns:
      - name: device_id
        description: Identifiant unique de la machine Neshu (PK + FK vers dim_neshu__device).
        tests:
          - unique
          - not_null
          - relationships:
              arguments:
                to: ref('dim_neshu__device')
                field: device_id
      - name: company_id
        description: FK vers dim_neshu__company (client de la machine).
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_neshu__company')
                field: company_id
      - name: device_code
        description: Code interne machine — utilisé pour la jointure cross-source vers Yuman.
      - name: company_code
        description: Code client (display) — issu de dim_neshu__company.

      # === Contexte appro ===
      - name: last_appro_date
        description: Date du dernier passage appro FAIT (NULL si aucun).
      - name: last_appro_roadman_code
        description: Code roadman du dernier passage FAIT.
      - name: last_appro_gea_code
        description: Code GEA du dernier passage FAIT.
      - name: days_since_last_appro
        description: Nombre de jours depuis le dernier passage FAIT.
      - name: next_appro_date
        description: Date du prochain passage appro PRÉVU (NULL si rien planifié).
      - name: next_appro_roadman_code
        description: Code roadman du prochain passage PRÉVU.
      - name: next_appro_gea_code
        description: Code GEA du prochain passage PRÉVU.
      - name: days_until_next_appro
        description: Nombre de jours jusqu'au prochain passage PRÉVU.
      - name: nb_appros_realises_total
        description: Compteur total des passages FAIT (toute période).
        tests:
          - not_null
      - name: nb_appros_planifies_a_venir
        description: Compteur des passages PRÉVU encore à venir.
        tests:
          - not_null
      - name: nb_appros_realises_30d
        description: Compteur des passages FAIT sur les 30 derniers jours.
        tests:
          - not_null
      - name: nb_appros_realises_90d
        description: Compteur des passages FAIT sur les 90 derniers jours.
        tests:
          - not_null

      # === Bucket : intervention curative clôturée (≤15j) ===
      - name: past_material_id
        description: FK Yuman vers dim_technique__material — material concerné par la dernière intervention 15j (NULL si pas d'intervention 15j).
        tests:
          - relationships:
              arguments:
                to: ref('dim_technique__material')
                field: material_id
      - name: past_technician_id
        description: FK Yuman vers dim_technique__technician (user_id) — technicien de la dernière intervention 15j (NULL si pas d'intervention 15j).
        tests:
          - relationships:
              arguments:
                to: ref('dim_technique__technician')
                field: user_id
              config:
                severity: warn
      - name: past_intervention_id
        description: ID Yuman du workorder de la dernière intervention 15j.
      - name: past_intervention_number
        description: Numéro unique du bon de travail Yuman de la dernière intervention 15j.
      - name: past_date_started
        description: Date de démarrage (date_started Yuman) de la dernière intervention clôturée 15j.
      - name: past_date_planned
        description: Date planifiée (date_planned Yuman) de la dernière intervention clôturée 15j.
      - name: past_date_done
        description: Date de clôture (date_done Yuman) de la dernière intervention curative clôturée dans les 15 derniers jours. C'est la date qui définit l'appartenance au bucket.
      - name: past_demand_description
        description: Description de la demande Yuman (texte libre).
      - name: past_demand_created_at
        description: Date de création de la demande Yuman.
      - name: past_demand_category_name
        description: Catégorie de demande Yuman (filtrée sur CURATIVE*).
      - name: past_intervention_title
        description: Titre du workorder.
      - name: past_intervention_report
        description: Rapport d'intervention saisi par le technicien.
      - name: nb_interventions_15j
        description: Nombre total d'interventions curatives sur les 15 derniers jours pour cette machine.
        tests:
          - not_null

      # === Bucket : intervention en cours ===
      - name: current_material_id
        description: FK Yuman vers dim_technique__material — material de l'intervention en cours.
        tests:
          - relationships:
              arguments:
                to: ref('dim_technique__material')
                field: material_id
      - name: current_technician_id
        description: FK Yuman vers dim_technique__technician (user_id) — technicien de l'intervention en cours.
        tests:
          - relationships:
              arguments:
                to: ref('dim_technique__technician')
                field: user_id
              config:
                severity: warn
      - name: current_intervention_id
        description: ID Yuman du workorder en cours.
      - name: current_intervention_number
        description: Numéro unique du bon de travail Yuman de l'intervention en cours.
      - name: current_demand_description
        description: Description de la demande Yuman en cours.
      - name: current_demand_created_at
        description: Date de création de la demande Yuman en cours.
      - name: current_demand_category_name
        description: Catégorie de demande Yuman en cours.
      - name: current_intervention_title
        description: Titre du workorder en cours.
      - name: current_intervention_report
        description: Rapport (peut être vide si pas encore renseigné).
      - name: current_date_started
        description: Date de démarrage de l'intervention en cours (date_started Yuman). Renseignée dès que le technicien démarre l'intervention, contrairement à current_date_done qui reste NULL tant que l'intervention n'est pas terminée.
      - name: current_date_planned
        description: Date planifiée (date_planned Yuman) de l'intervention en cours.
      - name: current_date_done
        description: Date de clôture (date_done Yuman). Normalement NULL pour une In progress, mais peut être renseignée si le technicien a saisi une date de fin sans changer le statut — l'intervention reste classée 'current' tant que workorder_status = 'In progress'.
      - name: current_is_workorder_paused
        description: >
          TRUE si l'intervention en cours est actuellement en pause (au moins un
          des champs raison/explication de mise en pause renseigné). Une In progress
          en pause reste dans le bucket current ; filtrer dessus pour repérer
          rapidement les interventions suspendues.
        tests:
          - not_null
      - name: current_workorder_raison_mise_en_pause
        description: Raison de la mise en pause de l'intervention en cours (NULL si non en pause).
      - name: current_workorder_explication_mise_en_pause
        description: Explication libre de la mise en pause de l'intervention en cours (NULL si non renseignée ou non en pause).

      # === Bucket : intervention planifiée (à venir ou en retard) ===
      - name: future_material_id
        description: FK Yuman vers dim_technique__material — material de l'intervention planifiée.
        tests:
          - relationships:
              arguments:
                to: ref('dim_technique__material')
                field: material_id
      - name: future_technician_id
        description: FK Yuman vers dim_technique__technician (user_id) — technicien de l'intervention planifiée.
        tests:
          - relationships:
              arguments:
                to: ref('dim_technique__technician')
                field: user_id
              config:
                severity: warn
      - name: future_intervention_id
        description: ID Yuman du workorder planifié.
      - name: future_intervention_number
        description: Numéro unique du bon de travail Yuman de l'intervention planifiée.
      - name: future_date_started
        description: Date de démarrage (date_started Yuman) de l'intervention planifiée — normalement NULL tant qu'elle n'a pas démarré.
      - name: future_date_planned
        description: Date planifiée (date_planned Yuman) du workorder. Peut être dans le passé (intervention Scheduled en retard, jamais démarrée) — le bucket future n'exige plus une date strictement future.
      - name: future_date_done
        description: Date de clôture (date_done Yuman) de l'intervention planifiée — normalement NULL pour un Scheduled.
      - name: future_demand_description
        description: Description de la demande Yuman planifiée.
      - name: future_demand_created_at
        description: Date de création de la demande Yuman planifiée.
      - name: future_demand_category_name
        description: Catégorie de demande Yuman planifiée.
      - name: future_intervention_title
        description: Titre du workorder planifié.
      - name: future_intervention_report
        description: Rapport (normalement vide pour un planifié).
