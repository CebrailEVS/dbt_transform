# models/marts/oracle_neshu/_oracle_neshu__marts_models.yml
version: 2

models:
  # COMPANY
  - name: dim_neshu__company
    description: >
      Dimension client/company enrichie à partir des labels associés (région, secteur, statut, etc.)
      et des informations de localisation.
    columns:
      - name: company_id
        description: "Identifiant unique de la société"
        tests:
          - not_null
          - unique

      - name: company_type_id
        description: "ID Type de société (ex : client, fournisseur...)"

      - name: company_code
        description: "Code client"

      - name: company_name
        description: "Nom de la société"

      - name: region
        description: "Région géographique de la société (label REGION)"

      - name: sector
        description: "Secteur d’activité (HORECA/OFFICE) (label SECTEUR_ACTVITE)"

      - name: sector_code
        description: "Code sectoriel associé, lien avec ceux de nespresso (label CODE_SECTEUR)"

      - name: activity_sector
        description: "Secteur d'activité détaillé (label SECTEUR_DACTIVITE)"

      - name: employee_range
        description: "Tranche de collaborateurs (label TRANCHE_COLLAB)"

      - name: company_type
        description: "Type d’entreprise (label TYPECOMPAGNIE)"

      - name: company_economic_model
        description: "Modèle économique client (label MODELEECOCLIENT)"

      - name: client_status
        description: "Statut client (OR/ARGENT/BRONZE) (label STATUT_CLIENT)"

      - name: is_active
        description: >
          Indique si la société est active (label ISACTIVE). 
          TRUE si 'yes', sinon FALSE.

      - name: key_account
        description: "KA grand compte (label KA)"

      - name: katiers
        description: "Label KATIERS lié au KA"

      - name: remote_work
        description: "Indicateur du nombre de télétravail par semaine (label TELETRAVAIL)"

      - name: proadman
        description: "Nombre de passage roadman (label PROADMAN)"

      - name: gsm
        description: "Gobelet Sucre Melangeur FORMULE (label GSM_TERRAIN)"

      - name: badge
        description: "Indicateur de badge client (label BADGE)"

      - name: recycling
        description: "Indicateur de recyclage (label RECYCLAGE)"

      - name: address1
        description: "Adresse principale (ligne 1)"

      - name: address2
        description: "Adresse complémentaire (ligne 2)"

      - name: city
        description: "Ville de la société"

      - name: postal_code
        description: "Code postal de la société"

      - name: country
        description: "Pays de la société"

      - name: created_at
        description: "Date de création dans la base source"

      - name: updated_at
        description: "Date de dernière mise à jour dans la base source"

  # PRODUCT
  - name: dim_neshu__product
    description: >
      Dimension produit enrichie à partir des labels associés (type, famille, groupe, marque, etc.)
      et filtrée sur les produits de type 1 (produit) et 5 (ligne de prix).
    columns:
      - name: product_id
        description: "Identifiant unique du produit"
        tests:
          - not_null
          - unique

      - name: product_type_id
        description: "Type de produit (1 = produit, 5 = ligne de prix)"

      - name: product_code
        description: "Code produit (référence interne)"

      - name: product_name
        description: "Nom du produit"

      - name: purchase_unit_price
        description: "Prix d'achat unitaire du produit"

      - name: product_brand
        description: "Marque du produit, extraite du label MARQUEP"

      - name: product_owner
        description: "Propriétaire du produit, via label PROPRIETAIRE"

      - name: product_family
        description: "Famille produit (ex : CAFE CAPSULES, THE), via label FAMILLE"

      - name: product_bio
        description: "Indication BIO ou non (via label BIO)"

      - name: product_group
        description: "Groupe produit (ACCESSOIRES, SNACKING...), via label GROUPE"

      - name: product_type
        description: >
          Typologie produit standardisée selon règles métier :
          ex. 'CAFE CAPS', 'THE', 'CHOCOLATS VAN HOUTEN', 'BOISSONS GOURMANDES'.
  
      - name: is_active
        description: >
          État d'activité du produit, converti en booléen :
          TRUE si le label ISACTIVE = 'YES', sinon FALSE.

      - name: created_at
        description: "Date de création du produit dans la source"

      - name: updated_at
        description: "Date de dernière mise à jour du produit dans la source"

    # DEVICE
  - name: dim_neshu__device
    description: >
      Dimension device enrichie à partir des labels associés (état, statut, gamme, catégorie, marque, etc.),
      filtrée sur les machines (type 1).
    columns:
      - name: device_id
        description: "Identifiant unique de la machine"
        tests:
          - not_null
          - unique

      - name: device_type_id
        description: "Type de machine (1 = machine, autres ignorés ici)"

      - name: device_iddevice
        description: "ID de la machine correspondant : vaut nulle si pas d'équipement parent, sinon l'ID de la machine parente"

      - name: company_id
        description: "Identifiant du client (company) auquel est rattachée la machine"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_neshu__company')
                field: company_id

      - name: location_id
        description: "Identifiant de localisation"

      - name: device_code
        description: "Code interne de la machine"

      - name: device_name
        description: "Nom de la machine"

      - name: company_code
        description: "Code client associé à la machine"

      - name: device_brand
        description: "Marque de la machine (label MARQUE)"

      - name: device_gamme
        description: "Gamme de la machine (label GAMME)"

      - name: device_category
        description: "Catégorie de la machine (label CATEGORIE)"

      - name: device_economic_model
        description: "Modèle économique de la machine (label MODECOMA)"

      - name: is_active
        description: >
          Indique si la machine est considérée comme active selon le label ISACTIVE.
          TRUE si 'yes', sinon FALSE (converti en booléen).

      - name: device_location
        description: "Informations d'accès au site de la machine (depuis la table location)"

      - name: last_installation_date
        description: "Date de dernière installation de la machine"

      - name: created_at
        description: "Date de création de la machine dans la base source"

      - name: updated_at
        description: "Date de dernière mise à jour de la machine dans la base source"

# FACT BUSINESS REVIEW
  - name: fct_neshu__consommation
    description: >
      Table de faits des consommations clients pour la Business Review Neshu.
      Consolidation des données télémétrie, chargement et livraison avec application
      des règles métier spécifiques (gratuité vs payant, types de produits, etc.).
      Utilisée pour les analyses de consommation, comparatifs annuels et reporting client.
    
    columns:
      # === IDENTIFIANTS ===
      - name: company_id
        description: "Identifiant unique de la société cliente"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_neshu__company')
                field: company_id

      - name: device_id
        description: "Identifiant de la machine (NULL pour les livraisons directes)"
        tests:
          - relationships:
              arguments:
                to: ref('dim_neshu__device')
                field: device_id

      - name: location_id
        description: "Identifiant de localisation (NULL pour les livraisons)"

      - name: product_id
        description: "Identifiant unique du produit"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_neshu__product')
                field: product_id

      # === COMPANY ===
      - name: company_code
        description: "Code client (ex: CN1234)"
        tests:
          - not_null

      - name: company_name
        description: "Nom de la société cliente"
        tests:
          - not_null

      # === LOCALISATION ===
      - name: location
        description: "Localisation de la consommation (Localisation task par défault, si vide => prendre localisation device) ou 'LIVRAISON' pour les livraisons directes"

      # === MACHINE ===
      - name: device_serial_number
        description: "Numéro de série de la machine ou 'LIVRAISON'"

      - name: device_name
        description: "Nom de la machine ou 'LIVRAISON'"

      - name: device_brand
        description: "Marque de la machine (NESPRESSO, NESTLE, ANIMO) ou 'LIVRAISON'"

      - name: device_economic_model
        description: "Modèle économique (Participatif valeurs, Participatif unités, Payant) ou 'LIVRAISON'"

      # === PRODUIT ===
      - name: product_name
        description: "Nom complet du produit"
        tests:
          - not_null

      - name: product_brand
        description: "Marque du produit"

      - name: product_family
        description: "Famille de produits"

      - name: product_group
        description: "Groupe de produits"

      - name: product_type
        description: "Type de produit (adapté aux règles métier)"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: 
                  - 'THE'
                  - 'CAFE CAPS'
                  - 'CHOCOLATS VAN HOUTEN'
                  - 'BOISSONS GOURMANDES'
                  - 'ACCESSOIRES'
                  - 'CAFENOIR'
                  - 'INDEFINI'
                  - 'SNACKING'
                  - 'BOISSONS FRAICHES'

      # === CONTEXTE ===
      - name: consumption_date
        description: "Date de consommation (format DATE)"
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: "'2020-01-01'"
                max_value: "current_date()"

      - name: data_source
        description: "Source des données de consommation"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['TELEMETRIE', 'CHARGEMENT', 'LIVRAISON']

      # === MESURES ===
      - name: quantity
        description: >
          Quantité consommée (ajustée selon les règles produit).
          Multiplicateurs appliqués pour les rames, boîtes, etc.
        tests:
          - not_null

      # === METADONNEES ===
      - name: dbt_updated_at
        description: "Timestamp de dernière mise à jour par dbt"
        tests:
          - not_null

      - name: dbt_invocation_id
        description: "ID unique de l'exécution dbt"
        tests:
          - not_null

    # === TESTS AU NIVEAU TABLE ===
    tests:
      # Test d'unicité sur la combinaison clé
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - company_id
              - device_id
              - product_id
              - location_id
              - location
              - consumption_date
              - data_source
          name: unique_consumption_record

      # Test de cohérence : pas de device_id NULL sauf pour LIVRAISON
      - dbt_utils.expression_is_true:
          arguments:
            expression: "(device_id IS NOT NULL) OR (data_source = 'LIVRAISON')"
          name: device_id_required_except_livraison

      # === CONTRACT ===
  - name: dim_neshu__contract
    description: |
      Dimension contrat : pivot des labels et sélection du contrat actif principal par client.
      Cette table contient un seul contrat actif par client (company_id), sélectionné selon
      la date de fin de contrat la plus récente, puis la date de début la plus récente.
    
    config:
      materialized: table
      cluster_by:
        - contract_id
    
    columns:
      - name: contract_id
        description: Identifiant unique du contrat
        data_type: number
        tests:
          - unique
          - not_null
      
      - name: company_id
        description: Identifiant de l'entreprise cliente associée au contrat
        data_type: number
      
      - name: contract_code
        description: Code du contrat
        data_type: varchar
      
      - name: engagement_raw
        description: Engagement brut du contrat (valeur non nettoyée)
        data_type: varchar
      
      - name: engagement_clean
        description: Engagement nettoyé du contrat
        data_type: number
      
      - name: nombre_collab
        description: Nombre de collaborateurs associés au contrat
        data_type: number
      
      - name: is_active
        description: Indique si le contrat est actif (transformé depuis le label ISACTIVE)
        data_type: boolean
        tests:
          - not_null
      
      - name: original_start_date
        description: Date de début originale du contrat
        data_type: timestamp
      
      - name: original_end_date
        description: Date de fin originale du contrat
        data_type: timestamp
      
      - name: current_end_date
        description: Date de fin courante du contrat
        data_type: timestamp
      
      - name: termination_date
        description: Date de résiliation du contrat
        data_type: timestamp
      
      - name: created_at
        description: Date de création de l'enregistrement
        data_type: timestamp
        tests:
          - not_null
      
      - name: updated_at
        description: Date de dernière mise à jour de l'enregistrement
        data_type: timestamp
        tests:
          - not_null
    
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - company_id
          config:
            severity: warn
            error_if: ">1"


  # marts/oracle_neshu/_oracle_neshu__marts_models.yml
  - name: dim_neshu__vehicule_roadman
    description: >
      Dimension regroupant les véhicules et roadmen issus de la table
      `stg_oracle_neshu__resources`, enrichie avec le code GEA provenant
      de la référence `ref_oracle_neshu__roadman_gea`.

    columns:
      - name: resources_vehicule_id
        description: "Identifiant du véhicule (resource id) provenant d’Oracle."
        tests:
          - not_null
          - unique

      - name: vehicule_code
        description: "Code du véhicule issu du champ resources.code."
        tests:
          - not_null
          - unique

      - name: resources_roadman_id
        description: "Id du roadman associé au vehicule."

      - name: roadman_code
        description: "Code du roadman correspondant."
        tests:
          - unique

      - name: created_at
        description: "Date de création de la ressource dans Oracle."
        tests:
          - not_null

      - name: updated_at
        description: "Date de dernière mise à jour de la ressource dans Oracle."

      - name: gea_code
        description: "Code GEA rattaché au roadman, issu du modèle ref_oracle_neshu__roadman_gea."

  - name: fct_neshu__chargement_consommation
    description: >
      Table de faits des chargements et consommations télémetrie par passage APPRO.
      Pour chaque passage, mesure les quantités consommées entre le passage précédent
      et le passage actuel, et les quantités chargées lors de ce passage.
      Grain : (device, passage_appro, product).

    config:
      materialized: table

    columns:
      - name: device_id
        description: "Identifiant du device ayant effectué le passage."
        tests:
          - not_null

      - name: date_debut_passage_appro
        description: "Date du passage APPRO (troncature à la journée)."
        tests:
          - not_null

      - name: task_start_date_min
        description: "Horodatage exact du passage APPRO."

      - name: date_passage_precedent
        description: "Date du passage APPRO précédent pour ce device."

      - name: roadman_code
        description: "Code du roadman ayant réalisé le passage."

      - name: product_type
        description: "Type de produit associé aux quantités consommées ou chargées."
        tests:
          - not_null
      
      - name: product_code
        description: "Code produit associé aux quantités consommées ou chargées."
        tests:
          - not_null      

      - name: q_consommee
        description: "Quantité consommée entre le passage précédent et le passage actuel."

      - name: q_chargee
        description: "Quantité chargée lors du passage APPRO."


  - name: fct_neshu__chargement_quinzaine
    description: >
      Table de faits calculant les quantités chargées par type de produit,
      société, année et quinzaine (périodes de 14 jours démarrant un lundi).

    columns:
      - name: product_type
        description: Type de produit issu de la dimension produit
        tests:
          - not_null

      - name: company_code
        description: Code de la société
        tests:
          - not_null

      - name: annee_chgt
        description: Année de la date de démarrage de la tâche
        tests:
          - not_null

      - name: quinzaine_chgt
        description: Numéro de quinzaine calculé à partir du lundi de référence
        tests:
          - not_null

      - name: quantite_chargee
        description: Quantité totale chargée sur la période


  - name: dim_neshu__resource
    description: |
      Dimension des ressources Oracle Neshu regroupant les **roadmen** (PERSON) et les **véhicules** (VEHICULE).

      Enrichie avec :
      - Les labels Oracle (ISACTIVE, Fonction) pivotés depuis `label_has_resources`
      - Le code GEA du roadman depuis `ref_oracle_neshu__roadman_gea` (jointure sur `resources_code`, PERSON uniquement)

      **Hiérarchie véhicule/roadman :**
      `resources_idresources` pointe vers l'ID du roadman associé au véhicule.
      Pour un roadman (PERSON), ce champ est NULL.

      **Note :** `code_status_record` est conservé comme colonne pour permettre un filtrage
      à la volée côté BI (1 = actif). Le filtre n'est pas appliqué dans le modèle.
    columns:
      - name: resources_id
        description: "Identifiant unique de la ressource dans Oracle"
        tests:
          - not_null
          - unique

      - name: resources_type_id
        description: "Identifiant du type de ressource (clé vers resources_type)"

      - name: resources_idresources
        description: >
          Lien vers la ressource associée. Pour un véhicule (VEHICULE) : pointe vers l'ID du roadman (PERSON) associé.
          Pour un roadman (PERSON) : NULL.

      - name: company_id
        description: "Identifiant de l'entreprise à laquelle est rattachée la ressource"

      - name: company_storehouse_id
        description: "Identifiant de l'entreprise entrepôt associée à la ressource"

      - name: location_id
        description: "Identifiant de la localisation de la ressource"

      - name: resources_code
        description: "Code métier de la ressource (ex : code roadman ou immatriculation véhicule)"
        tests:
          - not_null

      - name: resources_name
        description: "Nom de la ressource"

      - name: resources_type
        description: "Type de ressource : PERSON (roadman) ou VEHICULE"
        tests:
          - not_null

      - name: gea_code
        description: >
          Code GEA du roadman, issu de `ref_oracle_neshu__roadman_gea`.
          Jointé sur `resources_code` pour les PERSON uniquement. NULL pour les véhicules.

      - name: is_active
        description: >
          Indique si la ressource est active (label ISACTIVE).
          Converti en booléen : TRUE si 'yes', FALSE sinon.
        tests:
          - not_null

      - name: fonction
        description: "Fonction du roadman (label Fonction, ex : ROADMAN, RESPONSABLE). NULL pour les véhicules."

      - name: cost
        description: "Coût associé à la ressource"

      - name: arrival
        description: "Date d'arrivée de la ressource dans l'entreprise"

      - name: departure
        description: "Date de départ de la ressource (NULL si toujours en poste/en service)"

      - name: code_status_record
        description: >
          Code de statut de l'enregistrement Oracle (1 = actif, autre = inactif).
          Non filtré dans ce modèle — utilisable côté BI pour exclure les inactifs.

      - name: created_at
        description: "Date de création de la ressource dans Oracle"

      - name: updated_at
        description: "Date de dernière mise à jour de la ressource dans Oracle"

  - name: fct_neshu__appro
    description: >
      Table de faits représentant les passages des roadmen,
      enrichie avec des métriques journalières de temps de travail
      et de performance (durée de passage, temps de travail quotidien, rang du passage).
      Les statuts ENCOURS ont été reclassés comme FAIT suite à validation métier.

    columns:

      # =====================
      # 1️⃣ IDs
      # =====================

      - name: task_id
        description: Identifiant unique de la tâche de passage
        tests:
          - not_null
          - unique

      - name: device_id
        description: Identifiant du device associé à la tâche

      - name: company_id
        description: Identifiant de l'entreprise cliente

      - name: resources_roadman_id
        description: Identifiant du roadman ayant effectué le passage
        tests:
          - not_null

      # =====================
      # 2️⃣ Attributs
      # =====================

      - name: company_info
        description: Nom et code de l'entreprise (format "Nom - Code")

      - name: device_info
        description: Nom et code du device (format "Nom - Code")

      - name: roadman_code
        description: Code métier du roadman

      - name: gea_code
        description: Code GEA rattaché au roadman

      - name: task_status_code
        description: >
          Statut métier de la tâche.
          Les statuts ENCOURS sont reclassés comme FAIT suite à validation métier.

      # =====================
      # 3️⃣ Dates / Temps
      # =====================

      - name: date_pointage
        description: Date et heure de pointage du roadman (si disponible)

      - name: date_pointage_jour
        description: Jour de pointage du roadman (date sans heure)

      - name: task_start_date
        description: Date et heure de début de la tâche

      - name: task_end_date
        description: Date et heure de fin de la tâche

      - name: last_task_end_of_day
        description: >
          Dernière heure de fin de tâche (statut FAIT) du roadman pour la journée

      - name: effective_work_start
        description: >
          Heure de début effective du travail pour la journée :
          date de pointage si disponible, sinon première tâche de la journée

      # =====================
      # 4️⃣ Mesures / KPI
      # =====================

      - name: is_planned
        description: Indicateur binaire indiquant si la tâche est planifiée (1) ou non (0)

      - name: is_done
        description: Indicateur binaire indiquant si la tâche est réalisée (1) ou non (0)

      - name: passage_rank_of_day
        description: Ordre du passage du roadman dans la journée (1 = premier passage)

      - name: daily_task_count
        description: Nombre total de passages réalisés par le roadman sur la journée

      - name: avg_passage_duration_day
        description: Durée moyenne d’un passage (en minutes) pour le roadman sur la journée

      - name: passage_duration_min
        description: Durée du passage en minutes (fin - début)

      - name: work_duration_min_raw
        description: >
          Durée brute du temps de travail journalier en minutes
          (différence entre la dernière fin de tâche et le début effectif)

      - name: work_duration_min
        description: >
          Durée nette du temps de travail journalier en minutes,
          après nettoyage des valeurs aberrantes (négatif ou > 12h)

      # =====================
      # 5️⃣ Métadonnées
      # =====================

      - name: created_at
        description: Date de création de la tâche dans le système source

      - name: updated_at
        description: Date de dernière mise à jour de la tâche dans le système source

      - name: dbt_updated_at
        description: Horodatage de la dernière exécution du modèle dbt

      - name: dbt_invocation_id
        description: Identifiant unique de l'exécution dbt

  - name: fct_neshu__maintenance_preventive
    description: |
      Table de faits pour le suivi des maintenances préventives des machines NESHU.

      Cette table croise les données Oracle (DLOG) et Yuman pour :
      - Identifier les machines en retard de maintenance préventive
      - Calculer le délai de retard ou d'avance par rapport à l'échéance annuelle
      - Suivre le statut des demandes d'intervention ouvertes ou planifiées

      **Règles métier de calcul du retard :**
      - Machine < 13 mois (395 jours) : pas de retard (période de grâce)
      - Machine sans préventive : en retard si > 365 jours après installation
      - Machine avec préventives : en retard si dernière préventive > 365 jours

      **Sources de données :**
      - Oracle NESHU (DLOG) : machines et interventions techniques (preventive dlog)
      - Yuman : matériels, clients, sites et workorders

    columns:
      - name: device_id
        description: Identifiant unique du device dans DLOG NESHU
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('dim_neshu__device')
                field: device_id

      - name: device_code
        description: Numéro de série du device de la source DLOG NESHU
        tests:
          - not_null

      - name: device_name
        description: Nom du device de la source DLOG NESHU
        tests:
          - not_null

      - name: company_code
        description: Code de l'entreprise/site client dans Oracle (format NESH_CNxxxx)
        tests:
          - not_null

      - name: company_name
        description: Nom de l'entreprise/site client dans Oracle
        tests:
          - not_null

      - name: device_last_installation_date
        description: Date de dernière installation du device (source Oracle)
        tests:
          - not_null

      - name: material_id
        description: Identifiant unique du matériel dans Yuman (peut être NULL si machine non référencée dans Yuman)
        tests:
          - relationships:
              arguments:
                to: ref('stg_yuman__materials')
                field: material_id
              config:
                where: "material_id is not null"

      - name: material_serial_number
        description:
          Numéro de série du matériel Yuman (correspond au device_code Oracle avec préfixe NESH_).
          Clé de liaison entre Oracle et Yuman. Peut être NULL si machine uniquement dans Oracle.

      - name: material_name
        description: Nom du type de machine ('MOMENTO 100', 'GEMINI 200', 'OPTIBEAN X 12' etc)

      - name: client_code
        description: Code client (source Yuman)

      - name: client_name
        description: Nom du client (source Yuman)

      - name: client_category
        description: Catégorie du client dans Yuman (OR / ARGENT / BRONZE)

      - name: site_postal_code
        description: Code postal du site d'installation (source Yuman)

      - name: retard_bol
        description: |
          Indicateur booléen de retard de maintenance préventive.
          - TRUE : machine en retard (nécessite une intervention)
          - FALSE : machine à jour ou dans la période de grâce
        tests:
          - not_null

      - name: retard_delai
        description: |
          Délai en jours par rapport à l'échéance de maintenance préventive.
          - Valeur positive : nombre de jours restants avant l'échéance
          - Valeur négative : nombre de jours de retard
          - Ex: +30 = 30 jours d'avance, -45 = 45 jours de retard
        tests:
          - not_null

      - name: source_last_preventive
        description: |
          Source de la dernière intervention préventive référencée.
          - 'yuman' : dernière préventive enregistrée dans Yuman
          - 'dlog' : dernière préventive enregistrée dans Oracle/DLOG
          - 'aucune' : aucune préventive trouvée ou machine récente (< 13 mois)
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['yuman', 'dlog', 'aucune']

      - name: status_inter
        description: |
          Statut de la demande d'intervention préventive en cours.
          - 'Ouvert' : demande ouverte mais non planifiée
          - 'Planifie' : intervention planifiée avec une date
          - 'Aucune' : aucune demande en cours
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Ouvert', 'Planifie', 'Aucune']

      - name: date_planned
        description: Date planifiée de l'intervention préventive (si status_inter = 'Planifie')

      - name: material_created_at
        description: Date de création de l'enregistrement matériel dans Yuman (utilisée pour la déduplication)


  - name: fct_neshu__workorder_delai
    description: >
      Table de fait marts de tarification automatique des interventions (workorders).
      Ce modèle enrichit les données unifiées des interventions et des demandes issues de 
      `int_yuman__demands_workorders_enriched` avec les référentiels de types d'intervention,
      machines, tarifications et zones géographiques. 
      Il calcule les prix automatiques des interventions selon les règles de récurrence, 
      de partenaire et de localisation (métropole).

    columns:
      # --- IDENTIFIANTS ---
      - name: demand_id
        description: Identifiant unique de la demande d'intervention.
        tests:
          - unique
      - name: workorder_id
        description: Identifiant unique du bon de travail.
        tests:
          - unique
      - name: material_id
        description: Identifiant du matériel concerné.
        tests:
          - relationships:
              arguments:
                to: ref('dim_yuman__materials')
                field: material_id
      - name: site_id
        description: Identifiant du site client.
        tests:
          - relationships:
              arguments:
                to: ref('dim_yuman__sites')
                field: site_id
      - name: client_id
        description: Identifiant du client.
        tests:
          - relationships:
              arguments:
                to: ref('dim_yuman__clients')
                field: client_id
      - name: technician_id
        description: Identifiant du technicien associé.
      - name: manager_id
        description: Identifiant du manager ou responsable associé.

      # --- DEMANDE D'INTERVENTION ---
      - name: demand_description
        description: Description textuelle de la demande d’intervention.
      - name: demand_status
        description: Statut de la demande d’intervention.
      - name: demand_created_at
        description: Date de création de la demande.
      - name: demand_updated_at
        description: Date de dernière mise à jour de la demande.
      - name: demand_category_name
        description: Catégorie de la demande d’intervention.

      # --- BON DE TRAVAIL ---
      - name: workorder_number
        description: Numéro unique du bon de travail.
      - name: workorder_category
        description: Catégorie ou type brut du bon de travail.
      - name: workorder_status
        description: Statut actuel du bon de travail.
      - name: workorder_technician_name
        description: Nom du technicien affecté au bon de travail.
      - name: workorder_date_creation
        description: Date de création du bon de travail.
      - name: workorder_motif_non_intervention
        description: Motif de non-intervention, si applicable.
      - name: workorder_detail_non_intervention
        description: Détail du motif de non-intervention, si applicable.
      - name: date_planned
        description: Date planifiée de l’intervention.
      - name: date_started
        description: Date de début de l’intervention.
      - name: date_done
        description: Date de clôture de l’intervention.

      # --- CLIENT & SITE ---
      - name: partner_name
        description: Nom du partenaire ou marque associée au client.
      - name: client_code
        description: Code unique du client.
      - name: client_name
        description: Nom du client.
      - name: client_category
        description: Catégorie commerciale ou segment du client.
      - name: client_is_active
        description: Indique si le client est actif.
      - name: site_code
        description: Code unique du site.
      - name: site_name
        description: Nom du site client.
      - name: site_address
        description: Adresse complète du site client.
      - name: site_postal_code
        description: Code postal fourni dans le système Yuman.
      - name: postal_code_site
        description: Code postal normalisé du site (corrigé ou extrait de la description si manquant).

      # --- MATERIEL ---
      - name: material_serial_number
        description: Numéro de série du matériel concerné.
      - name: workorder_type_raw
        description: Type brut de l’intervention avant normalisation.
      - name: machine_raw
        description: Catégorie brute du matériel avant nettoyage.
      - name: workorder_type_clean
        description: Type d’intervention normalisé (préventif, curatif, installation…).
      - name: machine_clean
        description: Catégorie de machine normalisée.

      # --- LOCALISATION ---
      - name: metropolitan
        description: Indicateur binaire (1 = métropole, 0 = hors métropole).
      - name: metropole_city
        description: Ville de la métropole associée à l'intervention.
      - name: recurrence_count
        description: Nombre d’interventions réalisées pour un même client le même jour (récurrence).

      # --- TARIFICATION ---
      - name: pricing_type
        description: Type de tarification appliquée (Tarif normal, Remise niv1, Remise niv2).
      - name: pricing_key_used
        description: Clé de tarification générée pour le matching avec la table de référence.
      - name: amount
        description: Montant appliqué selon la tarification automatique.
      - name: prod_number
        description: Code produit ou référence tarifaire associée.
      - name: to_invoice
        description: Indique si le bon d’intervention doit être facturé (true = à facturer).
      - name: billing_validation_status
        description: Statut de validation de la facturation (VALIDATED, MISSING_TARIF, NOT_BILLABLE).

      # --- INDICATEURS DE DELAIS ---
      - name: type_delai
        description: Type de delai selon les règles NESHU (Resp Technique)
      - name: delai_jours_ouvres
        description: Nombre de jours ouvrés entre la date de creation de reference et la date de fin
      - name: date_creation_ref
        description: Date de creation de reference, selon les regles NESHU


