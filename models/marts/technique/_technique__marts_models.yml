version: 2

models:
  - name: fct_technique__intervention
    description: |
      [QUOI MÉTIER]
      Fait consolidé des interventions techniques EVS, tous partenaires
      confondus. 1 ligne = 1 intervention réalisée. Couvre Nespresso (via Nomad
      Repair, source `nesp_tech`) et les partenaires Yuman (NESHU, BRITA, AUUM,
      TWYD, NU, EXPRESSO, FONTAINCO, DAAN). Base des indicateurs opérationnels,
      de la facturation partenaire et du calcul des primes techniciens (bonus
      délai, prime montagne, Paris intramuros).

      [COMMENT CONSTRUITE]
      UNION ALL de 2 chaînes homogénéisées au même format, séparées par la
      colonne `src_inter` (NESP / YUMAN) :
      - branche NESP : `int_nesp_tech__interventions_dedup` (1 ligne par
        n_planning) + LEFT JOIN `int_nesp_tech__facturation_interventions`
        (key_factu, montant, prod) + LEFT JOIN `int_nesp_tech__delais_interventions`
        (SLA jours/heures, bonus) + LEFT JOIN seed `ref_nesp_tech__key_facturation`
        (libellés objets). Filtre de population : `etat_intervention != 'annulée'`.
      - branche YUMAN : `int_yuman__interventions` — modèle intermediate unique
        portant tarification + délai + état métier (depuis la refacto PR #135 ;
        remplace l'ancienne chaîne fait→fait `fct_technique__workorder_pricing` +
        `fct_neshu__workorder_delai`). Filtre de population :
        `intervention_state = 'REALISEE'` (workorder Closed et réellement effectué).
      Enrichissement commun (CTE `interventions_enrichies`) : durée, flags primes
      (montagne / Paris / hors-délai), mapping technicien via `stg_yuman__users`
      (jointure conditionnelle : `nomad_id` côté NESP, `user_id` côté YUMAN) et
      seed `ref_nesp_tech__cps_montagne_primes`.

      [GRAIN]
      1 ligne par intervention. PK = `key_inter` = `intervention_id` + '_' + `partenaire`.

      [NOTES]
      - Filtres répartis sur 3 niveaux (intermediate → CTE du fait → jointures
        LEFT). Côté NESP, `montant` / `key_factu` / `prod` sont NULL hors états
        terminée signée / signature différée / mise en échec ; `delai_*` et
        `bonus_*` ne sont calculés que pour les agences IDF/Paris (filtre interne
        à `int_nesp_tech__delais_interventions`).
      - Plusieurs colonnes sont harmonisées mais portent une sémantique
        différente selon la source — voir les descriptions de `statut_facturation`,
        `categorie_machine` / `machine_clean`, `delai_heures_*`, `bonus_bool`,
        `delai_tech` / `delai_partenaire`, `alias_obj_*`, `client_id`.
      - Rafraîchissement : aucun scheduler dédié à la BU technique. Le mart se
        reconstruit automatiquement via `source:<source>+` quand une source
        upstream charge (refacto Option C) — pipeline EL `nesp_tech` (lundi 07:30,
        cron `30 7 * * 1`) et `yuman` (01:00 en semaine, cron `0 1 * * 1-5`).

    columns:
      - name: key_inter
        description: >
          PK — identifiant unique de l'intervention =
          `intervention_id` + '_' + `partenaire`.
        tests:
          - not_null
          - unique

      - name: intervention_id
        description: >
          Identifiant de l'intervention dans le système source : `n_planning`
          côté NESP, `workorder_number` côté YUMAN.
        tests:
          - not_null

      - name: src_inter
        description: >
          Système source de l'intervention : NESP (Nespresso / Nomad Repair) ou
          YUMAN (tous les autres partenaires).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['NESP', 'YUMAN']

      - name: partenaire
        description: >
          Partenaire client. NESPRESSO pour la source NESP ; sinon nom du
          partenaire Yuman (NESHU, BRITA, AUUM, TWYD, NU, EXPRESSO, FONTAINCO,
          DAAN). Colonne de clustering.

      - name: tech_id
        description: >
          Identifiant du technicien dans le système source : `nomad_id`
          (minuscule) côté NESP, `technician_id` Yuman côté YUMAN. Sert de clé de
          mapping vers `stg_yuman__users`.

      - name: client_id
        description: >
          Numéro client dans le système source (attribut à plat, homogénéisé en
          string) : `n_client` côté NESP, `client_code` côté YUMAN (ex.
          `NESH_CN1017`). ⚠️ Ce N'EST PAS la PK `client_id` (entier) de
          `dim_technique__client` : types hétérogènes et périmètre Nespresso hors
          dim → non joignable. Nullable côté NESP.

      - name: client_nom
        description: >
          Raison sociale du client, harmonisée en Initial Caps (`initcap`).
          NESP = `raison_sociale_client` ; YUMAN = `client_name`.

      - name: intervention_statut
        description: >
          État brut de l'intervention dans la source. NESP : 'terminée signée' /
          'signature différée' / 'terminée non signée' / 'mise en échec' (les
          'annulée' sont exclues en amont). YUMAN : `workorder_status`, toujours
          'Closed' ici (population filtrée sur intervention_state = REALISEE).

      - name: statut_facturation
        description: >
          Statut de facturation — ATTENTION, échelle différente selon la source.
          NESP (mappé depuis l'état d'intervention) : VALIDATED / NOT VALIDATED /
          NOT DEFINED. YUMAN (`billing_validation_status`) : VALIDATED /
          UNTRACKABLE / MISSING_TARIF / NOT_BILLABLE.

      - name: categorie_machine
        description: >
          Groupe machine normalisé (coalesce 'UNDEFINED' si inconnu) — clé utile
          pour la liaison avec les objectifs techniques. Source : `categorie_machine`
          de la facturation côté NESP ; `machine_clean` Yuman côté YUMAN.

      - name: machine_clean
        description: >
          Type machine normalisé (coalesce 'UNDEFINED'). Source : `machine_clean`
          de la facturation côté NESP ; `machine_raw` Yuman côté YUMAN (le
          `machine_clean` Yuman alimente lui `categorie_machine`).

      - name: tech_yuman_id
        description: Identifiant Yuman (`user_id`) du technicien, issu du mapping `stg_yuman__users`.

      - name: tech_nomad_id
        description: Identifiant Nomad du technicien, issu du mapping `stg_yuman__users`.

      - name: tech_nom
        description: Nom du technicien (`user_name`).

      - name: tech_secteur
        description: Secteur géographique / opérationnel d'affectation du technicien (`user_secteur`).

      - name: date_creation
        description: >
          Date/heure de création de l'intervention. NESP = `pickup_date` ;
          YUMAN = `workorder_date_creation`.

      - name: date_debut
        description: >
          Date/heure de début de l'intervention (colonne de partition).
          NESP = `date_heure_debut` ; YUMAN = `date_started`.

      - name: date_fin
        description: >
          Date/heure de fin de l'intervention. NESP = `date_heure_fin` ;
          YUMAN = `date_done`.

      - name: duree_inter_minutes
        description: Durée de l'intervention en minutes = `timestamp_diff(date_fin, date_debut, minute)`.

      - name: key_factu
        description: >
          Clé de tarification utilisée. NESP : clé composite
          `type_code - libellé - machine [- Montagne]`. YUMAN : `pricing_key_used`
          (`type_machine_marque_typetarif_metropole`).

      - name: code_postal
        description: Code postal du site d'intervention.

      - name: consignes
        description: Consignes de la demande d'intervention (`demand_description` côté YUMAN).

      - name: commentaire_tech
        description: Commentaire final du technicien post-intervention (`workorder_report` côté YUMAN).

      - name: prod
        description: >
          Production associée à l'intervention (référence article facturé NESP /
          `prod_number` YUMAN) — utile au calcul des primes techniciens.

      - name: montant
        description: >
          Montant facturé de l'intervention. NULL côté NESP pour les états non
          facturables (cf. `int_nesp_tech__facturation_interventions`).

      - name: bonus_bool
        description: >
          Indique si un bonus de délai s'applique. Toujours `false` côté YUMAN
          (pas de mécanisme de bonus Yuman).

      - name: montant_avec_bonus
        description: >
          Montant incluant le bonus de délai (`montant` + valeur du bonus).
          Égal à `montant` côté YUMAN.

      - name: delai_heures_debut
        description: >
          Délai en heures ouvrées avant début d'intervention.
          Toujours 0 côté YUMAN (non calculé).

      - name: delai_heures_fin
        description: >
          Délai en heures ouvrées avant fin d'intervention.
          Toujours 0 côté YUMAN (non calculé).

      - name: delai_tech
        description: >
          Type de délai côté technicien (J+0, J+1, … J++). NESP = `type_delai_debut` ;
          YUMAN = `type_delai` (même valeur que `delai_partenaire`).

      - name: delai_partenaire
        description: >
          Type de délai côté partenaire. NESP = `type_delai_fin` ;
          YUMAN = `type_delai` (identique à `delai_tech`).

      - name: flag_montagne_prime
        description: >
          1 si l'intervention est éligible à une prime montagne (`key_factu`
          contenant Aguila + Montagne et CP en zone montagne), sinon 0. En
          pratique NESP uniquement (format `key_factu` Yuman différent).

      - name: flag_paris_intramuros
        description: 1 si le `code_postal` commence par '75' (Paris intramuros), sinon 0.

      - name: flag_hors_delai_tech
        description: >
          1 si `delai_tech` ∈ (J++, J+3) et `key_factu` de type curative, sinon 0.
          S'applique aux deux sources.

      - name: alias_obj_type_inter
        description: >
          Alias type d'intervention. NESP : depuis le seed `ref_nesp_tech__key_facturation` ;
          YUMAN : 1er segment de `pricing_key_used` (split sur '_').

      - name: alias_obj_type_machine
        description: >
          Alias type machine. NESP : depuis le seed `ref_nesp_tech__key_facturation` ;
          YUMAN : 2e segment de `pricing_key_used` (split sur '_').

      - name: alias_obj_grp_machine
        description: >
          Alias groupe machine. NESP : depuis le seed `ref_nesp_tech__key_facturation` ;
          YUMAN : 2e segment de `pricing_key_used` (identique à `alias_obj_type_machine`).


  - name: dim_technique__client
    description: |
      [QUOI MÉTIER]
      Dimension client Yuman — conformed entre tous les partenaires EVS hors
      Nespresso (Neshu, Brita, Auum, ...). Décrit qui sont les clients chez qui
      EVS intervient techniquement via la plateforme Yuman.

      [COMMENT CONSTRUITE]
      Lecture directe de `stg_yuman__clients`. Sélection des colonnes utiles
      au BI : code, nom, catégorie, adresse, partenaire, état actif.

      [GRAIN]
      1 ligne par `client_id` (PK Yuman).

      [NOTES]
      Conformed dim — référencée par les facts `fct_technique__*`, et aussi
      par certains marts `fct_neshu__*` (workorder_delai notamment).
    columns:
      - name: client_id
        description: "Identifiant unique du client"
        tests:
          - unique
          - not_null

      - name: client_code
        description: "Code du client"

      - name: client_name
        description: "Nom du client"

      - name: client_category
        description: "Catégorie du client (Spécifique NESHU : OR / ARGENT / BRONZE)"

      - name: client_address
        description: "Adresse du client"

      - name: is_active
        description: "Statut d'activation du client"

      - name: partner_name
        description: "Nom du partenaire associé au client"


  - name: dim_technique__site
    description: |
      [QUOI MÉTIER]
      Dimension site Yuman — adresses physiques où sont installées les machines
      des clients EVS. Un client peut avoir plusieurs sites.

      [COMMENT CONSTRUITE]
      Lecture directe de `stg_yuman__sites`. Inclut le rattachement
      `client_id` (FK) et `agency_id` (agence EVS responsable du site).

      [GRAIN]
      1 ligne par `site_id` (PK Yuman).
    columns:
      - name: site_id
        description: "Identifiant unique du site"
        tests:
          - unique
          - not_null

      - name: client_id
        description: "Référence vers le client propriétaire"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_technique__client')
                field: client_id

      - name: agency_id
        description: "Identifiant de l'agence associée au site"

      - name: site_code
        description: "Code du site"

      - name: site_name
        description: "Nom du site"

      - name: site_address
        description: "Adresse du site"

      - name: site_postal_code
        description: "Code postal du site"

      - name: created_at
        description: "Date de création de l'enregistrement"

      - name: updated_at
        description: "Date de la dernière mise à jour de l'enregistrement"


  - name: dim_technique__material
    description: |
      [QUOI MÉTIER]
      Dimension matériel (machine) Yuman — chaque machine déployée chez un
      client EVS, enrichie avec sa catégorie technique (machine à café, fontaine,
      etc.).

      [COMMENT CONSTRUITE]
      Lecture de `stg_yuman__materials` joint à `stg_yuman__materials_categories`
      sur `category_id` pour ajouter `category_name`.

      [GRAIN]
      1 ligne par `material_id` (PK Yuman).

      [NOTES]
      `site_id` aplati directement pour faciliter les jointures BI (FK vers
      `dim_technique__site`).
    columns:
      - name: material_id
        description: "Identifiant unique du matériau"
        tests:
          - unique
          - not_null

      - name: site_id
        description: "Référence vers le site propriétaire"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_technique__site')
                field: site_id

      - name: material_description
        description: "Description de la machine"

      - name: material_name
        description: "Nom de la machine"

      - name: material_brand
        description: "Marque de la machine"

      - name: material_serial_number
        description: "Numéro de série de la machine"

      - name: category_name
        description: "Catégorie de la machine"

      - name: material_in_service_date
        description: "Date de mise en service de la machine"

      - name: created_at
        description: "Date de création de l'enregistrement"

      - name: updated_at
        description: "Date de la dernière mise à jour de l'enregistrement"


  - name: dim_technique__parc_machine
    description: |
      [QUOI MÉTIER]
      Vue parc machine consolidée — chaque machine déployée chez un client
      EVS avec ses attributs site et client aplatis. Consommée directement par
      un BI cartographie partenaires.

      [COMMENT CONSTRUITE]
      Lecture de `stg_yuman__materials` joint à `stg_yuman__sites` (sur site_id)
      et `stg_yuman__clients` (sur client_id via site) + catégorie via
      `stg_yuman__materials_categories`. C'est une dim "enrichie" qui aplatit
      les attributs de 2 dims parentes (site + client).

      [GRAIN]
      1 ligne par `material_id` (PK).

      [NOTES]
      OBT-like : l'aplatissement multi-dim est volontaire car le BI parc
      machine consomme directement cette table sans jointure côté Power Query.
      Si 3+ rapports répètent ce flatten, voir si on consolide ; sinon on garde.
      Pattern doc dans `docs/conventions/marts.md`.
    columns:
      # Informations Machine
      - name: material_id
        description: "Identifiant unique de la machine"
        tests:
          - not_null
          - unique

      - name: material_description
        description: "Type de machine"

      - name: material_brand
        description: "Marque de la machine"

      - name: material_serial_number
        description: "Numéro de série de la machine"

      - name: category_name
        description: "Catégorie de la machine"

      - name: material_in_service_date
        description: "Date de mise en service de la machine"

      # Informations Client
      - name: client_id
        description: "Id du client associé à la machine"
        tests:
          - not_null

      - name: client_code
        description: "Code du client associé à la machine"

      - name: client_address
        description: "Adresse du client associé à la machine"

      - name: client_name
        description: "Nom du client associé à la machine"

      - name: partner_name
        description: "Nom du partenaire associé à la machine"

      # Informations Site
      - name: site_id
        description: "Id du site associé à la machine"
        tests:
          - not_null

      - name: site_address
        description: "Adresse du site associé à la machine"

      - name: site_name
        description: "Nom du site associé à la machine"

      - name: site_postal_code
        description: "Code postal du site associé à la machine"


  - name: dim_technique__product
    description: |
      [QUOI MÉTIER]
      Catalogue des produits / articles Yuman (pièces détachées, consommables)
      utilisables lors des interventions. Appelé « Article » côté métier
      (renommage fait dans le modèle sémantique Power BI).

      [COMMENT CONSTRUITE]
      Lecture directe de `stg_yuman__products` (catalogue API Yuman), sans
      transformation.

      [GRAIN]
      1 ligne par `product_id` (PK).

      [NOTES]
      Dimension conforme : sert aux analyses technique (consommation
      d'articles via `fct_technique__consommation_article_yuman`) et supply_chain
      (le stock `fct_supply_chain__stock_yuman` se joint via
      `product_code` = `reference`). Les prix achat/vente sont les prix
      courants Yuman, sans historique — toute valorisation est indicative.
    columns:
      - name: product_id
        description: Identifiant unique du produit dans Yuman (PK).
        tests:
          - not_null
          - unique

      - name: product_code
        description: >
          Référence article (clé de jointure avec la colonne `reference` de
          `fct_supply_chain__stock_yuman`). Rares cas null côté Yuman.

      - name: product_name
        description: Désignation de l'article.

      - name: product_type
        description: Type de produit Yuman (quasi-constant `product`).

      - name: product_brand
        description: Marque de l'article.

      - name: product_unit
        description: Unité de mesure (pièce, litre, etc.).

      - name: product_purchase_price
        description: Prix d'achat courant (sans historique).

      - name: product_sale_price
        description: Prix de vente courant (sans historique).

      - name: is_active
        description: Article actif dans le catalogue Yuman.

      - name: is_forbidden_article
        description: >
          Article interdit (true). Dérivé du champ personnalisé Yuman booléen
          « ARTICLE INTERDIT » (Oui/Non). false si non renseigné.

      - name: is_mandatory_article
        description: >
          Article obligatoire (true). Dérivé du champ personnalisé Yuman booléen
          « ARTICLE OBLIGATOIRE » (Oui/Non). false si non renseigné.

      - name: created_at
        description: Date de création de l'article dans Yuman.

      - name: updated_at
        description: Date de dernière modification dans Yuman.

    tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          arguments:
            min_value: 3000
            max_value: 20000
          config:
            severity: warn

  - name: fct_technique__consommation_article_yuman
    description: |
      [QUOI MÉTIER]
      Consommation d'articles (pièces détachées, consommables) lors des
      interventions Yuman — « article » au sens catalogue Yuman, à ne pas
      confondre avec la consommation de boissons NESHU (`fct_neshu__consommation`).
      Permet l'analyse des articles consommés par client / site / machine /
      technicien / type d'intervention, et le rapprochement avec les stocks
      (`fct_supply_chain__stock_yuman`, `fct_supply_chain__rupture_depot_yuman`)
      via `dim_technique__product` (product_code = reference).

      [COMMENT CONSTRUITE]
      Agrégation de `stg_yuman__workorder_products` (lignes de saisie) au
      grain workorder x article (`sum(quantity)`), jointe (inner join) à
      `int_yuman__demands_workorders_enriched` (dédupliqué par workorder,
      restreint aux workorders rattachés à une demande) pour porter les FK
      client / site / matériel / technicien, l'état métier canonique
      `intervention_state` et les motifs de non-intervention / pause.

      [GRAIN]
      1 ligne par couple (`workorder_id`, `product_id`). ~16,6k lignes.

      [NOTES]
      Périmètre : les workorders **hors flux demande** (sans demande rattachée,
      ~10 lignes, FK non exploitables) sont **exclus**. Aucun filtre de statut en
      revanche : ~99,8 % de la conso est sur des interventions REALISEE, le reste
      (NON_REALISEE / EN_COURS / EN_PAUSE) est conservé et qualifié par
      `intervention_state` pour laisser le choix au métier — filtrer
      `intervention_state = 'REALISEE'` pour la conso confirmée. Les NON_REALISEE
      sont majoritairement des « Erreur de saisie » (cf.
      `workorder_motif_non_intervention`) → conso probablement erronée. Les
      interventions EN_COURS ont `date_done` null (partition null). Pas de
      valorisation : prix Yuman courants sans historique (calcul indicatif
      possible côté PBI via `dim_technique__product`).
    columns:
      - name: workorder_id
        description: Identifiant du bon de travail (dimension dégénérée).
        tests:
          - not_null

      - name: demand_id
        description: >
          Identifiant de la demande d'intervention rattachée (dimension
          dégénérée). Toujours renseigné : les workorders sans demande sont exclus.
        tests:
          - not_null

      - name: product_id
        description: Identifiant de l'article consommé (FK).
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_technique__product')
                field: product_id
              config:
                severity: warn

      - name: material_id
        description: >
          Identifiant du matériel concerné par l'intervention (FK).
          Nullable : null quand la demande n'a pas de machine rattachée
          (~819 lignes, cas légitime). Pas de not_null volontairement.
        tests:
          - relationships:
              arguments:
                to: ref('dim_technique__material')
                field: material_id
              config:
                severity: warn

      - name: site_id
        description: >
          Identifiant du site client (FK). Non null : toute conso est rattachée
          à une demande (les workorders hors flux demande sont exclus).
        tests:
          - relationships:
              arguments:
                to: ref('dim_technique__site')
                field: site_id
              config:
                severity: warn

      - name: client_id
        description: >
          Identifiant du client (FK). Non null : toute conso est rattachée à une
          demande (workorders hors flux demande exclus).
        tests:
          - relationships:
              arguments:
                to: ref('dim_technique__client')
                field: client_id
              config:
                severity: warn

      - name: technician_id
        description: >
          Identifiant du technicien associé (FK vers dim_technique__technician,
          PK user_id). Non null : les workorders hors flux demande sont exclus.
        tests:
          - relationships:
              arguments:
                to: ref('dim_technique__technician')
                field: user_id
              config:
                severity: warn

      - name: product_reference
        description: >
          Référence de l'article consommé (aplati pour lecture directe ; 1:1
          avec product_id). Identique au `product_code` de dim_technique__product
          et à la `reference` du stock Yuman → clé de rapprochement conso ↔ stock.
          Pour les autres attributs article, joindre dim_technique__product via
          product_id.

      - name: partner_name
        description: Partenaire client de l'intervention (attribut d'affichage).

      - name: workorder_number
        description: Numéro lisible du bon de travail (drill vers Yuman).

      - name: workorder_type
        description: >
          Type d'intervention : Reactive (curatif) / Preventive /
          Installation. Axe d'analyse principal de la consommation de pièces.
        tests:
          - accepted_values:
              arguments:
                values: ['Reactive', 'Preventive', 'Installation']
              config:
                severity: warn

      - name: workorder_category
        description: >
          Catégorie libre du bon de travail (complément de workorder_type,
          plus granulaire mais non normalisé).

      - name: demand_category_name
        description: Catégorie métier de la demande d'intervention.

      - name: intervention_state
        description: >
          État métier canonique de l'intervention, repris de
          `int_yuman__demands_workorders_enriched` (source de vérité). Valeurs :
          REALISEE, NON_REALISEE, EN_COURS, EN_PAUSE, PLANIFIEE,
          DEMANDE_OUVERTE, DEMANDE_REJETEE, AUTRE. Axe de filtrage principal de
          la consommation.
        tests:
          - accepted_values:
              arguments:
                values:
                  - REALISEE
                  - NON_REALISEE
                  - EN_COURS
                  - EN_PAUSE
                  - PLANIFIEE
                  - DEMANDE_OUVERTE
                  - DEMANDE_REJETEE
                  - AUTRE
              config:
                severity: warn

      - name: workorder_motif_non_intervention
        description: >
          Motif de non-intervention (renseigné quand
          intervention_state = NON_REALISEE). Ex. « Erreur de saisie »
          (majoritaire → conso probablement erronée), « Résolue roadman ».
          Permet au métier d'écarter la conso non pertinente.

      - name: workorder_detail_non_intervention
        description: Détail complémentaire du motif de non-intervention, si renseigné.

      - name: workorder_raison_mise_en_pause
        description: >
          Raison de mise en pause de l'intervention (renseignée si pause active
          ou historique). Ex. « PB Stock véhicule », « PB technique non résolu ».

      - name: workorder_explication_mise_en_pause
        description: Explication détaillée de la mise en pause, si renseignée.

      - name: date_done
        description: >
          Date de réalisation de l'intervention (partition). Null pour les
          workorders hors flux demande ou non terminés.

      - name: quantity
        description: Quantité totale consommée du produit sur le workorder.
        tests:
          - not_null

      - name: first_recorded_at
        description: Première saisie du produit sur le workorder.

      - name: last_updated_at
        description: Dernière mise à jour d'une ligne produit du workorder.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - workorder_id
              - product_id
      - dbt_utils.expression_is_true:
          arguments:
            expression: "quantity > 0"
          config:
            severity: warn
      - dbt_expectations.expect_table_row_count_to_be_between:
          arguments:
            min_value: 10000
            max_value: 200000
          config:
            severity: warn

  - name: fct_technique__consommation_article_nespresso
    description: >
      [QUOI MÉTIER]
      Consommation d'articles (pièces détachées, consommables) lors des interventions
      techniques Nespresso (Nomad Repair) — le pendant Nespresso de
      `fct_technique__consommation_article_yuman` : ces interventions ne passent pas
      par les bons Yuman, mais leurs articles sont centralisés dans le référentiel
      Yuman sous le préfixe `EVS_NESPRESSO_` (colonne product_reference = clé de
      rapprochement avec les stocks Yuman).

      [COMMENT CONSTRUITE]
      `int_nesp_tech__articles_dedup` (une ligne = un article posé sur une
      intervention), joint (inner join) à `int_nesp_tech__interventions_dedup`
      restreint aux agences EVS ('evs', 'evs paris', 'evs idf', 'evs paris 2' —
      'nespresso sud' = sous-traitant hors flux de stock EVS, plus actif depuis 2025)
      pour l'état, l'agence et les horodatages début/fin. technician_id résolu via
      le matricule Nomad (n_tech ↔ dim_technique__technician.nomad_id, unique).
      product_reference = 'EVS_NESPRESSO_' + upper(code_article).

      [GRAIN]
      1 ligne par (n_planning, code_article). ~168k lignes depuis nov. 2023.

      [NOTES]
      Aucun filtre d'état : une ligne de la table articles = une pose réelle
      (validé métier ; 99,95 % des lignes portent un état terminé), etat_intervention
      est exposé en information. Contient les lignes de saisie non stockables
      (Détartrage '0000100', Pas de pièce '0000001', flag 'miniprev') — à exclure
      selon l'usage via le seed ref_yuman__pseudo_article (sur product_reference).
      Source extraite chaque lundi (fenêtre 7 jours glissants) : fraîcheur
      hebdomadaire, pas quotidienne. Flux disjoint des bons Yuman (outils non
      mélangés, vérifié métier).
    columns:
      - name: n_planning
        description: "Intervention Nomad Repair concernée (clé du grain). Dimension dégénérée."
        tests:
          - not_null
      - name: code_article
        description: "Code article source Nomad (clé du grain, lowercase). Valeurs spéciales : '0000100' Détartrage, '0000001' Pas de pièce, 'miniprev' flag mini-préventive."
        tests:
          - not_null
      - name: technician_id
        description: "FK vers dim_technique__technician (user Yuman), résolue via le matricule Nomad. NULL si le matricule n'est plus dans le référentiel."
        tests:
          - relationships:
              arguments:
                to: ref('dim_technique__technician')
                field: user_id
              config:
                severity: warn
      - name: product_reference
        description: "Référence article dans le référentiel Yuman ('EVS_NESPRESSO_' + code article en majuscules). Clé de rapprochement avec les stocks Yuman."
        tests:
          - not_null
      - name: nom_article
        description: "Libellé de l'article (source Nomad)"
      - name: n_tech
        description: "Matricule Nomad du technicien (type 'tec-xxxxx')"
      - name: nom_tech
        description: "Nom du technicien (source Nomad)"
      - name: prenom_tech
        description: "Prénom du technicien (source Nomad)"
      - name: n_client
        description: "Identifiant client Nespresso (Nessoft)"
      - name: raison_sociale_client
        description: "Raison sociale du client"
      - name: n_site
        description: "Identifiant du site d'intervention"
      - name: nom_site
        description: "Nom du site d'intervention"
      - name: code_machine
        description: "Code de la machine intervenue"
      - name: nom_machine
        description: "Nom / modèle de la machine"
      - name: num_serie_machine
        description: "Numéro de série de la machine"
      - name: etat_intervention
        description: "État de l'intervention porteuse (information, non filtré) : 'terminée signée' (~99,7 %), 'signature différée', 'terminée non signée', 'mise en échec', 'annulée'"
        tests:
          - accepted_values:
              arguments:
                values:
                  - "terminée signée"
                  - "signature différée"
                  - "terminée non signée"
                  - "mise en échec"
                  - "annulée"
              config:
                severity: warn
      - name: agency
        description: "Agence EVS en charge de l'intervention (périmètre filtré aux agences EVS)"
        tests:
          - accepted_values:
              arguments:
                values: [evs, evs paris, evs idf, evs paris 2]
      - name: date_heure_debut
        description: "Date/heure de début réel de l'intervention (colonne de partition). La date de la table articles source correspond à cette date (99,95 % des lignes)."
        tests:
          - not_null
      - name: date_heure_fin
        description: "Date/heure de fin de l'intervention"
      - name: qty_consommee
        description: "Quantité de l'article posée sur l'intervention. Additive"
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"
              config:
                severity: warn
      - name: dbt_updated_at
        description: "Timestamp de reconstruction de la table"
      - name: dbt_invocation_id
        description: "Identifiant du run dbt ayant produit la ligne"
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - n_planning
              - code_article
      - dbt_expectations.expect_table_row_count_to_be_between:
          arguments:
            min_value: 100000
            max_value: 1000000
          config:
            severity: warn

  - name: fct_technique__suivi_partenaire
    description: |
      [QUOI MÉTIER]
      Suivi opérationnel des demandes et interventions Yuman par partenaire.
      Remplace l'ancien DAG Airflow `MAIL_Yuman_Module_Notification` qui envoyait
      des emails d'alerte automatiques.

      [COMMENT CONSTRUITE]
      Chaque ligne = 1 demande d'intervention enrichie avec son workorder
      associé + client + site + matériel + technicien. La colonne
      `intervention_state` (état métier canonique) est reprise depuis
      int_yuman__demands_workorders_enriched. 9 flags d'alerte (`alerte_*`)
      permettent au PBI de filtrer les situations qui déclenchaient
      auparavant un email automatique : 7 sont de simples projections
      booléennes de `intervention_state` (aucune logique d'état recalculée
      ici → iso avec int_yuman__interventions), 2 sont des alertes
      opérationnelles spécifiques sans équivalent canonique
      (`alerte_en_cours_non_cloture` = staleness, `alerte_hors_delais` = SLA
      curative ouverte).

      [GRAIN]
      1 ligne par demande Yuman (`demand_id`).

      [NOTES]
      `intervention_state` et les flags `alerte_*` sont la valeur business clé —
      utilisés comme slicers dans le rapport de monitoring partenaires. Mart
      conservé même s'il n'est pas activement consommé aujourd'hui (anciennement
      utilisé pour les emails, à reprendre dans une vue BI future).

    columns:
      - name: demand_id
        description: "Identifiant unique de la demande d'intervention"
        tests:
          - unique
      - name: workorder_id
        description: "Identifiant unique du bon de travail associé"
      - name: material_id
        description: "Identifiant du matériel concerné"
        tests:
          - relationships:
              arguments:
                to: ref('dim_technique__material')
                field: material_id
      - name: site_id
        description: "Identifiant du site d'intervention"
        tests:
          - relationships:
              arguments:
                to: ref('dim_technique__site')
                field: site_id
      - name: client_id
        description: "Identifiant du client"
        tests:
          - relationships:
              arguments:
                to: ref('dim_technique__client')
                field: client_id
      - name: partner_name
        description: "Nom du partenaire — slicer principal dans Power BI"
      - name: client_name
        description: "Nom du client"
      - name: site_name
        description: "Nom du site d'intervention"
      - name: site_address
        description: "Adresse du site d'intervention"
      - name: contact_name
        description: "Nom du contact principal du site"
      - name: contact_email
        description: "Email du contact principal du site"
      - name: material_name
        description: "Nom du matériel concerné"
      - name: material_serial_number
        description: "Numéro de série du matériel"
      - name: demand_status
        description: "Statut de la demande (Open, Accepted, Rejected…)"
      - name: demand_category_name
        description: "Catégorie de la demande"
      - name: demand_created_at
        description: "Date de création de la demande"
      - name: demand_updated_at
        description: "Date de dernière mise à jour de la demande"
      - name: demand_reject_comment
        description: "Commentaire de rejet de la demande"
      - name: workorder_number
        description: "Numéro de l'intervention"
      - name: workorder_type
        description: "Type d'intervention (Reactive = curative, Preventive…)"
      - name: workorder_status
        description: "Statut du bon de travail (Scheduled, InProgress, Closed…)"
      - name: intervention_state
        description: >
          État métier canonique de l'intervention (REALISEE, NON_REALISEE, EN_PAUSE,
          EN_COURS, PLANIFIEE, DEMANDE_OUVERTE, DEMANDE_REJETEE, AUTRE). Passthrough
          depuis int_yuman__demands_workorders_enriched : source de vérité unique de
          l'état, dont dérivent les 7 premiers flags alerte_*. Voir la doc complète sur
          int_yuman__demands_workorders_enriched.
        tests:
          - accepted_values:
              arguments:
                values:
                  - REALISEE
                  - NON_REALISEE
                  - EN_PAUSE
                  - EN_COURS
                  - PLANIFIEE
                  - DEMANDE_OUVERTE
                  - DEMANDE_REJETEE
                  - AUTRE
              config:
                severity: warn
      - name: is_orphan_workorder
        description: >
          True pour un bon de travail orphelin (sans demande rattachée) : aucun référentiel
          partenaire/client/site. Flag canonique partagé avec int_yuman__demands_workorders_enriched
          (qui le définit) et int_yuman__interventions (qui les exclut). Conservés ici mais
          filtrables : à exclure des analyses par partenaire (partner_name NULL).
      - name: workorder_technician_name
        description: "Nom du technicien affecté"
      - name: technician_equipe
        description: "Équipe du technicien (BORDEAUX / HORS BORDEAUX)"
      - name: date_planned
        description: "Date planifiée de l'intervention"
      - name: date_started
        description: "Date de début de l'intervention"
      - name: date_done
        description: "Date de clôture de l'intervention"
      - name: nb_jours_depuis_creation
        description: "Nombre de jours calendaires depuis la création de la demande"
      - name: nb_jours_ouvrables_ecoules
        description: >
          Nombre de jours ouvrés écoulés depuis la création (hors week-ends et jours fériés).
          Calculé uniquement pour les curatives encore ouvertes (logique hors délais).
      - name: alerte_demand_open
        description: "intervention_state = DEMANDE_OUVERTE : demande sans workorder, pas encore traitée (Open)"
      - name: alerte_demand_accepted
        description: "demand_status = Accepted : demande acceptée par le support (statut demande, orthogonal à l'état)"
      - name: alerte_demand_rejected
        description: "intervention_state = DEMANDE_REJETEE : demande sans workorder, rejetée (Rejected)"
      - name: alerte_non_realisee
        description: >
          intervention_state = NON_REALISEE : workorder clôturé AVEC motif/détail de
          non-intervention (intervention non effectuée). Remplace l'ancien
          alerte_workorder_canceled, qui ne se déclenchait jamais en prod.
      - name: alerte_planifiee
        description: "intervention_state = PLANIFIEE : intervention planifiée (Scheduled)"
      - name: alerte_cloturee
        description: "intervention_state = REALISEE : intervention clôturée et réalisée (sans motif de non-intervention)"
      - name: alerte_pause
        description: >
          intervention_state = EN_PAUSE : pause active (workorder In progress avec champ
          de pause renseigné). Exclut les pauses historiques portées par un workorder clôturé.
      - name: alerte_en_cours_non_cloture
        description: >
          Alerte opérationnelle (hors état canonique) : intervention démarrée avant
          aujourd'hui et toujours ouverte (staleness).
      - name: alerte_hors_delais
        description: >
          Alerte opérationnelle (hors état canonique) : curative ouverte dépassant
          3 jours ouvrés depuis la création (SLA).


  - name: dim_technique__technician
    description: |
      [QUOI MÉTIER]
      Dimension technicien EVS — chaque utilisateur Yuman ayant un rôle
      technique (techniciens purs + managers intervenant aussi comme
      technicien).

      [COMMENT CONSTRUITE]
      Lecture de `stg_yuman__users` filtré sur user_type IN ('technician',
      'manager') avec flag `is_manager_as_technician`. Enrichie avec :
      - le nom du manager direct (via self-join sur stg_yuman__users)
      - le dépôt via deux angles complémentaires : `storehouses_name` = stock
        nominatif individuel du technicien ('ST - NOM'), via jointure
        `storehouses_id = user_id` sur `stg_yuman__storehouses` ;
        `entrepot_rattachement` = atelier/dépôt physique parent regroupant les
        techniciens par site (ex. '06 - ATELIER RUNGIS DEPOT'), issu du champ
        personnalisé Yuman.

      [GRAIN]
      1 ligne par `user_id` (PK Yuman du technicien).

      [NOTES]
      Conformed dim — utilisée par les facts intervention/pricing. Inclut
      les snapshots history via `snap_yuman__users` en aval si besoin SCD2.

    columns:
      - name: user_id
        description: Identifiant unique du technicien dans Yuman. Clé primaire.
        tests:
          - unique
          - not_null

      - name: nomad_id
        description: Identifiant du technicien dans le système Nomad. Null si non référencé.

      - name: manager_id
        description: Clé étrangère vers user_id du manager direct. Null si aucun manager.

      - name: user_name
        description: Nom complet du technicien tel qu'affiché dans Yuman.

      - name: user_email
        description: Adresse e-mail professionnelle du technicien.

      - name: user_phone
        description: Numéro de téléphone du technicien.

      - name: user_type
        description: "Type d'utilisateur. Valeurs possibles : 'technician' ou 'manager'."

      - name: user_secteur
        description: Secteur géographique ou opérationnel d'affectation du technicien.

      - name: entrepot_rattachement
        description: >-
          Atelier/dépôt physique de rattachement du technicien (ex.
          '06 - ATELIER RUNGIS DEPOT', '07 - ATELIER LYON DEPOT',
          '08 - ATELIER BORDEAUX DEPOT'), issu du champ personnalisé Yuman
          'ENTREPOT RATTACHEMENT'. Regroupe les techniciens par site.
          À distinguer de storehouses_name, qui est le stock nominatif
          individuel du technicien ('ST - NOM PRENOM'). Null si non renseigné.

      - name: is_manager_as_technician
        description: True si le technicien est un manager intervenant également sur le terrain.

      - name: is_active
        description: False si le technicien a été désactivé dans Yuman (champ INACTIF).

      - name: manager_name
        description: Nom complet du manager direct. Null si aucun manager rattaché.

      - name: storehouses_name
        description: Nom du dépôt (storehouse) rattaché au technicien. Null si aucun dépôt associé.

      - name: created_at
        description: Date de création de l'utilisateur dans Yuman.

      - name: updated_at
        description: Date de dernière mise à jour de l'utilisateur dans Yuman.
  - name: fct_technique__piece_detachee_pricing_nespresso
    description: |
      [QUOI MÉTIER]
      Pricing des pièces détachées consommées lors des interventions Nespresso
      (Nomad Repair). Suit les ventes d'articles techniques par technicien, par
      jour et par intervention.

      [COMMENT CONSTRUITE]
      Filtre les interventions Nespresso terminées/signées issues des agences
      EVS (evs, evs paris, evs idf, evs paris 2) depuis
      `int_nesp_tech__interventions_dedup`. Joint aux consommations d'articles
      techniques et leur tarif catalogue.

      [GRAIN]
      1 ligne par (intervention `n_planning`, article consommé).

      [NOTES]
      Source nesp_tech = fichier Excel hebdomadaire (Mon 07:30). Suffixe
      `_nespresso` au nom du mart pour distinguer de la tarification Yuman
      (tous partenaires), désormais portée par `int_yuman__interventions`.

    columns:
      - name: n_planning
        description: Identifiant unique de la planification de l’intervention.
        tests:
          - not_null

      - name: date_fin
        description: Date de fin de l'intervention
        tests:
          - not_null

      - name: n_tech
        description: Identifiant du technicien ayant réalisé l’intervention.
        tests:
          - not_null

      - name: nom_tech
        description: Nom du technicien.

      - name: prenom_tech
        description: Prénom du technicien.

      - name: piece_ref_nomad
        description: Référence de l’article tel que défini dans la base tarifaire Nomad.

      - name: piece_desc
        description: Description textuelle de l’article.

      - name: piece_prix_unitaire
        description: Prix unitaire de l’article selon la table de référence.

      - name: piece_quantite
        description: Nombre d’unités de l’article consommé sur l’intervention.

      - name: montant_total
        description: Montant total calculé pour cet article sur l’intervention (quantité × prix unitaire).

  - name: fct_technique__alerting_consommation_aguila
    description: |
      [QUOI MÉTIER]
      Contrôle qualité des consommations de pièces lors des interventions
      techniques Nespresso sur machines Aguila. Détecte les incohérences
      (maintenance préventive, kits, filtres, pièces hors kit) via des règles
      métier d'alerting.

      [COMMENT CONSTRUITE]
      Consolidation des consommations d'articles par intervention (depuis
      `int_nesp_tech__*`) avec application des règles métier d'alerting :
      flags binaires sur chaque type d'incohérence détectable.

      [GRAIN]
      1 ligne par intervention Aguila.

      [NOTES]
      Aguila = type de machine Nespresso. Le mart est consommé par le BI
      PILOTAGE TECHNIQUE pour les alertes opérationnelles techniciens.

    columns:

      # ============================================================
      # Clés & métadonnées intervention
      # ============================================================

      - name: n_planning
        description: Identifiant unique de l’intervention (clé métier Nomad)
        tests:
          - not_null
          - unique

      - name: date_fin
        description: Date de fin d’intervention (convertie depuis timestamp opérationnel)

      - name: intervention_type
        description: Code métier du type d’intervention

      - name: consignes
        description: Consignes saisies par le technicien lors de l’intervention

      # ============================================================
      # Normalisation machine
      # ============================================================

      - name: categorie_machine
        description: Catégorie machine issue du référentiel machines

      - name: machine_clean
        description: Nom machine normalisé via le référentiel technique

      # ============================================================
      # Alertes métier – règles qualité
      # ============================================================

      - name: alt_nomenclature
        description: >
          Détecte l’absence de PREV ou MINIPREV sur une intervention préventive.

      - name: alt_coherence_consigne
        description: >
          Vérifie la cohérence entre la consigne saisie et les articles consommés.

      - name: alt_prevcompletekit
        description: >
          Vérifie la présence d’un kit lorsque PREV est consommé.

      - name: alt_kit_typemachine
        description: >
          Contrôle la cohérence entre le kit consommé et le type de machine Aguila.

      - name: alt_filtre_consomme
        description: >
          Détecte l’absence du filtre EVERPUREXL lorsque requis.

      - name: alt_nb_kits
        description: >
          Détecte la consommation de plusieurs kits sur une même intervention.

      - name: alt_conso_hors_kit
        description: >
          Vérifie la conformité des quantités de pièces hors kit selon la machine.

      # ============================================================
      # Champ analytique consolidé
      # ============================================================

      - name: alerte_compile
        description: >
          Concaténation des alertes détectées pour l’intervention.
          Format standardisé : ALERTE1-ALERTE2-ALERTE3.
          Les alertes nulles ne sont pas incluses.

      # ============================================================
      # Métadonnées dbt (audit / lineage)
      # ============================================================

      - name: dbt_updated_at
        description: Timestamp de dernière exécution du modèle dbt

      - name: dbt_invocation_id
        description: Identifiant unique d’exécution dbt (traçabilité pipeline)
