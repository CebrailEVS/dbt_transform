version: 2

models:
  - name: fct_technique__intervention
    description: |
      [QUOI MÉTIER]
      Vue consolidée des interventions techniques EVS, tous partenaires
      confondus (Nespresso via Nomad Repair + Neshu/Brita/Auum/... via Yuman).
      Base pour les indicateurs opérationnels, la facturation partenaire et les
      primes techniciens.

      [COMMENT CONSTRUITE]
      UNION ALL entre 2 chaînes :
      - branche NESP : `int_nesp_tech__interventions_dedup` + `int_nesp_tech__facturation_interventions` + `int_nesp_tech__delais_interventions` + `ref_nesp_tech__key_facturation`
      - branche YUMAN : `fct_neshu__workorder_delai` + `stg_yuman__users` + `ref_nesp_tech__cps_montagne_primes`
      Une colonne `partenaire` (NESPRESSO / NESHU / BRITA / AUUM / ...) sépare
      les deux sources dans le résultat.

      [GRAIN]
      1 ligne par intervention (`key_inter` = intervention_id + partenaire).

      [NOTES]
      Source nesp_tech rafraîchie hebdo (Mon 07:30), yuman daily 01:00. Le mart
      est rebuilt 2× par jour weekdays via `transform-technique-daily`
      (cron `0 3,8 * * *`).

    columns:
      - name: key_inter
        description: Identifiant unique de l'intervention (intervention_id + partenaire)
        tests:
          - not_null
          - unique

      - name: intervention_id
        description: Identifiant de l'intervention dans le système source
        tests:
          - not_null

      - name: src_inter
        description: Système source (NESP ou YUMAN)
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['NESP', 'YUMAN']

      - name: partenaire
        description: Partenaire client associé à l'intervention

      - name: tech_id
        description: Identifiant du technicien dans le système source

      - name: intervention_statut
        description: Etat de l'intervention 

      - name: statut_facturation
        description: Statu de facturation de l'intervention (BILLABLE vs NOT BILLABLE)

      - name: categorie_machine
        description: Groupe machine - clé utile notamment pour la liaison avec les objectifs techniques

      - name: machine_clean
        description: type machine clean - clé utile notamment pour la liaison avec les objectifs techniques

      - name: tech_yuman_id
        description: Identifiant Yuman du technicien

      - name: tech_nomad_id
        description: Identifiant Nomad du technicien

      - name: tech_nom
        description: Nom du technicien

      - name: date_creation
        description: Date de création de l'intervention

      - name: date_debut
        description: Date de début de l'intervention

      - name: date_fin
        description: Date de fin de l'intervention

      - name: duree_inter_minutes
        description: Durée de l'intervention en minutes

      - name: key_factu
        description: Clé de tarification utilisée

      - name: code_postal
        description: Code postal du site d'intervention

      - name: consignes
        description: Consignes de la demande d'intervention

      - name: commentaire_tech
        description: Commentaire finale du technicien post intervention

      - name: prod
        description: Production associée à l'intervention - utile pour les calcul de primes des techniciens

      - name: montant
        description: Montant de l'intervention

      - name: bonus_bool
        description: Indique si un bonus de délai s'applique

      - name: montant_avec_bonus
        description: Montant incluant les bonus de délai

      - name: delai_heures_debut
        description: Délai en heures avant début d'intervention

      - name: delai_heures_fin
        description: Délai en heures avant fin d'intervention

      - name: delai_tech
        description: Type de délai côté technicien

      - name: delai_partenaire
        description: Type de délai côté partenaire

      - name: flag_montagne_prime
        description: Indique si l'intervention est éligible à une prime montagne (1/0)

      - name: flag_paris_intramuros
        description: Indique si l'intervention est réalisée à Paris intramuros (1/0)

      - name: flag_hors_delai_tech
        description: Indique si l'intervention est hors délai technicien (1/0)


  - name: dim_technique__client
    description: |
      [QUOI MÉTIER]
      Dimension client Yuman — conformed entre tous les partenaires EVS hors
      Nespresso (Neshu, Brita, Auum, ...). Décrit qui sont les clients chez qui
      EVS intervient techniquement via la plateforme Yuman.

      [COMMENT CONSTRUITE]
      Lecture directe de `stg_yuman__clients`. Sélection des colonnes utiles
      au BI : code, nom, catégorie, adresse, partenaire, état actif.

      [GRAIN]
      1 ligne par `client_id` (PK Yuman).

      [NOTES]
      Conformed dim — référencée par les facts `fct_technique__*`, et aussi
      par certains marts `fct_neshu__*` (workorder_delai notamment).
    columns:
      - name: client_id
        description: "Identifiant unique du client"
        tests:
          - unique
          - not_null

      - name: client_code
        description: "Code du client"

      - name: client_name
        description: "Nom du client"

      - name: client_category
        description: "Catégorie du client (Spécifique NESHU : OR / ARGENT / BRONZE)"

      - name: client_address
        description: "Adresse du client"

      - name: is_active
        description: "Statut d'activation du client"

      - name: partner_name
        description: "Nom du partenaire associé au client"


  - name: dim_technique__site
    description: |
      [QUOI MÉTIER]
      Dimension site Yuman — adresses physiques où sont installées les machines
      des clients EVS. Un client peut avoir plusieurs sites.

      [COMMENT CONSTRUITE]
      Lecture directe de `stg_yuman__sites`. Inclut le rattachement
      `client_id` (FK) et `agency_id` (agence EVS responsable du site).

      [GRAIN]
      1 ligne par `site_id` (PK Yuman).
    columns:
      - name: site_id
        description: "Identifiant unique du site"
        tests:
          - unique
          - not_null

      - name: client_id
        description: "Référence vers le client propriétaire"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_technique__client')
                field: client_id

      - name: agency_id
        description: "Identifiant de l'agence associée au site"

      - name: site_code
        description: "Code du site"

      - name: site_name
        description: "Nom du site"

      - name: site_address
        description: "Adresse du site"

      - name: site_postal_code
        description: "Code postal du site"

      - name: created_at
        description: "Date de création de l'enregistrement"

      - name: updated_at
        description: "Date de la dernière mise à jour de l'enregistrement"


  - name: dim_technique__material
    description: |
      [QUOI MÉTIER]
      Dimension matériel (machine) Yuman — chaque machine déployée chez un
      client EVS, enrichie avec sa catégorie technique (machine à café, fontaine,
      etc.).

      [COMMENT CONSTRUITE]
      Lecture de `stg_yuman__materials` joint à `stg_yuman__materials_categories`
      sur `category_id` pour ajouter `category_name`.

      [GRAIN]
      1 ligne par `material_id` (PK Yuman).

      [NOTES]
      `site_id` aplati directement pour faciliter les jointures BI (FK vers
      `dim_technique__site`).
    columns:
      - name: material_id
        description: "Identifiant unique du matériau"
        tests:
          - unique
          - not_null

      - name: site_id
        description: "Référence vers le site propriétaire"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_technique__site')
                field: site_id

      - name: material_description
        description: "Description de la machine"

      - name: material_name
        description: "Nom de la machine"

      - name: material_brand
        description: "Marque de la machine"

      - name: material_serial_number
        description: "Numéro de série de la machine"

      - name: category_name
        description: "Catégorie de la machine"

      - name: material_in_service_date
        description: "Date de mise en service de la machine"

      - name: created_at
        description: "Date de création de l'enregistrement"

      - name: updated_at
        description: "Date de la dernière mise à jour de l'enregistrement"


  - name: dim_technique__parc_machine
    description: |
      [QUOI MÉTIER]
      Vue parc machine consolidée — chaque machine déployée chez un client
      EVS avec ses attributs site et client aplatis. Consommée directement par
      un BI cartographie partenaires.

      [COMMENT CONSTRUITE]
      Lecture de `stg_yuman__materials` joint à `stg_yuman__sites` (sur site_id)
      et `stg_yuman__clients` (sur client_id via site) + catégorie via
      `stg_yuman__materials_categories`. C'est une dim "enrichie" qui aplatit
      les attributs de 2 dims parentes (site + client).

      [GRAIN]
      1 ligne par `material_id` (PK).

      [NOTES]
      OBT-like : l'aplatissement multi-dim est volontaire car le BI parc
      machine consomme directement cette table sans jointure côté Power Query.
      Si 3+ rapports répètent ce flatten, voir si on consolide ; sinon on garde.
      Pattern doc dans `CONVENTIONS.md` § Marts.
    columns:
      # Informations Machine
      - name: material_id
        description: "Identifiant unique de la machine"
        tests:
          - not_null
          - unique

      - name: material_description
        description: "Type de machine"

      - name: material_brand
        description: "Marque de la machine"

      - name: material_serial_number
        description: "Numéro de série de la machine"

      - name: category_name
        description: "Catégorie de la machine"

      - name: material_in_service_date
        description: "Date de mise en service de la machine"

      # Informations Client
      - name: client_id
        description: "Id du client associé à la machine"
        tests:
          - not_null

      - name: client_code
        description: "Code du client associé à la machine"

      - name: client_address
        description: "Adresse du client associé à la machine"

      - name: client_name
        description: "Nom du client associé à la machine"

      - name: partner_name
        description: "Nom du partenaire associé à la machine"

      # Informations Site
      - name: site_id
        description: "Id du site associé à la machine"
        tests:
          - not_null

      - name: site_address
        description: "Adresse du site associé à la machine"

      - name: site_name
        description: "Nom du site associé à la machine"

      - name: site_postal_code
        description: "Code postal du site associé à la machine"


  - name: dim_technique__product
    description: |
      [QUOI MÉTIER]
      Catalogue des produits / articles Yuman (pièces détachées, consommables)
      utilisables lors des interventions. Appelé « Article » côté métier
      (renommage fait dans le modèle sémantique Power BI).

      [COMMENT CONSTRUITE]
      Lecture directe de `stg_yuman__products` (catalogue API Yuman), sans
      transformation.

      [GRAIN]
      1 ligne par `product_id` (PK).

      [NOTES]
      Dimension conforme : sert aux analyses technique (consommation
      d'articles via `fct_technique__workorder_product`) et supply_chain
      (le stock `fct_supply_chain__stock_yuman` se joint via
      `product_code` = `reference`). Les prix achat/vente sont les prix
      courants Yuman, sans historique — toute valorisation est indicative.
    columns:
      - name: product_id
        description: Identifiant unique du produit dans Yuman (PK).
        tests:
          - not_null
          - unique

      - name: product_code
        description: >
          Référence article (clé de jointure avec la colonne `reference` de
          `fct_supply_chain__stock_yuman`). Rares cas null côté Yuman.

      - name: product_name
        description: Désignation de l'article.

      - name: product_type
        description: Type de produit Yuman (quasi-constant `product`).

      - name: product_brand
        description: Marque de l'article.

      - name: product_unit
        description: Unité de mesure (pièce, litre, etc.).

      - name: product_purchase_price
        description: Prix d'achat courant (sans historique).

      - name: product_sale_price
        description: Prix de vente courant (sans historique).

      - name: is_active
        description: Article actif dans le catalogue Yuman.

      - name: created_at
        description: Date de création de l'article dans Yuman.

      - name: updated_at
        description: Date de dernière modification dans Yuman.

    tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          arguments:
            min_value: 3000
            max_value: 20000
          config:
            severity: warn

  - name: fct_technique__workorder_product
    description: |
      [QUOI MÉTIER]
      Consommation d'articles (pièces détachées, consommables) par
      intervention Yuman. Permet l'analyse des pièces consommées par client /
      site / machine / technicien, et le rapprochement avec les stocks
      théoriques (`fct_supply_chain__stock_yuman`).

      [COMMENT CONSTRUITE]
      Agrégation de `stg_yuman__workorder_products` (lignes de saisie) au
      grain workorder x produit (`sum(quantity)`), enrichie via
      `int_yuman__demands_workorders_enriched` (dédupliqué par workorder)
      pour porter les FK client / site / matériel / technicien et la date
      d'intervention.

      [GRAIN]
      1 ligne par couple (`workorder_id`, `product_id`).

      [NOTES]
      Les workorders hors flux demande (~6) ont leurs FK et `date_done` null
      (left join sur l'intermediate). Pas de valorisation dans le fait : les
      prix Yuman sont courants, sans historique — valoriser une consommation
      passée au prix du jour serait faux (calcul indicatif possible côté PBI
      via `dim_technique__product`).
    columns:
      - name: workorder_id
        description: Identifiant du bon de travail (dimension dégénérée).
        tests:
          - not_null

      - name: demand_id
        description: >
          Identifiant de la demande d'intervention rattachée (dimension
          dégénérée). Null pour les interventions hors flux demande.

      - name: product_id
        description: Identifiant de l'article consommé (FK).
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_technique__product')
                field: product_id
              config:
                severity: warn

      - name: material_id
        description: >
          Identifiant du matériel concerné par l'intervention (FK).
          Nullable : null quand le workorder n'a pas de machine rattachée
          (interventions hors flux demande). Pas de not_null volontairement.
        tests:
          - relationships:
              arguments:
                to: ref('dim_technique__material')
                field: material_id
              config:
                severity: warn

      - name: site_id
        description: >
          Identifiant du site client (FK). Nullable (idem material_id :
          interventions hors flux demande).
        tests:
          - relationships:
              arguments:
                to: ref('dim_technique__site')
                field: site_id
              config:
                severity: warn

      - name: client_id
        description: >
          Identifiant du client (FK). Nullable (idem material_id :
          interventions hors flux demande).
        tests:
          - relationships:
              arguments:
                to: ref('dim_technique__client')
                field: client_id
              config:
                severity: warn

      - name: technician_id
        description: >
          Identifiant du technicien associé (FK vers dim_technique__technician,
          PK user_id). Nullable pour les interventions hors flux demande.
        tests:
          - relationships:
              arguments:
                to: ref('dim_technique__technician')
                field: user_id
              config:
                severity: warn

      - name: partner_name
        description: Partenaire client de l'intervention (attribut d'affichage).

      - name: workorder_number
        description: Numéro lisible du bon de travail (drill vers Yuman).

      - name: workorder_type
        description: >
          Type d'intervention : Reactive (curatif) / Preventive /
          Installation. Axe d'analyse principal de la consommation de pièces.
        tests:
          - accepted_values:
              arguments:
                values: ['Reactive', 'Preventive', 'Installation']
              config:
                severity: warn

      - name: workorder_category
        description: >
          Catégorie libre du bon de travail (complément de workorder_type,
          plus granulaire mais non normalisé).

      - name: workorder_status
        description: Statut du bon de travail (attribut d'affichage).

      - name: demand_category_name
        description: Catégorie métier de la demande d'intervention.

      - name: demand_status
        description: >
          Statut de la demande rattachée. Toujours « Accepted » sur les
          interventions du flux normal ; null pour les interventions hors
          flux demande (contrôle qualité : permet d'isoler ces cas).

      - name: is_workorder_paused
        description: >
          True si l'intervention est en pause (raison/explication de mise en
          pause renseignée).

      - name: is_workorder_not_done
        description: >
          True si l'intervention n'a pas été réalisée (motif/détail de
          non-intervention renseigné). Des pièces consommées sur un workorder
          à true sont une anomalie à surveiller.

      - name: date_done
        description: >
          Date de réalisation de l'intervention (partition). Null pour les
          workorders hors flux demande ou non terminés.

      - name: quantity
        description: Quantité totale consommée du produit sur le workorder.
        tests:
          - not_null

      - name: first_recorded_at
        description: Première saisie du produit sur le workorder.

      - name: last_updated_at
        description: Dernière mise à jour d'une ligne produit du workorder.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - workorder_id
              - product_id
      - dbt_utils.expression_is_true:
          arguments:
            expression: "quantity > 0"
          config:
            severity: warn
      - dbt_expectations.expect_table_row_count_to_be_between:
          arguments:
            min_value: 10000
            max_value: 200000
          config:
            severity: warn

  - name: fct_technique__workorder_pricing
    description: |
      [QUOI MÉTIER]
      Tarification automatique des interventions (workorders) Yuman tous
      partenaires. Calcule le prix de chaque intervention selon les règles
      métier (récurrence, partenaire, zone géographique).

      [COMMENT CONSTRUITE]
      Lecture de `int_yuman__demands_workorders_enriched` (interventions +
      demandes unifiées) enrichie avec :
      - référentiels types d'intervention
      - tarifications par partenaire / catégorie / zone
      - flag métropole pour localisation
      Application des règles de calcul de prix automatique.

      [GRAIN]
      1 ligne par workorder (`workorder_id`) avec sa demand associée
      (`demand_id`).

      [NOTES]
      Base réutilisée par `fct_neshu__workorder_delai` (logique de calcul de
      délais Neshu-specific appliquée par-dessus). Transverse à tous les
      partenaires Yuman.

    columns:
      # --- IDENTIFIANTS ---
      - name: demand_id
        description: Identifiant unique de la demande d'intervention.
        tests:
          - unique
      - name: workorder_id
        description: Identifiant unique du bon de travail.
        tests:
          - unique
      - name: material_id
        description: Identifiant du matériel concerné.
        tests:
          - relationships:
              arguments:
                to: ref('dim_technique__material')
                field: material_id
      - name: site_id
        description: Identifiant du site client.
        tests:
          - relationships:
              arguments:
                to: ref('dim_technique__site')
                field: site_id
      - name: client_id
        description: Identifiant du client.
        tests:
          - relationships:
              arguments:
                to: ref('dim_technique__client')
                field: client_id
      - name: technician_id
        description: Identifiant du technicien associé.
      - name: manager_id
        description: Identifiant du manager ou responsable associé.

      # --- DEMANDE D'INTERVENTION ---
      - name: demand_description
        description: Description textuelle de la demande d’intervention.
      - name: demand_status
        description: Statut de la demande d’intervention.
      - name: demand_created_at
        description: Date de création de la demande.
      - name: demand_updated_at
        description: Date de dernière mise à jour de la demande.
      - name: demand_category_name
        description: Catégorie de la demande d’intervention.

      # --- BON DE TRAVAIL ---
      - name: workorder_number
        description: Numéro unique du bon de travail.
      - name: workorder_category
        description: Catégorie ou type brut du bon de travail.
      - name: workorder_status
        description: Statut actuel du bon de travail.
      - name: workorder_technician_name
        description: Nom du technicien affecté au bon de travail.
      - name: workorder_date_creation
        description: Date de création du bon de travail.
      - name: workorder_report
        description: Obeservation du technicien post intervention
      - name: workorder_motif_non_intervention
        description: Motif de non-intervention, si applicable.
      - name: workorder_detail_non_intervention
        description: Détail du motif de non-intervention, si applicable.
      - name: date_planned
        description: Date planifiée de l’intervention.
      - name: date_started
        description: Date de début de l’intervention.
      - name: date_done
        description: Date de clôture de l’intervention.

      # --- CLIENT & SITE ---
      - name: partner_name
        description: Nom du partenaire ou marque associée au client.
      - name: client_code
        description: Code unique du client.
      - name: client_name
        description: Nom du client.
      - name: client_category
        description: Catégorie commerciale ou segment du client.
      - name: client_is_active
        description: Indique si le client est actif.
      - name: site_code
        description: Code unique du site.
      - name: site_name
        description: Nom du site client.
      - name: site_address
        description: Adresse complète du site client.
      - name: site_postal_code
        description: Code postal fourni dans le système Yuman.
      - name: postal_code_site
        description: Code postal normalisé du site (corrigé ou extrait de la description si manquant).

      # --- MATERIEL ---
      - name: material_serial_number
        description: Numéro de série du matériel concerné.
      - name: workorder_type_raw
        description: Type brut de l’intervention avant normalisation.
      - name: machine_raw
        description: Catégorie brute du matériel avant nettoyage.
      - name: workorder_type_clean
        description: Type d’intervention normalisé (préventif, curatif, installation…).
      - name: machine_clean
        description: Catégorie de machine normalisée.

      # --- LOCALISATION ---
      - name: metropolitan
        description: Indicateur binaire (1 = métropole, 0 = hors métropole).
      - name: metropole_city
        description: Ville de la métropole associée à l'intervention.
      - name: recurrence_count
        description: Nombre d’interventions réalisées pour un même client le même jour (récurrence).

      # --- TARIFICATION ---
      - name: pricing_type
        description: Type de tarification appliquée (Tarif normal, Remise niv1, Remise niv2).
      - name: pricing_key_used
        description: Clé de tarification générée pour le matching avec la table de référence.
      - name: amount
        description: Montant appliqué selon la tarification automatique.
      - name: prod_number
        description: Code produit ou référence tarifaire associée.
      - name: to_invoice
        description: Indique si le bon d’intervention doit être facturé (true = à facturer).
      - name: billing_validation_status
        description: >
          Statut de validation de la facturation. VALIDATED = tarif trouvé ·
          MISSING_TARIF = facturable mais clé absente du CSV de tarification ·
          UNTRACKABLE = facturable mais intervention hors flux demande
          (workorder_id null, matériel intraçable) · NOT_BILLABLE = non facturable.
        data_tests:
          - accepted_values:
              arguments:
                values: ['VALIDATED', 'MISSING_TARIF', 'UNTRACKABLE', 'NOT_BILLABLE']
              config:
                severity: warn

  - name: fct_technique__suivi_partenaire
    description: |
      [QUOI MÉTIER]
      Suivi opérationnel des demandes et interventions Yuman par partenaire.
      Remplace l'ancien DAG Airflow `MAIL_Yuman_Module_Notification` qui envoyait
      des emails d'alerte automatiques.

      [COMMENT CONSTRUITE]
      Chaque ligne = 1 demande d'intervention enrichie avec son workorder
      associé + client + site + matériel + technicien. 7 flags d'alerte
      (`alerte_*`) sont calculés pour permettre au PBI de filtrer les
      situations qui déclenchaient auparavant un email automatique.

      [GRAIN]
      1 ligne par demande Yuman (`demand_id`).

      [NOTES]
      Les flags `alerte_*` sont la valeur business clé — utilisés comme
      slicers dans le rapport de monitoring partenaires. Mart conservé même
      s'il n'est pas activement consommé aujourd'hui (anciennement utilisé
      pour les emails, à reprendre dans une vue BI future).

    columns:
      - name: demand_id
        description: "Identifiant unique de la demande d'intervention"
        tests:
          - unique
      - name: workorder_id
        description: "Identifiant unique du bon de travail associé"
      - name: material_id
        description: "Identifiant du matériel concerné"
        tests:
          - relationships:
              arguments:
                to: ref('dim_technique__material')
                field: material_id
      - name: site_id
        description: "Identifiant du site d'intervention"
        tests:
          - relationships:
              arguments:
                to: ref('dim_technique__site')
                field: site_id
      - name: client_id
        description: "Identifiant du client"
        tests:
          - relationships:
              arguments:
                to: ref('dim_technique__client')
                field: client_id
      - name: partner_name
        description: "Nom du partenaire — slicer principal dans Power BI"
      - name: client_name
        description: "Nom du client"
      - name: site_name
        description: "Nom du site d'intervention"
      - name: site_address
        description: "Adresse du site d'intervention"
      - name: contact_name
        description: "Nom du contact principal du site"
      - name: contact_email
        description: "Email du contact principal du site"
      - name: material_name
        description: "Nom du matériel concerné"
      - name: material_serial_number
        description: "Numéro de série du matériel"
      - name: demand_status
        description: "Statut de la demande (Open, Accepted, Rejected…)"
      - name: demand_category_name
        description: "Catégorie de la demande"
      - name: demand_created_at
        description: "Date de création de la demande"
      - name: demand_updated_at
        description: "Date de dernière mise à jour de la demande"
      - name: demand_reject_comment
        description: "Commentaire de rejet de la demande"
      - name: workorder_number
        description: "Numéro de l'intervention"
      - name: workorder_type
        description: "Type d'intervention (Reactive = curative, Preventive…)"
      - name: workorder_status
        description: "Statut du bon de travail (Scheduled, InProgress, Closed…)"
      - name: workorder_technician_name
        description: "Nom du technicien affecté"
      - name: technician_equipe
        description: "Équipe du technicien (BORDEAUX / HORS BORDEAUX)"
      - name: date_planned
        description: "Date planifiée de l'intervention"
      - name: date_started
        description: "Date de début de l'intervention"
      - name: date_done
        description: "Date de clôture de l'intervention"
      - name: nb_jours_depuis_creation
        description: "Nombre de jours calendaires depuis la création de la demande"
      - name: nb_jours_ouvrables_ecoules
        description: >
          Nombre de jours ouvrés écoulés depuis la création (hors week-ends et jours fériés).
          Calculé uniquement pour les curatives encore ouvertes (logique hors délais).
      - name: alerte_demand_open
        description: "Demande créée par le client, pas encore traitée par le support (demand_status = Open)"
      - name: alerte_demand_accepted
        description: "Demande acceptée par le support (demand_status = Accepted)"
      - name: alerte_demand_rejected
        description: "Demande rejetée par le support (demand_status = Rejected)"
      - name: alerte_workorder_canceled
        description: "Demande acceptée mais workorder annulé (motif ou détail de non-intervention renseigné)"
      - name: alerte_planifiee
        description: "Intervention planifiée (statut Scheduled)"
      - name: alerte_cloturee
        description: "Intervention clôturée (vraie clôture, sans motif de non-intervention)"
      - name: alerte_pause
        description: "Intervention mise en pause (raison ou explication renseignée)"
      - name: alerte_en_cours_non_cloture
        description: "Intervention démarrée avant aujourd'hui et toujours ouverte"
      - name: alerte_hors_delais
        description: "Curative ouverte dépassant 3 jours ouvrés depuis la création"


  - name: dim_technique__technician
    description: |
      [QUOI MÉTIER]
      Dimension technicien EVS — chaque utilisateur Yuman ayant un rôle
      technique (techniciens purs + managers intervenant aussi comme
      technicien).

      [COMMENT CONSTRUITE]
      Lecture de `stg_yuman__users` filtré sur user_type IN ('technician',
      'manager') avec flag `is_manager_as_technician`. Enrichie avec :
      - le nom du manager direct (via self-join sur stg_yuman__users)
      - le dépôt (storehouse) rattaché via jointure `storehouses_id = user_id`
        sur `stg_yuman__storehouses`.

      [GRAIN]
      1 ligne par `user_id` (PK Yuman du technicien).

      [NOTES]
      Conformed dim — utilisée par les facts intervention/pricing. Inclut
      les snapshots history via `snap_yuman__users` en aval si besoin SCD2.

    columns:
      - name: user_id
        description: Identifiant unique du technicien dans Yuman. Clé primaire.
        tests:
          - unique
          - not_null

      - name: nomad_id
        description: Identifiant du technicien dans le système Nomad. Null si non référencé.

      - name: manager_id
        description: Clé étrangère vers user_id du manager direct. Null si aucun manager.

      - name: user_name
        description: Nom complet du technicien tel qu'affiché dans Yuman.

      - name: user_email
        description: Adresse e-mail professionnelle du technicien.

      - name: user_phone
        description: Numéro de téléphone du technicien.

      - name: user_type
        description: "Type d'utilisateur. Valeurs possibles : 'technician' ou 'manager'."

      - name: user_secteur
        description: Secteur géographique ou opérationnel d'affectation du technicien.

      - name: is_manager_as_technician
        description: True si le technicien est un manager intervenant également sur le terrain.

      - name: is_active
        description: False si le technicien a été désactivé dans Yuman (champ INACTIF).

      - name: manager_name
        description: Nom complet du manager direct. Null si aucun manager rattaché.

      - name: storehouses_name
        description: Nom du dépôt (storehouse) rattaché au technicien. Null si aucun dépôt associé.

      - name: created_at
        description: Date de création de l'utilisateur dans Yuman.

      - name: updated_at
        description: Date de dernière mise à jour de l'utilisateur dans Yuman.
  - name: fct_technique__piece_detachee_pricing_nespresso
    description: |
      [QUOI MÉTIER]
      Pricing des pièces détachées consommées lors des interventions Nespresso
      (Nomad Repair). Suit les ventes d'articles techniques par technicien, par
      jour et par intervention.

      [COMMENT CONSTRUITE]
      Filtre les interventions Nespresso terminées/signées issues des agences
      EVS (evs, evs paris, evs idf, evs paris 2) depuis
      `int_nesp_tech__interventions_dedup`. Joint aux consommations d'articles
      techniques et leur tarif catalogue.

      [GRAIN]
      1 ligne par (intervention `n_planning`, article consommé).

      [NOTES]
      Source nesp_tech = fichier Excel hebdomadaire (Mon 07:30). Suffixe
      `_nespresso` au nom du mart pour distinguer du `workorder_pricing` qui
      lui concerne Yuman tous partenaires.

    columns:
      - name: n_planning
        description: Identifiant unique de la planification de l’intervention.
        tests:
          - not_null

      - name: date_fin
        description: Date de fin de l'intervention
        tests:
          - not_null

      - name: n_tech
        description: Identifiant du technicien ayant réalisé l’intervention.
        tests:
          - not_null

      - name: nom_tech
        description: Nom du technicien.

      - name: prenom_tech
        description: Prénom du technicien.

      - name: piece_ref_nomad
        description: Référence de l’article tel que défini dans la base tarifaire Nomad.

      - name: piece_desc
        description: Description textuelle de l’article.

      - name: piece_prix_unitaire
        description: Prix unitaire de l’article selon la table de référence.

      - name: piece_quantite
        description: Nombre d’unités de l’article consommé sur l’intervention.

      - name: montant_total
        description: Montant total calculé pour cet article sur l’intervention (quantité × prix unitaire).

  - name: fct_technique__alerting_consommation_aguila
    description: |
      [QUOI MÉTIER]
      Contrôle qualité des consommations de pièces lors des interventions
      techniques Nespresso sur machines Aguila. Détecte les incohérences
      (maintenance préventive, kits, filtres, pièces hors kit) via des règles
      métier d'alerting.

      [COMMENT CONSTRUITE]
      Consolidation des consommations d'articles par intervention (depuis
      `int_nesp_tech__*`) avec application des règles métier d'alerting :
      flags binaires sur chaque type d'incohérence détectable.

      [GRAIN]
      1 ligne par intervention Aguila.

      [NOTES]
      Aguila = type de machine Nespresso. Le mart est consommé par le BI
      PILOTAGE TECHNIQUE pour les alertes opérationnelles techniciens.

    columns:

      # ============================================================
      # Clés & métadonnées intervention
      # ============================================================

      - name: n_planning
        description: Identifiant unique de l’intervention (clé métier Nomad)
        tests:
          - not_null
          - unique

      - name: date_fin
        description: Date de fin d’intervention (convertie depuis timestamp opérationnel)

      - name: intervention_type
        description: Code métier du type d’intervention

      - name: consignes
        description: Consignes saisies par le technicien lors de l’intervention

      # ============================================================
      # Normalisation machine
      # ============================================================

      - name: categorie_machine
        description: Catégorie machine issue du référentiel machines

      - name: machine_clean
        description: Nom machine normalisé via le référentiel technique

      # ============================================================
      # Alertes métier – règles qualité
      # ============================================================

      - name: alt_nomenclature
        description: >
          Détecte l’absence de PREV ou MINIPREV sur une intervention préventive.

      - name: alt_coherence_consigne
        description: >
          Vérifie la cohérence entre la consigne saisie et les articles consommés.

      - name: alt_prevcompletekit
        description: >
          Vérifie la présence d’un kit lorsque PREV est consommé.

      - name: alt_kit_typemachine
        description: >
          Contrôle la cohérence entre le kit consommé et le type de machine Aguila.

      - name: alt_filtre_consomme
        description: >
          Détecte l’absence du filtre EVERPUREXL lorsque requis.

      - name: alt_nb_kits
        description: >
          Détecte la consommation de plusieurs kits sur une même intervention.

      - name: alt_conso_hors_kit
        description: >
          Vérifie la conformité des quantités de pièces hors kit selon la machine.

      # ============================================================
      # Champ analytique consolidé
      # ============================================================

      - name: alerte_compile
        description: >
          Concaténation des alertes détectées pour l’intervention.
          Format standardisé : ALERTE1-ALERTE2-ALERTE3.
          Les alertes nulles ne sont pas incluses.

      # ============================================================
      # Métadonnées dbt (audit / lineage)
      # ============================================================

      - name: dbt_updated_at
        description: Timestamp de dernière exécution du modèle dbt

      - name: dbt_invocation_id
        description: Identifiant unique d’exécution dbt (traçabilité pipeline)
