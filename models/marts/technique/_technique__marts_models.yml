version: 2

models:
  - name: fct_technique__neshu_maintenance_preventives
    description: |
      Table de faits pour le suivi des maintenances préventives des machines NESHU.

      Cette table croise les données Oracle (DLOG) et Yuman pour :
      - Identifier les machines en retard de maintenance préventive
      - Calculer le délai de retard ou d'avance par rapport à l'échéance annuelle
      - Suivre le statut des demandes d'intervention ouvertes ou planifiées

      **Règles métier de calcul du retard :**
      - Machine < 13 mois (395 jours) : pas de retard (période de grâce)
      - Machine sans préventive : en retard si > 365 jours après installation
      - Machine avec préventives : en retard si dernière préventive > 365 jours

      **Sources de données :**
      - Oracle NESHU (DLOG) : machines et interventions techniques (preventive dlog)
      - Yuman : matériels, clients, sites et workorders

    columns:
      - name: device_id
        description: Identifiant unique du device dans DLOG NESHU
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('dim_oracle_neshu__device')
                field: device_id

      - name: device_code
        description: Numéro de série du device de la source DLOG NESHU
        tests:
          - not_null

      - name: device_name
        description: Nom du device de la source DLOG NESHU
        tests:
          - not_null

      - name: company_code
        description: Code de l'entreprise/site client dans Oracle (format NESH_CNxxxx)
        tests:
          - not_null

      - name: company_name
        description: Nom de l'entreprise/site client dans Oracle
        tests:
          - not_null

      - name: device_last_installation_date
        description: Date de dernière installation du device (source Oracle)
        tests:
          - not_null

      - name: material_id
        description: Identifiant unique du matériel dans Yuman (peut être NULL si machine non référencée dans Yuman)
        tests:
          - relationships:
              arguments:
                to: ref('stg_yuman__materials')
                field: material_id
              config:
                where: "material_id is not null"

      - name: material_serial_number
        description:
          Numéro de série du matériel Yuman (correspond au device_code Oracle avec préfixe NESH_).
          Clé de liaison entre Oracle et Yuman. Peut être NULL si machine uniquement dans Oracle.

      - name: material_name
        description: Nom du type de machine ('MOMENTO 100', 'GEMINI 200', 'OPTIBEAN X 12' etc)

      - name: client_code
        description: Code client (source Yuman)

      - name: client_name
        description: Nom du client (source Yuman)

      - name: client_category
        description: Catégorie du client dans Yuman (OR / ARGENT / BRONZE)

      - name: site_postal_code
        description: Code postal du site d'installation (source Yuman)

      - name: retard_bol
        description: |
          Indicateur booléen de retard de maintenance préventive.
          - TRUE : machine en retard (nécessite une intervention)
          - FALSE : machine à jour ou dans la période de grâce
        tests:
          - not_null

      - name: retard_delai
        description: |
          Délai en jours par rapport à l'échéance de maintenance préventive.
          - Valeur positive : nombre de jours restants avant l'échéance
          - Valeur négative : nombre de jours de retard
          - Ex: +30 = 30 jours d'avance, -45 = 45 jours de retard
        tests:
          - not_null

      - name: source_last_preventive
        description: |
          Source de la dernière intervention préventive référencée.
          - 'yuman' : dernière préventive enregistrée dans Yuman
          - 'dlog' : dernière préventive enregistrée dans Oracle/DLOG
          - 'aucune' : aucune préventive trouvée ou machine récente (< 13 mois)
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['yuman', 'dlog', 'aucune']

      - name: status_inter
        description: |
          Statut de la demande d'intervention préventive en cours.
          - 'Ouvert' : demande ouverte mais non planifiée
          - 'Planifie' : intervention planifiée avec une date
          - 'Aucune' : aucune demande en cours
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Ouvert', 'Planifie', 'Aucune']

      - name: date_planned
        description: Date planifiée de l'intervention préventive (si status_inter = 'Planifie')

      - name: material_created_at
        description: Date de création de l'enregistrement matériel dans Yuman (utilisée pour la déduplication)

  - name: fct_technique__interventions
    description: |
      Table de fait consolidant les interventions techniques provenant des
      systèmes NESP et YUMAN. Sert de base pour les indicateurs opérationnels,
      la facturation partenaire et les primes techniciens.

      **Sources :** nesp_tech (interventions nomad) · yuman (interventions yuman)

    columns:
      - name: key_inter
        description: Identifiant unique de l'intervention (intervention_id + partenaire)
        tests:
          - not_null
          - unique

      - name: intervention_id
        description: Identifiant de l'intervention dans le système source
        tests:
          - not_null

      - name: src_inter
        description: Système source (NESP ou YUMAN)
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['NESP', 'YUMAN']

      - name: partenaire
        description: Partenaire client associé à l'intervention

      - name: tech_id
        description: Identifiant du technicien dans le système source

      - name: intervention_statut
        description: Etat de l'intervention 

      - name: statut_facturation
        description: Statu de facturation de l'intervention (BILLABLE vs NOT BILLABLE)

      - name: categorie_machine
        description: Groupe machine - clé utile notamment pour la liaison avec les objectifs techniques

      - name: machine_clean
        description: type machine clean - clé utile notamment pour la liaison avec les objectifs techniques

      - name: tech_yuman_id
        description: Identifiant Yuman du technicien

      - name: tech_nomad_id
        description: Identifiant Nomad du technicien

      - name: tech_nom
        description: Nom du technicien

      - name: date_creation
        description: Date de création de l'intervention

      - name: date_debut
        description: Date de début de l'intervention

      - name: date_fin
        description: Date de fin de l'intervention

      - name: duree_inter_minutes
        description: Durée de l'intervention en minutes

      - name: key_factu
        description: Clé de tarification utilisée

      - name: code_postal
        description: Code postal du site d'intervention

      - name: consignes
        description: Consignes de la demande d'intervention

      - name: commentaire_tech
        description: Commentaire finale du technicien post intervention

      - name: prod
        description: Production associée à l'intervention - utile pour les calcul de primes des techniciens

      - name: montant
        description: Montant de l'intervention

      - name: bonus_bool
        description: Indique si un bonus de délai s'applique

      - name: montant_avec_bonus
        description: Montant incluant les bonus de délai

      - name: delai_heures_debut
        description: Délai en heures avant début d'intervention

      - name: delai_heures_fin
        description: Délai en heures avant fin d'intervention

      - name: delai_tech
        description: Type de délai côté technicien

      - name: delai_partenaire
        description: Type de délai côté partenaire

      - name: flag_montagne_prime
        description: Indique si l'intervention est éligible à une prime montagne (1/0)

      - name: flag_paris_intramuros
        description: Indique si l'intervention est réalisée à Paris intramuros (1/0)

      - name: flag_hors_delai_tech
        description: Indique si l'intervention est hors délai technicien (1/0)


  - name: fct_technique__machines_appro_interventions
    description: >
      Modèle permettant de rapprocher les machines suivies en appro NESHU avec leurs interventions curatives Yuman.
      Il présente les passages appro, les interventions récentes, en cours ou à venir, ainsi qu’une lecture synthétique de la situation par machine.

    columns:

      # ============================================================
      # Informations client / machine
      # ============================================================

      - name: company_label
        description: Libellé complet du client avec son nom et son code.

      - name: company_code
        description: Code du client.

      - name: company_name
        description: Nom du client.

      - name: machine_serial_number
        description: Numéro de série de la machine, utilisé pour le lien avec les interventions.
        tests:
          - not_null
          - unique

      - name: device_name
        description: Nom de la machine.

      - name: device_label
        description: Libellé complet de la machine avec son nom et son code.

      - name: roadman_code
        description: Code du roadman rattaché au dernier passage appro connu.

      - name: gea_code
        description: Code GEA rattaché au dernier passage appro connu.

      # ============================================================
      # Suivi des passages appro
      # ============================================================

      - name: last_appro_date
        description: Date du dernier passage appro réalisé sur la machine.

      - name: next_appro_date
        description: Date du prochain passage appro prévu sur la machine.

      # ============================================================
      # Dernière intervention curative sur les 15 derniers jours
      # ============================================================

      - name: last_intervention_date_15d
        description: Date de la dernière intervention curative réalisée sur les 15 derniers jours.

      - name: past_demand_description
        description: Description de la demande liée à cette dernière intervention.

      - name: past_demand_created_at
        description: Date de création de la demande liée à cette dernière intervention.

      - name: past_demand_category_name
        description: Catégorie de la demande liée à cette dernière intervention.

      - name: past_intervention_title
        description: Intitulé de la dernière intervention curative réalisée.

      - name: past_intervention_report
        description: Compte rendu de la dernière intervention curative réalisée.

      - name: past_intervention_technician_name
        description: Technicien associé à la dernière intervention curative réalisée.

      - name: past_client_category
        description: Catégorie client associée à cette dernière intervention.

      - name: past_material_brand
        description: Marque du matériel concerné par cette dernière intervention.

      - name: past_material_description
        description: Description du matériel concerné par cette dernière intervention.

      - name: past_technician_equipe
        description: Équipe du technicien associé à cette dernière intervention.

      - name: nb_interventions_15j
        description: Nombre d’interventions curatives réalisées sur la machine sur les 15 derniers jours.

      # ============================================================
      # Intervention curative en cours
      # ============================================================

      - name: current_demand_description
        description: Description de la demande liée à l’intervention en cours.

      - name: current_demand_created_at
        description: Date de création de la demande liée à l’intervention en cours.

      - name: current_demand_category_name
        description: Catégorie de la demande liée à l’intervention en cours.

      - name: current_intervention_title
        description: Intitulé de l’intervention curative en cours.

      - name: current_intervention_report
        description: Compte rendu renseigné pour l’intervention en cours.

      - name: current_intervention_technician_name
        description: Technicien associé à l’intervention curative en cours.

      - name: current_date_done
        description: Date de clôture de l’intervention en cours, si elle est renseignée.

      - name: current_client_category
        description: Catégorie client associée à l’intervention en cours.

      - name: current_material_brand
        description: Marque du matériel concerné par l’intervention en cours.

      - name: current_material_description
        description: Description du matériel concerné par l’intervention en cours.

      - name: current_technician_equipe
        description: Équipe du technicien associé à l’intervention en cours.

      # ============================================================
      # Prochaine intervention curative planifiée
      # ============================================================

      - name: future_intervention_planned_date
        description: Date prévue de la prochaine intervention curative planifiée.

      - name: future_demand_description
        description: Description de la demande liée à la prochaine intervention planifiée.

      - name: future_demand_created_at
        description: Date de création de la demande liée à la prochaine intervention planifiée.

      - name: future_demand_category_name
        description: Catégorie de la demande liée à la prochaine intervention planifiée.

      - name: future_intervention_title
        description: Intitulé de la prochaine intervention curative planifiée.

      - name: future_intervention_report
        description: Compte rendu renseigné pour la prochaine intervention planifiée.

      - name: future_intervention_technician_name
        description: Technicien associé à la prochaine intervention curative planifiée.

      - name: future_date_done
        description: Date de clôture de l’intervention planifiée, si elle est renseignée.

      - name: future_client_category
        description: Catégorie client associée à la prochaine intervention planifiée.

      - name: future_material_brand
        description: Marque du matériel concerné par la prochaine intervention planifiée.

      - name: future_material_description
        description: Description du matériel concerné par la prochaine intervention planifiée.

      - name: future_technician_equipe
        description: Équipe du technicien associé à la prochaine intervention planifiée.

      # ============================================================
      # Indicateurs de lecture
      # ============================================================

      - name: has_past_intervention_15d
        description: Indique si la machine a eu une intervention curative sur les 15 derniers jours.

      - name: has_current_intervention
        description: Indique si une intervention curative est actuellement en cours sur la machine.

      - name: has_future_intervention
        description: Indique si une intervention curative est déjà planifiée sur la machine.

      - name: machine_intervention_timeline
        description: Synthèse de la situation interventionnelle de la machine.