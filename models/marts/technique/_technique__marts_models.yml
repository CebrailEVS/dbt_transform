version: 2

models:
  - name: fct_technique__machines_avec_interventions
    description: |
      Nombre d'interventions techniques réalisées sur les machines installées chez les clients
      sur les 12 derniers mois. Croise les données clients Nespresso CO et les interventions
      techniques Nespresso Tech.

      **Sources :** nesp_co (clients enrichis) · nesp_tech (interventions dédupliquées)

    columns:
      - name: n_serie_machine
        description: Numéro de série de la machine installée chez le client
        tests:
          - unique
          - not_null

      - name: mc
        description: Code client

      - name: nom_client
        description: Nom du client

      - name: secteur
        description: Secteur commercial du client

      - name: contact_client
        description: Contact principal chez le client

      - name: telephone
        description: Numéro de téléphone du contact client

      - name: adresse
        description: Adresse complète du client

      - name: ville
        description: Ville du client

      - name: code_postal
        description: Code postal du client

      - name: code_machine
        description: Code machine brut provenant de l'intervention

      - name: machine
        description: Nom normalisé de la machine

      - name: n_inter_12mois
        description: Nombre d'interventions réalisées sur les 12 derniers mois

      - name: date_last_inter
        description: Date de la dernière intervention réalisée

  - name: fct_technique__neshu_maintenance_preventives
    description: |
      Table de faits pour le suivi des maintenances préventives des machines NESHU.

      Cette table croise les données Oracle (DLOG) et Yuman pour :
      - Identifier les machines en retard de maintenance préventive
      - Calculer le délai de retard ou d'avance par rapport à l'échéance annuelle
      - Suivre le statut des demandes d'intervention ouvertes ou planifiées

      **Règles métier de calcul du retard :**
      - Machine < 13 mois (395 jours) : pas de retard (période de grâce)
      - Machine sans préventive : en retard si > 365 jours après installation
      - Machine avec préventives : en retard si dernière préventive > 365 jours

      **Sources de données :**
      - Oracle NESHU (DLOG) : machines et interventions techniques (preventive dlog)
      - Yuman : matériels, clients, sites et workorders

    columns:
      - name: device_id
        description: Identifiant unique du device dans DLOG NESHU
        tests:
          - not_null
          - unique

      - name: device_code
        description: Numéro de série du device de la source DLOG NESHU
        tests:
          - not_null

      - name: device_name
        description: Nom du device de la source DLOG NESHU
        tests:
          - not_null

      - name: company_code
        description: Code de l'entreprise/site client dans Oracle (format NESH_CNxxxx)
        tests:
          - not_null

      - name: company_name
        description: Nom de l'entreprise/site client dans Oracle
        tests:
          - not_null

      - name: device_last_installation_date
        description: Date de dernière installation du device (source Oracle)
        tests:
          - not_null

      - name: material_id
        description: Identifiant unique du matériel dans Yuman (peut être NULL si machine non référencée dans Yuman)

      - name: material_serial_number
        description:
          Numéro de série du matériel Yuman (correspond au device_code Oracle avec préfixe NESH_).
          Clé de liaison entre Oracle et Yuman. Peut être NULL si machine uniquement dans Oracle.

      - name: material_name
        description: Nom du type de machine ('MOMENTO 100', 'GEMINI 200', 'OPTIBEAN X 12' etc)

      - name: client_code
        description: Code client (source Yuman)

      - name: client_name
        description: Nom du client (source Yuman)

      - name: client_category
        description: Catégorie du client dans Yuman (OR / ARGENT / BRONZE)

      - name: site_postal_code
        description: Code postal du site d'installation (source Yuman)

      - name: retard_bol
        description: |
          Indicateur booléen de retard de maintenance préventive.
          - TRUE : machine en retard (nécessite une intervention)
          - FALSE : machine à jour ou dans la période de grâce
        tests:
          - not_null

      - name: retard_delai
        description: |
          Délai en jours par rapport à l'échéance de maintenance préventive.
          - Valeur positive : nombre de jours restants avant l'échéance
          - Valeur négative : nombre de jours de retard
          - Ex: +30 = 30 jours d'avance, -45 = 45 jours de retard
        tests:
          - not_null

      - name: source_last_preventive
        description: |
          Source de la dernière intervention préventive référencée.
          - 'yuman' : dernière préventive enregistrée dans Yuman
          - 'dlog' : dernière préventive enregistrée dans Oracle/DLOG
          - 'aucune' : aucune préventive trouvée ou machine récente (< 13 mois)
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['yuman', 'dlog', 'aucune']

      - name: status_inter
        description: |
          Statut de la demande d'intervention préventive en cours.
          - 'Ouvert' : demande ouverte mais non planifiée
          - 'Planifie' : intervention planifiée avec une date
          - 'Aucune' : aucune demande en cours
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Ouvert', 'Planifie', 'Aucune']

      - name: date_planned
        description: Date planifiée de l'intervention préventive (si status_inter = 'Planifie')

      - name: material_created_at
        description: Date de création de l'enregistrement matériel dans Yuman (utilisée pour la déduplication)

  - name: fct_technique__interventions
    description: |
      Table de fait consolidant les interventions techniques provenant des
      systèmes NESP et YUMAN. Sert de base pour les indicateurs opérationnels,
      la facturation partenaire et les primes techniciens.

      **Sources :** nesp_tech (interventions, facturation, délais) · yuman (workorders NESHU)

    columns:
      - name: key_inter
        description: Identifiant unique de l'intervention (intervention_id + partenaire)
        tests:
          - not_null
          - unique

      - name: intervention_id
        description: Identifiant de l'intervention dans le système source
        tests:
          - not_null

      - name: src_inter
        description: Système source (NESP ou YUMAN)
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['NESP', 'YUMAN']

      - name: partenaire
        description: Partenaire client associé à l'intervention

      - name: tech_id
        description: Identifiant du technicien dans le système source

      - name: intervention_statut
        description: Etat de l'intervention 

      - name: statut_facturation
        description: Statu de facturation de l'intervention (BILLABLE vs NOT BILLABLE)

      - name: categorie_machine
        description: Groupe machine - clé utile notamment pour la liaison avec les objectifs techniques

      - name: machine_clean
        description: type machine clean - clé utile notamment pour la liaison avec les objectifs techniques

      - name: tech_yuman_id
        description: Identifiant Yuman du technicien

      - name: tech_nomad_id
        description: Identifiant Nomad du technicien

      - name: tech_nom
        description: Nom du technicien

      - name: date_creation
        description: Date de création de l'intervention

      - name: date_debut
        description: Date de début de l'intervention

      - name: date_fin
        description: Date de fin de l'intervention

      - name: duree_inter_minutes
        description: Durée de l'intervention en minutes

      - name: key_factu
        description: Clé de tarification utilisée

      - name: code_postal
        description: Code postal du site d'intervention

      - name: prod
        description: Numéro de produit

      - name: montant
        description: Montant facturé de l'intervention

      - name: bonus_bool
        description: Indique si un bonus de délai s'applique

      - name: montant_avec_bonus
        description: Montant incluant les bonus de délai

      - name: delai_heures_debut
        description: Délai en heures avant début d'intervention

      - name: delai_heures_fin
        description: Délai en heures avant fin d'intervention

      - name: delai_tech
        description: Type de délai côté technicien

      - name: delai_partenaire
        description: Type de délai côté partenaire

      - name: flag_montagne_prime
        description: Indique si l'intervention est éligible à une prime montagne (1/0)

      - name: flag_paris_intramuros
        description: Indique si l'intervention est réalisée à Paris intramuros (1/0)

      - name: flag_hors_delai_tech
        description: Indique si l'intervention est hors délai technicien (1/0)
