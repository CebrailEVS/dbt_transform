version: 2

sources:
  - name: gac
    database: "{{ var('raw_project') }}"
    schema: "prod_raw"
    description: "Données brutes extraites du fichier suivi des sinistres envoyé par GAC vers le FTP SG"
    config:
      tags: ['gac', 'source']
      # Freshness: tier Relaxe — 7j warn / 14j error
      # Cf. docs/freshness.md
      loaded_at_field: _sdc_batched_at
      freshness:
        warn_after: {count: 7, period: day}
        error_after: {count: 14, period: day}
    tables:
      - name: gac_parc_vehicule
        description: "Export du parc véhicule (GAC → SFTP SG), fichier statique parc_vehicule.csv. 1 ligne = 1 période de contrat type (déclaration AEN) ; un véhicule/immat peut porter plusieurs lignes."
        columns:
          - name: contrat_id_gac
            description: "Identifiant GAC du contrat"
          - name: contrat_immatriculation_edi
            description: "Immatriculation du véhicule (format EDI, sans tiret)"
          - name: contrat_statut_actuel
            description: "Statut actuel du contrat (A la route, Clos, En attente de livraison)"
          - name: contrat_motif_de_cl_ture
            description: "Motif de clôture du contrat (Restitution, Mise en épave, Vente)"
          - name: contrat_type_etat
            description: "État de la ligne de contrat type / déclaration AEN (Actif, Inactif)"
          - name: contrat_type_date_d_effet
            description: "Date d'effet de la ligne de contrat type"
          - name: contrat_type_date_de_fin
            description: "Date de fin de la ligne de contrat type"
          - name: dernier_v_nement_disponibilit_du_v_hicule
            description: "Disponibilité du véhicule au dernier événement (Disponible, Affecté, Indisponible, En maintenance)"
          - name: dernier_v_nement_date_d_effet
            description: "Date d'effet du dernier événement de disponibilité"
          - name: dernier_v_nement_date_de_fin
            description: "Date de fin du dernier événement de disponibilité"
          - name: collaborateur_fonction_actuelle
            description: "Nom trompeur : porte en réalité le code analytique (compta) du véhicule, ex. SAVLYOTECH"
          - name: date_de_saisie
            description: "Date de saisie du contrat (horodatée)"
      - name: gac_sinistre
        description: "Snapshots quotidiens cumulatifs des sinistres véhicules (GAC → SFTP SG). Chargé en append immuable : 1 ligne = 1 sinistre dans 1 snapshot daté. L'état courant est dérivé par dédup dans stg_gac__sinistres."
        columns:
          - name: date
            description: "Date du sinistre"
          - name: immat_
            description: "Immatriculation du véhicule"
          - name: statut_actuel
            description: "Statut actuel du sinistre"
          - name: n_de_sinistre
            description: "Numéro de sinistre"
          - name: type
            description: "Type de sinistre"
          - name: circonstance
            description: "Circonstances du sinistre"
          - name: tiers
            description: "Présence d'un tiers impliqué"
          - name: resp_
            description: "Responsabilité (0-100)"
          - name: matricule
            description: "Matricule du collaborateur"
          - name: nom
            description: "Nom du collaborateur"
          - name: pr_nom
            description: "Prénom du collaborateur"
          - name: centre_de_co_ts
            description: "Centre de coûts"
          - name: co_t_assureur
            description: "Coût pris en charge par l'assureur"
          - name: auto_assurance
            description: "Auto assurance"
          - name: franchise
            description: "Montant de la franchise"
          - name: co_t_global
            description: "Coût global du sinistre"
          - name: cl_tur_
            description: "Indicateur de clôture du sinistre"
          - name: description
            description: "Description du sinistre"
          - name: date_de_cr_ation
            description: "Date de création du sinistre"
          - name: genre_fiscal
            description: "Genre fiscal du véhicule"
          - name: expert_pr_nom
            description: "Prénom de l'expert"
          - name: expert_nom
            description: "Nom de l'expert"
          - name: expert_t_l_phone
            description: "Téléphone de l'expert"
          - name: expert_email
            description: "Email de l'expert"
          - name: expert_jours_de_pr_sence
            description: "Jours de présence de l'expert"
          - name: expert_tablissements
            description: "Établissements liés à l'expertise"
          - name: date_de_passage_de_l_expert
            description: "Date de passage de l'expert"
          - name: remboursement
            description: "Montant de remboursement"
          - name: date_de_r_ception_du_constat
            description: "Date de réception du constat"
          - name: constat_envoy_l_assureur
            description: "Indication si le constat a été envoyé à l'assureur"
          - name: date_d_envoi_du_constat_l_assureur
            description: "Date d'envoi du constat à l'assureur"
          - name: franchise_sup_rieure_la_r_paration
            description: "Indique si la franchise dépasse le coût de réparation"
          - name: fournisseur
            description: "Fournisseur / Garage"
          - name: date_de_d_but_de_r_paration
            description: "Date de début de réparation"
          - name: date_de_fin_de_r_paration
            description: "Date de fin de réparation"
          - name: date_de_remise_du_v_hicule_au_collaborateur_apr_s_r_paration
            description: "Date de remise du véhicule au collaborateur"
          - name: date_de_rapport_d_expertise
            description: "Date du rapport d'expertise"
          - name: trajet_domicile_travail
            description: "Indique si le sinistre s'est produit lors d'un trajet domicile-travail"
          - name: accident_de_week_end
            description: "Indique si le sinistre a eu lieu un week-end"
          - name: lieu_du_sinistre
            description: "Lieu du sinistre"
          - name: date_de_cl_ture_du_sinistre
            description: "Date de clôture du sinistre"
          - name: cat_gorie_interne
            description: "Catégorie interne du sinistre"
          - name: r_f_rence_gac
            description: "Référence GAC"
          - name: co_t_client
            description: "Coût facturé au client"
          - name: entit_entit_1
            description: "Entité 1"
          - name: entit_entit_2
            description: "Entité 2"
          - name: entit_entit_3
            description: "Entité 3"
          - name: entit_entit_4
            description: "Entité 4"
          - name: _sdc_source_file
            description: "Nom du fichier source (Singer/Airbyte)"
          - name: _sdc_source_lineno
            description: "Numéro de ligne dans le fichier source"
