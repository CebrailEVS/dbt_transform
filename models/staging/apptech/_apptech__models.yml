  - name: stg_apptech__suivi_tech_modif_intervention
    description: >
      Modifications d'intervention (décision de facturation éventuelle et/ou
      technicien réel). a_facturer peut être NULL (modif sans décision de
      facturation). Dedup snapshot : seules les lignes du dernier fichier NDJSON
      de chaque mois sont conservées. Pas de test de freshness (soumissions humaines).
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - periode
              - intervention_id
    columns:
      - name: intervention_id
        description: "PK source de l'intervention (workorder_id YUMAN / n_planning NESP, telle qu'exposée par fct_technique__intervention). Le n° visible est numero_pu."
        tests:
          - not_null
      - name: src_inter
        description: "Système source de l'intervention (NESP / YUMAN), émis par l'app. NULL tant que l'app ne l'émet pas (bascule contrat identité 2026-07)."
      - name: numero_pu
        description: "Numéro d'intervention visible (n° PU), pour recherche/audit. NULL en phase de bascule."
      - name: a_facturer
        description: "Décision de facturation (normalisé en majuscules, NULL si non renseignée)"
        tests:
          - accepted_values:
              arguments:
                values: ['OUI', 'NON']
      - name: tech_id_reel
        description: "Identifiant interne du technicien réel (normalisé en minuscules, ex. 'tec-01003')"
      - name: tech_yuman_id_reel
        description: "Identifiant Yuman du technicien réel"
      - name: type_modif
        description: "Nature de la modification, calculée côté app (Annulation / Réattribution / Annulation + Réattribution / Autre). NULL tant que l'app ne l'émet pas."
      - name: commentaire
        description: "Commentaire libre du manager (NULL si vide)"
      - name: periode
        description: "Mois concerné au format YYYY-MM, dérivé du dossier GCS"
        tests:
          - not_null
      - name: periode_date
        description: "Premier jour du mois concerné (DATE)"
      - name: source_file
        description: "Nom du fichier NDJSON snapshot retenu pour ce mois"
      - name: extracted_at
        description: "Timestamp du fichier snapshot (parsé depuis son nom, UTC)"
        tests:
          - not_null

  - name: stg_apptech__suivi_tech_rw
    description: >
      Re-mappings d'interventions (rework) saisis dans l'app suivi technique :
      une ligne = un id d'intervention erroné réaffecté vers le bon id, avec le
      technicien concerné. Dedup snapshot : seules les lignes du dernier fichier
      NDJSON de chaque mois sont conservées. Pas de test de freshness :
      soumissions humaines sans cadence garantie.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - periode
              - bad_intervention_id
      # Cohérence saisie : le mois porté par les enregistrements doit matcher
      # le dossier GCS dans lequel le fichier a été déposé.
      - dbt_utils.expression_is_true:
          arguments:
            expression: "periode = format('%04d-%02d', annee, mois)"
          config:
            severity: warn
      # Un re-mapping d'un id vers lui-même est presque sûrement une erreur de saisie.
      - dbt_utils.expression_is_true:
          arguments:
            expression: "bad_intervention_id != new_intervention_id"
          config:
            severity: warn
    columns:
      - name: bad_intervention_id
        description: "Id d'intervention erroné (saisie humaine — STRING)"
        tests:
          - not_null
      - name: new_intervention_id
        description: "Id d'intervention corrigé (saisie humaine — STRING)"
        tests:
          - not_null
      - name: tech_id
        description: "Identifiant du technicien concerné"
      - name: tech_nom
        description: "Nom du technicien (tel que saisi)"
      - name: tech_secteur
        description: "Secteur du technicien (normalisé en minuscules, ex. 'evs idf')"
      - name: annee
        description: "Année portée par l'enregistrement source"
      - name: mois
        description: "Mois (1-12) porté par l'enregistrement source"
      - name: source
        description: "Fichier Excel d'origine de la correction (traçabilité amont, ex. 'RW EVS IDF 2026-02.xlsx')"
      - name: periode
        description: "Mois concerné au format YYYY-MM, dérivé du dossier GCS"
        tests:
          - not_null
      - name: periode_date
        description: "Premier jour du mois concerné (DATE)"
      - name: source_file
        description: "Nom du fichier NDJSON snapshot retenu pour ce mois"
      - name: extracted_at
        description: "Timestamp du fichier snapshot (parsé depuis son nom, UTC)"
        tests:
          - not_null
