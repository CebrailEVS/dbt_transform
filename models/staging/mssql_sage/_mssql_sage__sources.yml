# models/_mssql_sage__sources.yml
version: 2

sources:
  - name: mssql_sage
    description: "Source des données issues de Sage (MSSQL) — données brutes extraites vers BigQuery"
    database: "{{ var('raw_project') }}"
    schema: prod_raw
    config:
      tags: ['mssql_sage', 'source']  # Déplacé dans config

      # Freshness: tier Standard — 26h warn / 48h error
      # Cf. docs/freshness.md
      loaded_at_field: _sdc_extracted_at
      freshness:
        warn_after: {count: 26, period: hour}
        error_after: {count: 48, period: hour}

    tables:
      - name: dbo_f_ecriturea
        description: "Table des écritures analytiques (f_ecriturea) — détail des montants et quantités analytiques par écriture comptable"

        columns:
          - name: ec_no
            description: "Numéro d'écriture comptable"
          - name: n_analytique
            description: "Numéro de l'axe analytique"
          - name: ea_ligne
            description: "Numéro de ligne d'écriture analytique"
          - name: ca_num
            description: "Code du compte analytique (lisible)"
          - name: cb_ca_num
            description: "Code du compte analytique en hexadécimal (encodé)"
          - name: ea_montant
            description: "Montant de l'écriture analytique"
          - name: ea_quantite
            description: "Quantité associée à l'écriture analytique"
          - name: cb_prot
            description: "Indicateur de protection (technique Sage)"
          - name: cb_marq
            description: "Identifiant technique Sage (PK ligne). Unicité garantie par l'upsert (MERGE sur cbMarq) du loader."
            tests:
              - unique
              - not_null
          - name: cb_createur
            description: "Utilisateur ayant créé la ligne"
          - name: cb_modification
            description: "Horodatage de la dernière modification"
          - name: cb_replication
            description: "Indicateur de réplication"
          - name: cb_flag
            description: "Flag technique interne"
          - name: cb_creation
            description: "Horodatage de création de la ligne"
          - name: cb_creation_user
            description: "Utilisateur ayant créé la ligne (UUID)"
          - name: _sdc_received_at
            description: "Timestamp de réception du flux par Singer/ETL"
          - name: _sdc_extracted_at
            description: "Timestamp d’extraction initiale"
          - name: _sdc_batched_at
            description: "Timestamp de regroupement du lot"
          - name: _sdc_deleted_at
            description: "Timestamp de suppression logique (si applicable)"
          - name: _sdc_table_version
            description: "Version de la table dans le flux d’ingestion"
          - name: _sdc_sequence
            description: "Numéro de séquence du flux pour suivi d’ordre"

        # PK testée sur cb_marq (cf. colonne). L'unicité de la clé métier
        # (ec_no, n_analytique, ea_ligne) reste testée au staging après dédup.

      # TABLE ECRITURE COMPTABLE
      - name: dbo_f_ecriturec
        description: "Table des écritures comptables (f_ecriturec) — enregistre les mouvements comptables avec leurs montants, comptes, dates et statuts"

        columns:
          - name: cb_marq
            description: "Identifiant technique Sage (PK ligne). Unicité garantie par l'upsert (MERGE sur cbMarq) du loader."
            tests:
              - unique
              - not_null
          - name: ec_no
            description: "Numéro de l’écriture comptable (clé métier ; unicité et non-nullité gérées au staging)"

          - name: jo_num
            description: "Code du journal comptable"
          - name: cb_jo_num
            description: "Code journal comptable (encodé)"
          - name: ec_no_link
            description: "Numéro d’écriture liée (ex : écriture d’origine ou d’annulation)"
          - name: jm_date
            description: "Periode date facturation"
          - name: ec_jour
            description: "Jour date de facturation"
          - name: ec_date
            description: "Date de l’écriture"
          - name: ec_piece
            description: "Numéro de pièce comptable"
          - name: cb_ec_piece
            description: "Numéro de pièce comptable encodé"
          - name: ec_ref_piece
            description: "Référence de la pièce associée"
          - name: cb_ec_ref_piece
            description: "Référence de la pièce encodée"
          - name: ec_treso_piece
            description: "Pièce de trésorerie associée"
          - name: cg_num
            description: "Numéro du compte général"
          - name: cb_cg_num
            description: "Numéro du compte général encodé"
          - name: cg_num_cont
            description: "Compte général contrepartie"
          - name: ct_num
            description: "Code du tiers associé"
          - name: cb_ct_num
            description: "Code tiers encodé"
          - name: ec_intitule
            description: "Libellé de l’écriture"
          - name: n_reglement
            description: "Numéro de règlement associé"
          - name: ec_echeance
            description: "Date d’échéance"
          - name: ec_parite
            description: "Taux de parité utilisé pour conversion"
          - name: ec_quantite
            description: "Quantité associée à l’écriture"
          - name: n_devise
            description: "Code devise"
          - name: ec_sens
            description: "Sens comptable de l’écriture : 0 = débit, 1 = crédit."
          - name: ec_montant
            description: "Montant de l’écriture"
          - name: ec_lettre
            description: "Indicateur de lettrage"
          - name: ec_lettrage
            description: "Code de lettrage"
          - name: ec_point
            description: "Indicateur de pointage"
          - name: ec_pointage
            description: "Code de pointage"
          - name: ec_impression
            description: "Indicateur d’impression"
          - name: ec_cloture
            description: "Indicateur de clôture"
          - name: ec_c_type
            description: "Type de compte (client, fournisseur, etc.)"
          - name: ec_rappel
            description: "Indicateur de rappel"
          - name: ct_num_cont
            description: "Code du tiers contrepartie"
          - name: ec_lettre_q
            description: "Indicateur de lettrage quantitatif"
          - name: ec_lettrage_q
            description: "Code de lettrage quantitatif"
          - name: ec_an_type
            description: "Type analytique lié"
          - name: ec_r_type
            description: "Type de règlement"
          - name: ec_devise
            description: "Montant dans la devise"
          - name: ec_remise
            description: "Indicateur de remise"
          - name: ec_export_expert
            description: "Indicateur d’export vers Expert"
          - name: ta_code
            description: "Code de taxe associé"
          - name: cb_ta_code
            description: "Code de taxe encodé"
          - name: ec_norme
            description: "Norme comptable utilisée"
          - name: ta_provenance
            description: "Provenance de la taxe"
          - name: ec_penal_type
            description: "Type de pénalité"
          - name: ec_date_penal
            description: "Date de pénalité"
          - name: ec_date_relance
            description: "Date de relance"
          - name: ec_date_rappro
            description: "Date de rapprochement"
          - name: ec_reference
            description: "Référence libre de l’écriture"
          - name: ec_status_regle
            description: "Statut de règlement (0 = non réglé, 1 = réglé)"
          - name: ec_montant_regle
            description: "Montant réglé"
          - name: ec_date_regle
            description: "Date de règlement (supposé, non documenté Sage)"
          - name: ec_rib
            description: "Référence bancaire / RIB (supposé, non documenté Sage)"
          - name: ec_date_op
            description: "Date d'opération (supposé, non documenté Sage)"
          - name: ec_no_cloture
            description: "Numéro d'écriture de clôture (supposé, non documenté Sage)"
          - name: ec_export_rappro
            description: "Indicateur d'export rapprochement (supposé, non documenté Sage)"
          - name: ec_facture_guid
            description: "GUID de la facture associée (supposé, non documenté Sage)"
          - name: ec_date_cloture
            description: "Date de clôture (supposé, non documenté Sage)"
          - name: ec_facture_file
            description: "Chemin ou nom du fichier facture (supposé, non documenté Sage)"
          - name: ec_payment_id
            description: "Identifiant de paiement (supposé, non documenté Sage)"
          - name: ec_pay_now_url
            description: "URL de paiement en ligne (supposé, non documenté Sage)"
          - name: cb_hash
            description: "Hash technique interne Sage (non documenté)"
          - name: cb_hash_version
            description: "Version du hash technique Sage (non documenté)"
          - name: cb_hash_date
            description: "Date du hash technique Sage (non documenté)"
          - name: cb_hash_order
            description: "Ordre du hash technique Sage (non documenté)"
          - name: cle_acs
            description: "Clé ACS (non documenté Sage)"
          - name: ec_ext_provenance
            description: "Provenance externe (supposé, non documenté Sage)"
          - name: ec_ext_sequence
            description: "Séquence externe (supposé, non documenté Sage)"
          - name: sac_id
            description: "Identifiant SAC (non documenté Sage)"
          - name: cb_sac_id
            description: "Identifiant SAC encodé (non documenté Sage)"
          - name: _sdc_received_at
            description: "Timestamp d’ingestion du flux par Singer/ETL"
          - name: _sdc_extracted_at
            description: "Timestamp d’extraction"
          - name: _sdc_batched_at
            description: "Timestamp de batch"
          - name: _sdc_deleted_at
            description: "Timestamp de suppression logique"
          - name: _sdc_table_version
            description: "Version de la table dans le flux d’ingestion"
          - name: _sdc_sequence
            description: "Numéro de séquence du flux"


      # NUNSHEN COMMERCE : TABLE COMPTE (overwrite)
      - name: dbo_f_comptet
        description: "Table brute des comptes clients de MSSQL Sage. Colonnes plates (nouvel extracteur, chargement overwrite) — plus de blob JSON."
        columns:
          - name: cb_marq
            description: "Identifiant technique Sage (PK ligne). Unicité garantie par l'overwrite (full refresh) du loader."
            tests:
              - unique
              - not_null
          - name: ct_num
            description: "Code unique du compte client"
          - name: ct_intitule
            description: "Intitulé / nom du compte client"
          - name: ct_type
            description: "Type de compte client"
          - name: co_no
            description: "Code comptable associé"
          - name: ct_e_mail
            description: "Email du compte client"
          - name: cb_creation
            description: "Horodatage de création (TIMESTAMP)"
          - name: cb_modification
            description: "Horodatage de dernière modification (TIMESTAMP)"
          - name: _sdc_extracted_at
            description: "Timestamp d'extraction depuis la source"
          - name: _sdc_received_at
            description: "Timestamp de réception"
          - name: _sdc_batched_at
            description: "Timestamp de traitement du batch"
          - name: _sdc_deleted_at
            description: "Timestamp de suppression logique source"
          - name: _sdc_sequence
            description: "Identifiant de séquence pour la réplication"
          - name: _sdc_table_version
            description: "Version de la table source pour la réplication"

      # NUNSHEN COMMERCE : TABLE COLLABORATEUR (overwrite)
      - name: dbo_f_collaborateur
        description: "Table brute des collaborateurs de MSSQL Sage. Colonnes plates (nouvel extracteur, chargement overwrite) — plus de blob JSON."
        columns:
          - name: cb_marq
            description: "Identifiant technique Sage (PK ligne). Unicité garantie par l'overwrite (full refresh) du loader."
            tests:
              - unique
              - not_null
          - name: co_no
            description: "Code unique du collaborateur"
          - name: co_nom
            description: "Nom du collaborateur"
          - name: co_prenom
            description: "Prénom du collaborateur"
          - name: co_fonction
            description: "Fonction du collaborateur"
          - name: cb_creation
            description: "Horodatage de création (TIMESTAMP)"
          - name: cb_modification
            description: "Horodatage de dernière modification (TIMESTAMP)"
          - name: _sdc_extracted_at
            description: "Timestamp d'extraction depuis la source"
          - name: _sdc_received_at
            description: "Timestamp de réception"
          - name: _sdc_batched_at
            description: "Timestamp de traitement du batch"
          - name: _sdc_deleted_at
            description: "Timestamp de suppression logique source"
          - name: _sdc_sequence
            description: "Identifiant de séquence pour la réplication"
          - name: _sdc_table_version
            description: "Version de la table source pour la réplication"

      # NUNSHEN COMMERCE : TABLE DOCLIGNE (incrémental)
      - name: dbo_f_docligne
        description: "Table brute des lignes de documents (ventes/achats/stock) de MSSQL Sage. Colonnes plates (nouvel extracteur, chargement incrémental) — plus de blob JSON."
        columns:
          - name: cb_marq
            description: "Identifiant technique Sage (PK ligne). Unicité garantie par l'upsert (MERGE sur cbMarq) du loader."
            tests:
              - unique
              - not_null
          - name: dl_no
            description: "Identifiant unique de la ligne de document"
          - name: cb_co_no
            description: "Code du collaborateur associé (FK vers f_collaborateur)"
          - name: do_domaine
            description: "Domaine Sage (0 = ventes, 1 = achats/autre, 2 = stock interne)"
          - name: do_type
            description: "Type de document Sage à l'intérieur d'un domaine"
          - name: ct_num
            description: "Code du compte client (ventes) ou code dépôt (stock)"
          - name: do_date
            description: "Date du document (TIMESTAMP)"
          - name: dl_montant_ht
            description: "Montant HT de la ligne"
          - name: dl_montant_ttc
            description: "Montant TTC de la ligne"
          - name: cb_creation
            description: "Horodatage de création (TIMESTAMP)"
          - name: cb_modification
            description: "Horodatage de dernière modification (TIMESTAMP)"
          - name: _sdc_extracted_at
            description: "Timestamp d'extraction depuis la source"
          - name: _sdc_received_at
            description: "Timestamp de réception"
          - name: _sdc_batched_at
            description: "Timestamp de traitement du batch"
          - name: _sdc_deleted_at
            description: "Timestamp de suppression logique source"
          - name: _sdc_sequence
            description: "Identifiant de séquence pour la réplication"
          - name: _sdc_table_version
            description: "Version de la table source pour la réplication"
