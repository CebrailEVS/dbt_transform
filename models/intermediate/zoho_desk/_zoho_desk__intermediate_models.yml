# models/intermediate/zoho_desk/_zoho_desk__intermediate_models.yml
version: 2

models:
  - name: int_zoho_desk__ticket_status_transitions
    description: >
      Une ligne par changement de statut par ticket. Reconstruit le cycle de vie complet
      de chaque ticket à partir du journal d'audit brut (ticket_history + ticket_history_event_info).
      Normalise les labels anglais hérités (pré-mai 2024) vers les labels français courants.
      Exclut les événements TicketMergedMaster (snapshots, pas des transitions réelles).
      Alimente int_zoho_desk__ticket_timeline (calcul SLA) et fct_zoho_desk__ticket_status_transitions.

    columns:
      - name: transition_id
        description: "Clé de substitution — hash MD5 sur (ticket_id, event_id, from_status, to_status). event_id inclus pour différencier deux automatismes Zoho déclenchés à la même seconde."
        data_type: string
        tests:
          - unique
          - not_null

      - name: ticket_id
        description: "Identifiant Zoho du ticket (FK vers stg_zoho_desk__tickets)"
        data_type: string
        tests:
          - not_null

      - name: event_time
        description: "Timestamp UTC de l'événement"
        data_type: timestamp
        tests:
          - not_null

      - name: event_date_paris
        description: "Date locale Paris de l'événement (colonne de partition)"
        data_type: date
        tests:
          - not_null

      - name: event_name
        description: "Type d'événement Zoho — TicketCreated ou TicketUpdated"
        data_type: string
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['TicketCreated', 'TicketUpdated']

      - name: actor_type
        description: "Qui a déclenché le changement — Agent, null (automatisme Zoho), Workflow"
        data_type: string

      - name: from_status
        description: "Statut avant la transition. Null pour les événements TicketCreated (pas de statut précédent)"
        data_type: string

      - name: to_status
        description: "Statut après la transition"
        data_type: string
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - 'Nouveau'
                  - 'En cours de traitement'
                  - 'En attente infos complémentaires'
                  - 'En attente interne'
                  - 'Clôturée'

      - name: transition_type
        description: >
          Classification métier de la transition.
          ticket_created : statut initial à la création.
          closed : passage vers Clôturée.
          reopened : retour depuis Clôturée vers Nouveau (contact répond ou agent rouvre).
          on_hold_enter : passage vers un statut En attente.
          on_hold_exit : sortie d'un statut En attente.
          status_change : tout autre changement entre statuts actifs.
        data_type: string
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - 'ticket_created'
                  - 'closed'
                  - 'reopened'
                  - 'on_hold_enter'
                  - 'on_hold_exit'
                  - 'status_change'

  - name: int_zoho_desk__ticket_timeline
    description: >
      Une ligne par ticket. Enrichit stg_zoho_desk__tickets avec le timestamp de première
      prise en charge (reconstruit depuis ticket_history) et les métriques SLA Zoho en
      heures ouvrées (sourcées directement depuis ticket_metrics — validées contre l'export
      du web app Zoho "dans les heures d'ouverture"). Alimente fct_zoho_desk__tickets.

    columns:
      - name: ticket_id
        description: "Identifiant Zoho du ticket (FK vers stg_zoho_desk__tickets)"
        data_type: string
        tests:
          - unique
          - not_null

      - name: first_response_at
        description: >
          Timestamp UTC de la première prise en charge du ticket par un agent — plus ancien
          événement ThreadAdded / CommentAdded, ou TicketUpdated modifiant un champ métier
          significatif (Status, Category, Sub Category, Priority, Case Owner, Assignee,
          Department). Les TicketUpdated générés par workflow (Previous Status, Statut client,
          etc.) sont filtrés. Null si aucun agent n'a jamais touché le ticket. Non exposé
          par l'API Zoho — reconstruit ici pour permettre le bucketing Paris dans les rapports.
        data_type: timestamp

      - name: first_response_time_minutes
        description: >
          Heures ouvrées entre la création et la première réponse. Sourcé tel quel depuis
          stg_zoho_desk__ticket_metrics — correspond à la colonne "Temps de première réponse
          dans les heures d'ouverture" du web app Zoho.
        data_type: int64

      - name: resolution_time_minutes
        description: >
          Heures ouvrées de résolution (Délai de résolution du système). Sourcé tel quel
          depuis stg_zoho_desk__ticket_metrics — correspond à la colonne "Temps de résolution
          dans les heures d'ouverture" du web app Zoho. Null pour les tickets non fermés.
        data_type: int64

      - name: total_response_time_minutes
        description: >
          Temps de réponse total en heures ouvrées. Sourcé tel quel depuis
          stg_zoho_desk__ticket_metrics — correspond à la colonne "Temps de réponse total
          dans les heures d'ouverture" du web app Zoho.
        data_type: int64
