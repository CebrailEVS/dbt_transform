version: 2

models:
  - name: int_tech_evs__interventions_enriched
    description: >
      Table intermédiaire consolidant les interventions techniques provenant des
      systèmes NESP et YUMAN. Elle sert de base pour le calcul des indicateurs
      opérationnels, la facturation partenaire et les primes techniciens.

    columns:

      - name: intervention_id
        description: "Identifiant unique de l'intervention (clé primaire logique)"
        tests:
          - not_null
          - unique

      - name: source
        description: "Source du système d'origine (NESP ou YUMAN)"
        tests:
          - not_null
          - accepted_values:
              values: ['NESP','YUMAN']

      - name: partner
        description: "Partenaire client associé à l'intervention"

      - name: tech_id
        description: "Identifiant du technicien dans le système source"

      - name: tech_nom
        description: "Nom du technicien"

      - name: date_creation
        description: "Date de création de l'intervention"

      - name: date_debut
        description: "Date de début de l'intervention"

      - name: date_fin
        description: "Date de fin de l'intervention"

      - name: montant
        description: "Montant facturé de l'intervention"

      - name: montant_avec_bonus
        description: "Montant incluant les bonus de délai"

      - name: delai_tech
        description: "Type de délai côté technicien"

      - name: delai_partner
        description: "Type de délai côté partenaire"

      - name: flag_montagne_prime
        description: "Indique si l'intervention est éligible à une prime montagne"

      - name: flag_paris_intramuros
        description: "Indique si l'intervention est réalisée à Paris intramuros"

      - name: flag_hors_delai_tech
        description: "Indique si l'intervention est hors délai technicien"