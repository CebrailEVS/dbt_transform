      - name: quantity
        description: "Quantité commandée en unités de base = real_quantity × coeff_multi / coeff_div. Mesure additive."
      - name: valuation
        description: "Valorisation de la commande en euros = quantity × prix d'achat unitaire. Mesure additive."

