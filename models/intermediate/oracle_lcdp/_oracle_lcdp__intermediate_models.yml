        data_type: int64
        tests:
          - unique
          - not_null
      - name: task_id
        description: "Tâche de bon de réception Oracle LCDP (EVS.TASK)."
        data_type: int64
        tests:
          - not_null
      - name: company_id
        description: "Client (peer company) de la tâche. FK → dim_lcdp__company."
        data_type: int64
      - name: product_id
        description: "Produit reçu. FK → dim_lcdp__product."
        data_type: int64
        tests:
          - not_null
      - name: product_destination_id
        description: >
