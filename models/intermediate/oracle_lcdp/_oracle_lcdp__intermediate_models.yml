      [NOTES]
      Distinct de int_oracle_lcdp__livraison_interne_tasks (idtask_type 161) : ici type 132, avec
      suivi de statut de livraison (label_code). Flux dominant COMPANY (dépôt) → RESOURCES (véhicule).
