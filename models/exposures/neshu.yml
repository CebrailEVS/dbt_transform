version: 2

# ============================================================
# EXPOSURES — BU Neshu (Oracle Neshu)
# ============================================================
# Maturité :
#   high   → rapport en production, utilisé régulièrement
#   medium → rapport stable mais en cours d'adoption
#   low    → rapport en cours de développement / pilote
# ============================================================

exposures:

  - name: business_review
    label: "Business Review"
    type: dashboard
    maturity: high
    description: >
      Rapport Business Review Neshu. Inclut le suivi des contrats, consommation produits
      (tendances N vs N-1 par client, région, secteur) et les données des passages appros
      des Roadman chez les clients Neshu.
    owner:
      name: Cebrail Aksoy
      email: cebrail.aksoy@evs-pro.com
    depends_on:
      - ref('fct_neshu__consommation')
      - ref('fct_neshu__appro')
      - ref('dim_neshu__company')
      - ref('dim_neshu__contract')
      - ref('dim_neshu__device')

  - name: passage_appro_monitoring
    label: "Passage Appro Monitoring"
    type: dashboard
    maturity: high
    description: >
      Monitoring des passages appro Roadman chez les clients Neshu. Refresh 8x par jour.
      Données chargées par le Cloud Run job "ingest-oracle-neshu-passages-appro"
      via GCP Cloud Workflows (pipeline-passages-appro-neshu), qui écrit directement dans
      prod_marts sans passer par dbt — fct_oracle_neshu__monitoring_passages_appro non modélisée dans dbt.
      Mapping Roadman/GEA et référentiel société gérés via dbt.
      PBI : workspace "Neshu" / dataset "PROD APPRO MONITORING".
    owner:
      name: Cebrail Aksoy
      email: cebrail.aksoy@evs-pro.com
    depends_on:
      - source('marts_oracle_neshu_external', 'fct_oracle_neshu__monitoring_passages_appro')
      - ref('ref_oracle_neshu__roadman_gea')
      - ref('dim_neshu__company')

  - name: reporting_appro
    label: "Reporting Appro"
    type: dashboard
    maturity: high
    description: >
      Rapport de suivi des approvisionnements Roadman chez les clients Neshu.
      Analyse des passages appro par GEA, roadman et clients.
    owner:
      name: Cebrail Aksoy
      email: cebrail.aksoy@evs-pro.com
    depends_on:
      - ref('fct_neshu__appro')
      - ref('dim_neshu__company')
      - ref('ref_oracle_neshu__roadman_gea')

  - name: maintenance_preventives
    label: "Neshu Maintenance Préventives"
    type: dashboard
    maturity: medium
    description: >
      Rapport de suivi de la maintenance préventive des machines Neshu en utilisant les données des interventions Yuman.
    owner:
      name: Cebrail Aksoy
      email: cebrail.aksoy@evs-pro.com
    depends_on:
      - ref('fct_neshu__maintenance_preventive')

  - name: chargement_consommation
    label: "PROD CHARGEMENT & CONSOS NESHU"
    type: dashboard
    maturity: high
    description: >
      Rapport de suivi des chargements machines et consommations Neshu.
      Croise les vues bi-mensuelles agrégées (chargement_quinzaine), les cycles
      conso/chargement par passage (chargement_consommation) et les tâches
      chargement détaillées (intermediate) pour le contexte société/machine/produit.
    owner:
      name: Etienne Boulinier
      email: etienne.boulinier@evs-pro.com
    depends_on:
      - ref('dim_neshu__company')
      - ref('dim_neshu__product')
      - ref('dim_neshu__device')
      - ref('fct_neshu__chargement_quinzaine')
      - ref('fct_neshu__chargement_consommation')
      - ref('int_oracle_neshu__chargement_tasks')  # smell: consuming intermediate from PBI, candidate for mart promotion

  - name: workorder_delai
    label: "PROD DELAIS CURATIVES NESHU"
    type: dashboard
    maturity: high
    description: >
      Rapport de suivi des délais des interventions techniques curatives Neshu
      (work orders Yuman) : délais d'intervention, indicateurs de respect des SLA.
    owner:
      name: Etienne Boulinier
      email: etienne.boulinier@evs-pro.com
    depends_on:
      - ref('fct_neshu__workorder_delai')

  - name: scorecard_nespresso
    label: "PROD SCORECARD NESHU - NESPRESSO"
    type: dashboard
    maturity: medium
    description: >
      Scorecard partenaire Nespresso pour la BU Neshu. Croise les contrats actifs,
      la consommation consolidée et les réceptions fournisseurs pour produire
      les indicateurs de performance suivis par le partenaire.
    owner:
      name: Etienne Boulinier
      email: etienne.boulinier@evs-pro.com
    depends_on:
      - ref('dim_neshu__contract')
      - ref('dim_neshu__company')
      - ref('fct_neshu__consommation')
      - ref('int_oracle_neshu__reception_tasks')  # smell: consuming intermediate from PBI, candidate for mart promotion
