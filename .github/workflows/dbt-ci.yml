name: dbt CI/CD

on:
  pull_request:
    branches:
      - master
    paths:
      - 'models/**'
      - 'data/**'
      - 'snapshots/**'
      - 'macros/**'
      - 'tests/**'
      - 'dbt_project.yml'
      - 'profiles.yml'
      - 'packages.yml'
      - 'requirements.txt'
      - 'requirements-lock.txt'
      - '.sqlfluff'
      - '.github/workflows/dbt-ci.yml'
  push:
    branches:
      - master
    paths:
      - 'models/**'
      - 'data/**'
      - 'snapshots/**'
      - 'macros/**'
      - 'tests/**'
      - 'dbt_project.yml'
      - 'profiles.yml'
      - 'packages.yml'
      - 'Dockerfile'
      - 'requirements.txt'
      - 'requirements-lock.txt'
      - '.github/workflows/dbt-ci.yml'

permissions:
  contents: write
  pages: write
  id-token: write

# ============================================================
# PR CHECK — runs on every pull_request targeting master
# ============================================================
jobs:
  pr-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lock.txt

      - name: Decode and write service account keyfile
        run: echo "${{ secrets.DBT_BIGQUERY_KEYFILE }}" | base64 -d > $GITHUB_WORKSPACE/keyfile.json

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.DBT_BIGQUERY_KEYFILE }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Export env variables for dbt
        run: |
          echo "DBT_BIGQUERY_PROJECT=${{ secrets.DBT_BIGQUERY_PROJECT }}" >> $GITHUB_ENV
          echo "DBT_BIGQUERY_KEYFILE=$GITHUB_WORKSPACE/keyfile.json" >> $GITHUB_ENV
          echo "DBT_BIGQUERY_DATASET_DEV=${{ secrets.DBT_BIGQUERY_DATASET_DEV }}" >> $GITHUB_ENV
          echo "DBT_BIGQUERY_DATASET_PROD=${{ secrets.DBT_BIGQUERY_DATASET_PROD }}" >> $GITHUB_ENV

      - name: dbt deps + debug
        run: |
          dbt deps
          dbt debug --target dev

      - name: SQLFluff lint (changed models)
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          CHANGED=$(git diff --name-only --diff-filter=d origin/${{ github.base_ref }} HEAD -- 'models/**/*.sql' | tr '\n' ' ')
          if [ -z "$CHANGED" ]; then
            echo "No SQL model files changed, skipping lint"
          else
            echo "Linting changed files: $CHANGED"
            sqlfluff lint $CHANGED --format github-annotation-native
          fi

      - name: dbt parse (check for warnings)
        run: |
          dbt parse --target dev 2>&1 | tee dbt_parse_output.txt
          if grep -i "\[WARNING\]" dbt_parse_output.txt; then
            echo "::warning::dbt parse produced warnings — review the output above"
          fi

      - name: Download manifest from GCS
        continue-on-error: true
        run: |
          mkdir -p state/
          gsutil cp gs://${{ secrets.DBT_STATE_BUCKET }}/dbt-state/manifest.json state/manifest.json \
            || echo "No manifest found in GCS, will run full build"

      - name: dbt build
        run: |
          if [[ -f "state/manifest.json" ]]; then
            echo "Running SELECTIVE build (state:modified+), excluding snapshots..."
            dbt build --target dev --select state:modified+ --exclude resource_type:snapshot --state state/
          else
            echo "Running FULL build (no state available), excluding snapshots..."
            dbt build --target dev --exclude resource_type:snapshot
          fi

# ============================================================
# CD — runs on push to master
# ============================================================
  cd:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lock.txt

      - name: Decode and write service account keyfile
        run: echo "${{ secrets.DBT_BIGQUERY_KEYFILE }}" | base64 -d > $GITHUB_WORKSPACE/keyfile.json

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.DBT_BIGQUERY_KEYFILE }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Export env variables for dbt
        run: |
          echo "DBT_BIGQUERY_PROJECT=${{ secrets.DBT_BIGQUERY_PROJECT }}" >> $GITHUB_ENV
          echo "DBT_BIGQUERY_KEYFILE=$GITHUB_WORKSPACE/keyfile.json" >> $GITHUB_ENV
          echo "DBT_BIGQUERY_DATASET_DEV=${{ secrets.DBT_BIGQUERY_DATASET_DEV }}" >> $GITHUB_ENV
          echo "DBT_BIGQUERY_DATASET_PROD=${{ secrets.DBT_BIGQUERY_DATASET_PROD }}" >> $GITHUB_ENV

      - name: dbt deps + debug
        run: |
          dbt deps
          dbt debug --target prod

      - name: dbt build
        run: |
          echo "Running FULL build on master, excluding snapshots..."
          dbt build --target prod --exclude resource_type:snapshot

      - name: dbt docs generate
        run: dbt docs generate --target prod

      - name: Upload manifest to GCS
        run: gsutil cp target/manifest.json gs://${{ secrets.DBT_STATE_BUCKET }}/dbt-state/manifest.json

      - name: Authenticate to Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Build and push dbt-runner image
        run: |
          docker build -t europe-west1-docker.pkg.dev/evs-datastack-prod/data-pipelines/dbt-runner:latest .
          docker push europe-west1-docker.pkg.dev/evs-datastack-prod/data-pipelines/dbt-runner:latest

      - name: Upload docs artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dbt-docs
          path: target/
          retention-days: 90

# ============================================================
# DEPLOY DOCS — runs after cd, deploys to GitHub Pages
# ============================================================
  deploy-docs:
    needs: cd
    runs-on: ubuntu-latest

    steps:
      - name: Download docs artifacts
        uses: actions/download-artifact@v4
        with:
          name: dbt-docs

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
