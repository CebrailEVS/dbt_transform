# dbt_project.yml
name: dbt_warehouse
version: '1.0.0'
profile: dbt_warehouse
config-version: 2
require-dbt-version: [">=1.0.0", "<2.0.0"]

flags:
  use_colors: true
  send_anonymous_usage_stats: false
  bigquery_use_batch_source_freshness: true  # Faster freshness checks via TABLE_STORAGE

model-paths: ["models"]
analysis-paths: ["analysis"]
test-paths: ["tests"]
seed-paths: ["data"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
log-path: "logs"
packages-install-path: "dbt_packages"

clean-targets:
  - "target"
  - "dbt_packages"
  - "logs"

models:
  dbt_warehouse:
    +materialized: view
    +persist_docs:
      relation: true
      columns: true

    staging:
      +schema: staging
      +tags: ['staging']

      yuman:
        +tags: ['staging', 'yuman']

      yuman_gcs:
        +tags: ['staging', 'yuman_gcs']

      nesp_co:
        +tags: ['staging', 'nesp_co']

      nesp_tech:
        +tags: ['staging', 'nesp_tech']

      oracle_neshu:
        +tags: ['staging', 'oracle_neshu']

      oracle_lcdp:
        +tags: ['staging', 'oracle_lcdp']

      oracle_neshu_gcs:
        +tags: ['staging', 'oracle_neshu_gcs']

      mssql_sage:
        +tags: ['staging', 'mssql_sage']

      gac:
        +tags: ['staging', 'gac']

    intermediate:
      +schema: intermediate
      +tags: ['intermediate']

      yuman:
        +tags: ['intermediate', 'yuman']

      oracle_neshu:
        +tags: ['intermediate', 'oracle_neshu']

      oracle_lcdp:
        +tags: ['intermediate', 'oracle_lcdp']

      mssql_sage:
        +tags: ['intermediate', 'mssql_sage']

      nesp_co:
        +tags: ['intermediate', 'nesp_co']

      nesp_tech:
        +tags: ['intermediate', 'nesp_tech']

    marts:
      +schema: marts
      +tags: ['marts']

      yuman:
        +tags: ['marts', 'yuman']

      yuman_gcs:
        +tags: ['marts', 'yuman_gcs']

      oracle_neshu:
        +tags: ['marts', 'oracle_neshu']

      oracle_lcdp:
        +tags: ['marts', 'oracle_lcdp']

      oracle_neshu_gcs:
        +tags: ['marts', 'oracle_neshu_gcs']

      mssql_sage:
        +tags: ['marts', 'mssql_sage']

      nesp_tech:  
        +tags: ['marts', 'nesp_tech']

      gac:
        +tags: ['marts', 'gac']

      technique:
        +tags: ['marts', 'technique']

      commerce:
        +tags: ['marts', 'commerce']

seeds:
  dbt_warehouse:
    +schema: reference
    +tags: ['reference']

# Configuration des snapshots
snapshots:
  dbt_warehouse:
    +target_schema: "{{ 'snapshots_dev' if target.name == 'dev' else 'snapshots' }}"
    +tags: ['snapshots']
    
