# dbt_project.yml
name: dbt_warehouse
version: '1.0.0'
profile: dbt_warehouse
config-version: 2
require-dbt-version: [">=1.0.0", "<2.0.0"]

flags:
  use_colors: true
  send_anonymous_usage_stats: false
  bigquery_use_batch_source_freshness: true  # Faster freshness checks via TABLE_STORAGE

model-paths: ["models"]
analysis-paths: ["analysis"]
test-paths: ["tests"]
seed-paths: ["data"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
log-path: "logs"
packages-install-path: "dbt_packages"

clean-targets:
  - "target"
  - "dbt_packages"
  - "logs"

models:
  dbt_warehouse:
    +materialized: view
    +persist_docs:
      relation: true
      columns: true

    staging:
      +schema: staging
      +tags: ['staging']

      apptech:
        +tags: ['staging', 'apptech']

      yuman:
        +tags: ['staging', 'yuman']

      yuman_gcs:
        +tags: ['staging', 'yuman_gcs']

      nesp_co:
        +tags: ['staging', 'nesp_co']

      nesp_tech:
        +tags: ['staging', 'nesp_tech']

      oracle_neshu:
        +tags: ['staging', 'oracle_neshu']

      oracle_lcdp:
        +tags: ['staging', 'oracle_lcdp']

      oracle_neshu_gcs:
        +tags: ['staging', 'oracle_neshu_gcs']

      oracle_lcdp_gcs:
        +tags: ['staging', 'oracle_lcdp_gcs']

      mssql_sage:
        +tags: ['staging', 'mssql_sage']

      gac:
        +tags: ['staging', 'gac']

      zoho_desk:
        +tags: ['staging', 'zoho_desk']

    intermediate:
      +schema: intermediate
      +tags: ['intermediate']

      yuman:
        +tags: ['intermediate', 'yuman']

      oracle_neshu:
        +tags: ['intermediate', 'oracle_neshu']

      oracle_lcdp:
        +tags: ['intermediate', 'oracle_lcdp']

      mssql_sage:
        +tags: ['intermediate', 'mssql_sage']

      nesp_co:
        +tags: ['intermediate', 'nesp_co']

      nesp_tech:
        +tags: ['intermediate', 'nesp_tech']

      zoho_desk:
        +tags: ['intermediate', 'zoho_desk']

      gac:
        +tags: ['intermediate', 'gac']

    marts:
      +schema: marts
      +tags: ['marts']

      technique:
        +tags: ['marts', 'technique']

      commerce:
        +tags: ['marts', 'commerce']

      finance:
        +tags: ['marts', 'finance']

      services_generaux:
        +tags: ['marts', 'services_generaux']

      supply_chain:
        +tags: ['marts', 'supply_chain']

      neshu:
        +tags: ['marts', 'neshu']

      lcdp:
        +tags: ['marts', 'lcdp']

seeds:
  dbt_warehouse:
    +schema: reference
    +tags: ['reference']

# Configuration des snapshots
# Les snapshots sont un artefact de PROD (historique SCD2 continu, maintenu par
# Cloud Run). En dev on ne les reconstruit pas : les builds dev les lisent depuis
# prod via --defer (cf. dim_neshu__device_history).
snapshots:
  dbt_warehouse:
    +target_schema: snapshots
    +tags: ['snapshots']

# Vars
vars:
  # Projet GCP du data lake (prod_raw, historic…). Les sources le lisent via
  # database: "{{ var('raw_project') }}" pour que `dbt --target dev` (projet
  # evs-datastack-dev) lise le lac en cross-project read-only sans le dupliquer.
  # Cf. infra/dev_project_isolation.tf.
  raw_project: 'evs-datastack-prod'
  # Required by dbt_date (transitive dep of dbt_expectations) for recency checks.
  # Cf. docs/freshness.md méthode B.
  'dbt_date:time_zone': 'Europe/Paris'
  # Plancher de date des écritures à ventiler (fct_finance__ecriture_non_ventilee).
  ecriture_non_ventilee_floor: '2025-01-01'
    
